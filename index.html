/* ========== SVG CHART (weight line) ========== */
// v1.10.30 — T-012: generalized with optional opts (valueKey + ariaLabel +
// colors). Existing callers (Reports weight, Weight Log weight) pass nothing
// → defaults preserve identical visual output.
function svgLineChart(series, avgSeries, w = 320, h = 140, opts) {
  if (!series.length) {
    return `<svg viewBox="0 0 ${w} ${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#aaa" font-size="12">ไม่มีข้อมูล</text></svg>`;
  }
  const valueKey = (opts && opts.valueKey) || 'weight_kg';
  const ariaLabel = (opts && opts.ariaLabel) || 'กราฟน้ำหนัก';
  const dotColor = (opts && opts.dotColor) || '#d97706';
  const lineColor = (opts && opts.lineColor) || '#fde7c8';
  const avgColor = (opts && opts.avgColor) || '#b35d00';
  const padL = 32, padR = 8, padT = 10, padB = 22;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const all = series.concat(avgSeries || []);
  const values = all.map(p => p[valueKey]);
  let minV = Math.min(...values);
  let maxV = Math.max(...values);
  if (minV === maxV) { minV -= 1; maxV += 1; }
  else { minV = Math.floor(minV - 0.5); maxV = Math.ceil(maxV + 0.5); }
  const firstDate = keyToDate(series[0].date);
  const lastDate = keyToDate(series[series.length - 1].date);
  const spanDays = Math.max(1, daysBetween(series[0].date, series[series.length - 1].date));
  const xFor = (pt) => padL + (daysBetween(series[0].date, pt.date) / spanDays) * innerW;
  const yFor = (v) => padT + (1 - (v - minV) / (maxV - minV)) * innerH;

  const path = (arr) => arr.map((p, i) => `${i === 0 ? 'M' : 'L'}${xFor(p).toFixed(1)},${yFor(p[valueKey]).toFixed(1)}`).join(' ');
  const gridY = [minV, (minV + maxV) / 2, maxV];
  const grid = gridY.map(v => `<line x1="${padL}" y1="${yFor(v)}" x2="${w - padR}" y2="${yFor(v)}" stroke="#eee" stroke-width="1"/><text x="${padL - 4}" y="${yFor(v) + 4}" text-anchor="end" fill="#999" font-size="10">${v.toFixed(1)}</text>`).join('');
  const dots = series.map(p => `<circle cx="${xFor(p).toFixed(1)}" cy="${yFor(p[valueKey]).toFixed(1)}" r="2.8" fill="${dotColor}"/>`).join('');
  const avgPath = (avgSeries && avgSeries.length > 1)
    ? `<path d="${path(avgSeries)}" fill="none" stroke="${avgColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`
    : '';
  const dataPath = `<path d="${path(series)}" fill="none" stroke="${lineColor}" stroke-width="1.5" stroke-linecap="round"/>`;
  const startLbl = `${firstDate.getDate()}/${firstDate.getMonth() + 1}`;
  const endLbl = `${lastDate.getDate()}/${lastDate.getMonth() + 1}`;
  return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="${ariaLabel}">
    ${grid}
    ${dataPath}
    ${avgPath}
    ${dots}
    <text x="${padL}" y="${h - 6}" fill="#999" font-size="10">${startLbl}</text>
    <text x="${w - padR}" y="${h - 6}" text-anchor="end" fill="#999" font-size="10">${endLbl}</text>
  </svg>`;
}

// v1.10.27 — generic daily line chart (T-009). For calorie trends etc.
// Renders gaps for unlogged days (line breaks, not zero-drag).
// v1.10.28 — T-010: target rendered as per-day path (not flat average) so
// the burn line actually varies with logged exercise. Adds hit-area + selection
// for tap-to-read detail.
// opts: { valueFn, targetFn?, color, targetColor, label, w, h, chartId?, selectedIdx? }
function svgDailyLineChart(days, opts) {
  const valueFn = opts.valueFn;
  const targetFn = opts.targetFn;
  const color = opts.color || '#d97706';
  const targetColor = opts.targetColor || '#9ca3af';
  const label = opts.label || '';
  const w = opts.w || 320;
  const ch = opts.h || 140;
  const chartId = opts.chartId || '';
  const selectedIdx = opts.selectedIdx;
  const padL = 38, padR = 8, padT = 10, padB = 22;
  const innerW = w - padL - padR;
  const innerH = ch - padT - padB;
  const points = days.map((d, i) => ({
    i,
    value: d.logged ? valueFn(d) : null,
    target: targetFn ? targetFn(d) : null
  }));
  const validPoints = points.filter(p => p.value != null);
  if (validPoints.length === 0) {
    return `<svg viewBox="0 0 ${w} ${ch}"><text x="${w/2}" y="${ch/2}" text-anchor="middle" fill="#aaa" font-size="12">ไม่มีข้อมูลในช่วงนี้</text></svg>`;
  }
  const allValues = validPoints.map(p => p.value);
  if (targetFn) points.forEach(p => p.target != null && allValues.push(p.target));
  let minV = Math.min(...allValues);
  let maxV = Math.max(...allValues);
  if (minV === maxV) { minV -= 100; maxV += 100; }
  const rng = maxV - minV;
  maxV = maxV + rng * 0.1;
  minV = Math.max(0, minV - rng * 0.05);
  const step = rng > 1000 ? 500 : 100;
  minV = Math.floor(minV / step) * step;
  maxV = Math.ceil(maxV / step) * step;
  const xFor = (i) => padL + (i / Math.max(1, days.length - 1)) * innerW;
  const yFor = (v) => padT + (1 - (v - minV) / (maxV - minV)) * innerH;
  const gridY = [minV, (minV + maxV) / 2, maxV];
  const grid = gridY.map(v => `<line x1="${padL}" y1="${yFor(v).toFixed(1)}" x2="${w - padR}" y2="${yFor(v).toFixed(1)}" stroke="#eee" stroke-width="1"/><text x="${padL - 4}" y="${(yFor(v) + 4).toFixed(1)}" text-anchor="end" fill="#999" font-size="10">${Math.round(v)}</text>`).join('');
  // v1.10.28 — target rendered as per-day path (variable line). Each segment
  // breaks on unlogged days, like the data line. This reflects actual exercise
  // logged per day instead of a misleading flat average.
  let targetPath = '';
  if (targetFn) {
    const tParts = [];
    let inT = false;
    points.forEach(p => {
      if (p.target != null) {
        tParts.push(`${inT ? 'L' : 'M'}${xFor(p.i).toFixed(1)},${yFor(p.target).toFixed(1)}`);
        inT = true;
      } else { inT = false; }
    });
    if (tParts.length) {
      targetPath = `<path d="${tParts.join(' ')}" fill="none" stroke="${targetColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4,3"/>`;
    }
  }
  // Data path with gaps for unlogged days
  const parts = [];
  let inSeg = false;
  points.forEach(p => {
    if (p.value != null) {
      parts.push(`${inSeg ? 'L' : 'M'}${xFor(p.i).toFixed(1)},${yFor(p.value).toFixed(1)}`);
      inSeg = true;
    } else { inSeg = false; }
  });
  const dataPath = `<path d="${parts.join(' ')}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  const dots = validPoints.map(p => {
    const isSel = selectedIdx === p.i;
    const r = isSel ? 4.5 : 2.4;
    const ring = isSel ? `<circle cx="${xFor(p.i).toFixed(1)}" cy="${yFor(p.value).toFixed(1)}" r="6" fill="none" stroke="#1f2937" stroke-width="1.5"/>` : '';
    return `${ring}<circle cx="${xFor(p.i).toFixed(1)}" cy="${yFor(p.value).toFixed(1)}" r="${r}" fill="${color}"/>`;
  }).join('');
  // v1.10.28 — column-wide invisible hit-area per day for tap-to-read
  let hitAreas = '';
  if (chartId) {
    const colW = innerW / days.length;
    hitAreas = days.map((d, i) => {
      const x = padL + (i - 0.5) * (innerW / Math.max(1, days.length - 1));
      return `<rect data-act="show-chart-point" data-chart-id="${chartId}" data-day-idx="${i}" x="${x.toFixed(1)}" y="${padT}" width="${colW.toFixed(1)}" height="${innerH}" fill="transparent" style="cursor:pointer"/>`;
    }).join('');
  }
  const sD = keyToDate(days[0].key);
  const eD = keyToDate(days[days.length - 1].key);
  return `<svg viewBox="0 0 ${w} ${ch}" role="img" aria-label="${label}">
    ${grid}
    ${targetPath}
    ${dataPath}
    ${dots}
    ${hitAreas}
    <text x="${padL}" y="${ch - 6}" fill="#999" font-size="10">${sD.getDate()}/${sD.getMonth() + 1}</text>
    <text x="${w - padR}" y="${ch - 6}" text-anchor="end" fill="#999" font-size="10">${eD.getDate()}/${eD.getMonth() + 1}</text>
  </svg>`;
}

// v1.10.27 — generic daily bar chart (T-009). Supports negative values (deficit
// bars below zero-line). For energy-balance + protein-vs-target visualizations.
// v1.10.28 — T-010: adds hit-area + selection support (chartId + selectedIdx).
// opts: { valueFn, colorFn(v)→color, targetLine?, zeroLine?, label, w, h, chartId?, selectedIdx? }
function svgDailyBarChart(days, opts) {
  const valueFn = opts.valueFn;
  const colorFn = opts.colorFn || (() => '#d97706');
  const targetLine = opts.targetLine;
  const zeroLine = !!opts.zeroLine;
  const label = opts.label || '';
  const w = opts.w || 320;
  const ch = opts.h || 140;
  const chartId = opts.chartId || '';
  const selectedIdx = opts.selectedIdx;
  const padL = 38, padR = 8, padT = 10, padB = 22;
  const innerW = w - padL - padR;
  const innerH = ch - padT - padB;
  const points = days.map((d, i) => ({ i, value: d.logged ? valueFn(d) : null }));
  const validPoints = points.filter(p => p.value != null);
  if (validPoints.length === 0) {
    return `<svg viewBox="0 0 ${w} ${ch}"><text x="${w/2}" y="${ch/2}" text-anchor="middle" fill="#aaa" font-size="12">ไม่มีข้อมูลในช่วงนี้</text></svg>`;
  }
  const allValues = validPoints.map(p => p.value);
  if (targetLine != null) allValues.push(targetLine);
  let minV = Math.min(...allValues);
  let maxV = Math.max(...allValues);
  if (zeroLine) { minV = Math.min(minV, 0); maxV = Math.max(maxV, 0); }
  if (minV === maxV) { minV -= 100; maxV += 100; }
  const rng = maxV - minV;
  maxV = maxV + rng * 0.1;
  if (minV < 0) minV = minV - rng * 0.05;
  const step = rng > 1000 ? 500 : rng > 200 ? 100 : 50;
  minV = Math.floor(minV / step) * step;
  maxV = Math.ceil(maxV / step) * step;
  const barW = Math.max(2, (innerW / days.length) * 0.7);
  const xFor = (i) => padL + ((i + 0.5) / days.length) * innerW;
  const yFor = (v) => padT + (1 - (v - minV) / (maxV - minV)) * innerH;
  const yZero = yFor(0);
  const gridY = [minV, (minV + maxV) / 2, maxV];
  const grid = gridY.map(v => `<line x1="${padL}" y1="${yFor(v).toFixed(1)}" x2="${w - padR}" y2="${yFor(v).toFixed(1)}" stroke="#eee" stroke-width="1"/><text x="${padL - 4}" y="${(yFor(v) + 4).toFixed(1)}" text-anchor="end" fill="#999" font-size="10">${Math.round(v)}</text>`).join('');
  let zeroLineHtml = '';
  if (zeroLine && minV < 0 && maxV > 0) {
    zeroLineHtml = `<line x1="${padL}" y1="${yZero.toFixed(1)}" x2="${w - padR}" y2="${yZero.toFixed(1)}" stroke="#666" stroke-width="1"/>`;
  }
  let tLineHtml = '';
  if (targetLine != null) {
    const yT = yFor(targetLine);
    tLineHtml = `<line x1="${padL}" y1="${yT.toFixed(1)}" x2="${w - padR}" y2="${yT.toFixed(1)}" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>`;
  }
  const bars = validPoints.map(p => {
    const cx = xFor(p.i);
    const bx = cx - barW / 2;
    const yVal = yFor(p.value);
    let by, bh;
    if (p.value >= 0) {
      by = yVal;
      bh = (zeroLine && minV < 0 ? yZero : yFor(minV)) - yVal;
    } else {
      by = yZero;
      bh = yVal - yZero;
    }
    const isSel = selectedIdx === p.i;
    const strokeAttr = isSel ? ' stroke="#1f2937" stroke-width="2"' : '';
    return `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0.5, bh).toFixed(1)}" fill="${colorFn(p.value)}" rx="1"${strokeAttr}/>`;
  }).join('');
  // v1.10.28 — hit-area per day (full chart height) for tap-to-read
  let hitAreas = '';
  if (chartId) {
    const colW = innerW / days.length;
    hitAreas = days.map((d, i) => {
      const hx = padL + i * colW;
      return `<rect data-act="show-chart-point" data-chart-id="${chartId}" data-day-idx="${i}" x="${hx.toFixed(1)}" y="${padT}" width="${colW.toFixed(1)}" height="${innerH}" fill="transparent" style="cursor:pointer"/>`;
    }).join('');
  }
  const sD = keyToDate(days[0].key);
  const eD = keyToDate(days[days.length - 1].key);
  return `<svg viewBox="0 0 ${w} ${ch}" role="img" aria-label="${label}">
    ${grid}
    ${bars}
    ${zeroLineHtml}
    ${tLineHtml}
    ${hitAreas}
    <text x="${padL}" y="${ch - 6}" fill="#999" font-size="10">${sD.getDate()}/${sD.getMonth() + 1}</text>
    <text x="${w - padR}" y="${ch - 6}" text-anchor="end" fill="#999" font-size="10">${eD.getDate()}/${eD.getMonth() + 1}</text>
  </svg>`;
}

/* ========== CSV EXPORT ========== */
function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return `"${s.replace(/"/g, '""')}"`;
  return s;
}
function buildCSV(userId, startKey, endKey) {
  const user = state.users.find(u => u.id === userId);
  const rows = [['วันที่','ชื่ออาหาร','จำนวน','ขนาด (%)','แคลอรี่','โปรตีน(g)','คาร์บ(g)','น้ำตาล(g)','ไขมัน(g)','น้ำหนัก(kg)']];
  const byDate = state.logs[userId] || {};
  const allDates = Object.keys(byDate).filter(d => d >= startKey && d <= endKey).sort();
  allDates.forEach(d => {
    const entries = byDate[d] || [];
    entries.forEach(e => {
      const m = e.snapshot || findMeal(e.mealId);
      const t = calcEntryTotals(e);
      const baseName = m ? m.name : '(ไม่พบเมนู)';
      const qty = e.quantity || 1;
      rows.push([d, baseName, qty, e.sizePct || 100,
        Math.round(t.calories), t.protein_g.toFixed(1), t.carbs_g.toFixed(1),
        t.sugar_g.toFixed(1), t.fat_g.toFixed(1), '']);
      (e.addons || []).forEach(a => {
        const id = typeof a === 'string' ? a : a.id;
        const count = typeof a === 'string' ? 1 : (a.count || 0);
        if (!count) return;
        const addon = ADDONS.find(x => x.id === id);
        if (!addon) return;
        rows.push([d, `  + ${addon.name}`, count, '-',
          Math.round(addon.calories * count), (addon.protein_g * count).toFixed(1),
          (addon.carbs_g * count).toFixed(1), ((addon.sugar_g || 0) * count).toFixed(1),
          (addon.fat_g * count).toFixed(1), '']);
      });
    });
    const daySum = sumEntries(entries);
    const wk = weightOnDate(user, d);
    rows.push([d, 'สรุปวัน', '-', '-',
      Math.round(daySum.calories), daySum.protein_g.toFixed(1),
      daySum.carbs_g.toFixed(1), daySum.sugar_g.toFixed(1), daySum.fat_g.toFixed(1),
      wk != null ? wk.toFixed(1) : '']);
  });
  (user?.weights || []).forEach(w => {
    if (w.date >= startKey && w.date <= endKey && !allDates.includes(w.date)) {
      rows.push([w.date, '(ชั่งน้ำหนัก)', '-', '-', '-', '-', '-', '-', '-', w.weight_kg.toFixed(1)]);
    }
  });
  const body = rows.map(r => r.map(csvEscape).join(',')).join('\n');
  return '\uFEFF' + body;
}
function downloadCSV(days) {
  const u = currentUser();
  if (!u) return;
  const end = todayKey();
  const start = days ? dateToKey(addDays(new Date(), -(days - 1))) : '0000-01-01';
  const csv = buildCSV(u.id, start, end);
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const safeName = (u.name || 'user').replace(/[^\w\u0E00-\u0E7F-]/g, '_');
  const a = document.createElement('a');
  a.href = url;
  const prefix = days ? `${start}_to_${end}` : `all_to_${end}`;
  a.download = `pracal_${safeName}_${prefix}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('ดาวน์โหลดแล้ว ✅');
}

/* ========== LOGGING ========== */
function addLogEntry(entry, dateKey = todayKey()) {
  if (!state.logs[state.currentUserId]) state.logs[state.currentUserId] = {};
  if (!state.logs[state.currentUserId][dateKey]) state.logs[state.currentUserId][dateKey] = [];
  const u = currentUser();
  const beforeSnap = u ? streaksSnapshot(u) : null;
  if (u && dateKey === todayKey()) {
    if (autoFreezeIfPossible(u)) {
      setTimeout(() => toast('🛡️ ใช้ freeze token รักษา streak'), 200);
    }
  }
  entry.id = entry.id || uid('e');
  entry.dateKey = dateKey;
  entry.loggedAt = Date.now();
  // v1.10.0 — tag new entries with nutrition data version (old entries stay unchanged)
  if (!entry.nutrition_version) entry.nutrition_version = 'v1.10.0';
  state.logs[state.currentUserId][dateKey].push(entry);
  if (u && beforeSnap) checkAndCelebrateMilestones(u, beforeSnap);
  persist();
}
function deleteLogEntry(entryId, dateKey = todayKey()) {
  const arr = (state.logs[state.currentUserId] || {})[dateKey];
  if (!arr) return;
  const idx = arr.findIndex(e => e.id === entryId);
  if (idx >= 0) { arr.splice(idx, 1); persist(); }
}
function updateLogEntry(entryId, patch, dateKey = todayKey()) {
  const arr = (state.logs[state.currentUserId] || {})[dateKey];
  if (!arr) return;
  const e = arr.find(x => x.id === entryId);
  if (e) { Object.assign(e, patch); persist(); }
}

/* ========== NAV ========== */
function go(view, data) {
  if (state.view !== 'loading') state.stack.push({ view: state.view, tmp: { ...state.tmp } });
  state.view = view;
  state.tmp = data || {};
  state.modal = null;
  render();
  window.scrollTo(0, 0);
}
function replace(view, data) {
  state.view = view;
  state.tmp = data || {};
  state.modal = null;
  render();
  window.scrollTo(0, 0);
}
function back() {
  const prev = state.stack.pop();
  if (prev) { state.view = prev.view; state.tmp = prev.tmp || {}; }
  else { state.view = 'dashboard'; state.tmp = {}; }
  state.modal = null;
  render();
}
function goHome() {
  state.stack = [];
  state.view = 'dashboard';
  state.tmp = {};
  state.modal = null;
  render();
}

function renderOnbFavorites() {

  const overHint = count >= ONBOARDING_HINT_THRESHOLD;
  const search = (t.onbSearch || '').toLowerCase().trim();
  const expanded = t.onbExpanded || {};
  const cats = buildOnbCats();

  let body = '';

    const matched = [];
    cats.forEach(c => c.meals.forEach(m => {

    body = matched.length === 0

function weeklyStripHtml(user, baseTarget) {
  const agg = weekAggregate(user.id);
  const today = todayKey();
  const goalAdj = effectiveGoalAdjust(user);
  const goalCat = goalCategory(user);

  // Per-day bar: height = eaten/dayBudget %, color = goal-aware zone
  const bars = agg.days.map(d => {
    const dayBudget = baseTarget + d.exerciseBurn;
    const pct = d.logged && dayBudget ? (d.totals.calories / dayBudget) * 100 : 0;
    let cls = '';
    if (d.logged) {
      // Map goalDelta into the same zones the dashboard ring uses
      if (goalCat === 'lose') {
        if (d.goalDelta < -500)      cls = 'low';   // way under (warning)
        else if (d.goalDelta < -150) cls = 'ok';    // bonus deficit
        else if (d.goalDelta < 150)  cls = 'ok';    // on goal
        else if (d.goalDelta < 400)  cls = 'warn';  // a bit over
        else                          cls = 'over';  // way over
      } else if (goalCat === 'gain') {
        if (d.goalDelta < -300)      cls = 'warn';  // not enough
        else if (d.goalDelta < -100) cls = 'warn';  // close
        else if (d.goalDelta < 200)  cls = 'ok';    // on goal
        else if (d.goalDelta < 500)  cls = 'warn';  // slight over
        else                          cls = 'over';  // way over
      } else {
        if (d.goalDelta < -400)      cls = 'low';
        else if (d.goalDelta < -150) cls = 'ok';
        else if (d.goalDelta < 150)  cls = 'ok';
        else if (d.goalDelta < 400)  cls = 'warn';
        else                          cls = 'over';
      }
    }
    const h = Math.min(100, Math.max(d.logged ? 4 : 0, pct));
    const date = keyToDate(d.key);
    const dow = DOW[date.getDay()];
    const isToday = d.key === today;
    return `
      <div class="week-bar ${isToday ? 'today' : ''}" data-act="view-history-day" data-v="${d.key}">
        <div class="day">${dow}</div>
        <div class="col"><i class="${cls}" style="height:${h.toFixed(1)}%"></i></div>
        <div class="num">${d.logged ? fmt(d.totals.calories / 100, 0) + '' : '·'}</div>
      </div>
    `;
  }).join('');

  // Avg context: compare avg energyDelta vs goalAdj (i.e., avg.goalDelta)
  // 30-day projection from avg energy delta (true delta, includes exercise)
  const avgGoalDelta = agg.avg.goalDelta;
  const avgEnergyDelta = agg.avg.energyDelta;
  const projKg = agg.loggedCount > 0 ? (avgEnergyDelta * 30) / KCAL_PER_KG_FAT : 0;
  let contextMsg = '';
  if (agg.loggedCount === 0) {
    contextMsg = 'ยังไม่มีข้อมูลสัปดาห์นี้';
  } else if (goalCat === 'lose') {
    if (avgGoalDelta < -500)      contextMsg = `⚠️ ขาดดุลเยอะเกินไป · คาด ${projKg.toFixed(1)} kg ใน 30 วัน`;
    else if (avgGoalDelta < -150) contextMsg = `💪 ขาดดุลเกินเป้า — bonus · คาด ${projKg.toFixed(1)} kg ใน 30 วัน`;
    else if (avgGoalDelta < 150)  contextMsg = `🎯 ตามเป้าเป๊ะ · คาด ${projKg.toFixed(1)} kg ใน 30 วัน`;
    else if (avgGoalDelta < 400)  contextMsg = `กินเกินแผนนิด ๆ · คาด ${projKg > 0 ? '+' : ''}${projKg.toFixed(1)} kg ใน 30 วัน`;
    else                           contextMsg = `⚠️ กินเกินแผนเยอะ · คาด +${Math.abs(projKg).toFixed(1)} kg ใน 30 วัน`;
  } else if (goalCat === 'gain') {
    if (avgGoalDelta < -300)      contextMsg = `⚠️ ยังกินไม่ถึง surplus · เพิ่มอีก ${fmt(-avgGoalDelta)} kcal/วัน`;
    else if (avgGoalDelta < -100) contextMsg = `เกือบถึงเป้า surplus`;
    else if (avgGoalDelta < 200)  contextMsg = `💪 ตามเป้าเพิ่มกล้าม · คาด +${Math.abs(projKg).toFixed(1)} kg ใน 30 วัน`;
    else if (avgGoalDelta < 500)  contextMsg = `กินเกินเป้า — ระวังไขมัน · +${Math.abs(projKg).toFixed(1)} kg ใน 30 วัน`;
    else                           contextMsg = `⚠️ กินเยอะเกินเป้ามาก · +${Math.abs(projKg).toFixed(1)} kg ใน 30 วัน`;
  } else {
    if (Math.abs(avgGoalDelta) < 150) contextMsg = '⚖️ สมดุลดี รักษาน้ำหนักได้';
    else if (avgGoalDelta < 0)        contextMsg = `ขาดดุล · คาด ${projKg.toFixed(1)} kg ใน 30 วัน`;
    else                               contextMsg = `เกินสมดุล · คาด +${Math.abs(projKg).toFixed(1)} kg ใน 30 วัน`;
  }

  // Avg row: show eaten + (if any exercise) the dynamic budget context
  const avgEx = Math.round(agg.avg.exerciseBurn);
  const avgDeltaStr = avgEnergyDelta === 0 ? '0' : (avgEnergyDelta < 0 ? '−' : '+') + fmt(Math.abs(avgEnergyDelta));
  const avgDeltaColor = avgEnergyDelta < 0 ? 'var(--green)' : avgEnergyDelta > 0 ? 'var(--amber)' : 'var(--ink)';

  return `
    <div class="card">
      <div class="row between" style="margin-bottom:4px">
        <h3 style="margin:0;font-size:16px">📅 7 วันล่าสุด</h3>
        <span class="muted" style="font-size:12px">บันทึก ${agg.loggedCount}/7</span>
      </div>
      <div class="week-strip">${bars}</div>
      <div style="font-size:13px;line-height:1.7">
        <div class="row between"><span class="muted">กินเฉลี่ย</span><b>${fmt(agg.avg.calories)} kcal/วัน</b></div>
        ${avgEx > 0 ? `<div class="row between"><span class="muted">ออกกำลังเฉลี่ย</span><b>+${fmt(avgEx)} kcal/วัน</b></div>` : ''}
        <div class="row between"><span class="muted">ส่วนต่างเฉลี่ย</span><b style="color:${avgDeltaColor}">${avgDeltaStr} kcal/วัน</b></div>
        <div class="hint" style="font-size:13px;color:var(--ink-2);margin-top:4px">💡 ${contextMsg}</div>
      </div>
    </div>
  `;
}

function goalSliderHtml(currentAdjust, actName, profile) {
  const adj = typeof currentAdjust === 'number' ? currentAdjust : 0;
  let category, hintCls, hintText;
  const elderly = profile && isElderly(profile);
  if (elderly && adj < -300) {
    category = '👵 ลดน้ำหนัก (โหมดสูงวัย)'; hintCls = 'warn'; hintText = `⚠️ จำกัด deficit ที่ -300 (อายุ ${profile.age}+)`;
  } else if (adj <= -500) {
    category = '📉 ลดน้ำหนักเร็ว'; hintCls = 'danger'; hintText = '⚠️ ลดเร็วเกินไป — เสี่ยงเสียกล้ามเนื้อ';
  } else if (adj <= -300) {
    category = '📉 ลดน้ำหนัก'; hintCls = 'safe'; hintText = '✓ ลดปลอดภัย ~0.5 kg/สัปดาห์';
  } else if (adj < 100) {
    category = '⚖️ คงน้ำหนัก'; hintCls = 'neutral'; hintText = 'รักษาน้ำหนักปัจจุบัน';
  } else if (adj <= 400) {
    category = '📈 เพิ่มกล้ามเนื้อ (lean bulk)'; hintCls = 'safe'; hintText = '✓ เพิ่มกล้ามแบบไม่อ้วน ~0.5 kg/สัปดาห์';
  } else {
    category = '📈 เพิ่มน้ำหนักเร็ว'; hintCls = 'danger'; hintText = '⚠️ เพิ่มเร็วเกินไป — อาจได้ไขมันเยอะ';
  }
  const sign = adj > 0 ? '+' : '';
  // Floor preview
  let floorWarn = '';
  if (profile && profile.weight && profile.height && profile.age) {
    const tdee = calcTDEE(profile);
    const beforeFloor = tdee + adj;
    const floor = calorieFloor(profile);
    const actualTarget = defaultCalorieTarget({ ...profile, goalAdjust: adj });
    if (actualTarget > beforeFloor + 5) {
      floorWarn = `<div class="callout" style="background:var(--red-soft);color:var(--red);font-size:13px;margin-top:8px">⚠️ ต่ำกว่า ${fmt(floor)} kcal เสี่ยงสุขภาพ — ระบบปรับขึ้นเป็น <b>${fmt(actualTarget)}</b><br>แนะนำ: เพิ่มออกกำลังแทนลดแคล</div>`;
    }
  }
  return `
    <div class="goal-slider-wrap">
      <div class="label">${h(category)}</div>
      <div style="text-align:center;font-size:14px;color:var(--ink-2)">ปรับแคลจาก TDEE: <span class="num">${sign}${adj}</span> kcal/วัน</div>
      <input type="range" id="${actName}" min="-700" max="700" step="50" value="${adj}">
      <div class="ticks">
        <span>-700</span><span>-400</span><span>0</span><span>+400</span><span>+700</span>
      </div>
      <div class="hint-line ${hintCls}">${h(hintText)}</div>
      ${floorWarn}
    </div>
  `;
}

function renderDashboard() {
  const u = currentUser();
  if (!u) return '';
  const entries = todayEntries();
  const totals = sumEntries(entries);
  const baseTarget = effectiveCalorieTarget(u.id);
  const protTarget = effectiveProteinTarget(u.id);
  const sugarLimit = SUGAR_DAILY_LIMIT_G;
  const incExercise = activityIncludesExercise(u);
  const allowsLogging = !incExercise;
  const burned = allowsLogging ? sumActivitiesBurn(u.id) : 0;
  const tdee = calcTDEE(u);
  const goalAdj = effectiveGoalAdjust(u);

  // Goal-aware ring evaluation — handles all goal types (loss/gain/maintain)
  // and adjusts target up by today's exercise burn.
  const zone = goalZoneEval({
    eaten: totals.calories,
    baseTarget,
    exerciseBurn: burned,
    goalAdj,
    tdee
  });
  const totalDailyBurn = zone.totalBurn;
  const energyDelta = zone.energyDelta;
  const carbsTarget = Math.round(baseTarget * 0.5 / 4);

  const protPct = protTarget ? Math.min(100, (totals.protein_g / protTarget) * 100) : 0;
  const protRemain = protTarget - totals.protein_g;
  const carbsPct = carbsTarget ? Math.min(100, (totals.carbs_g / carbsTarget) * 100) : 0;
  const sugarPct = Math.min(100, (totals.sugar_g / sugarLimit) * 100);
  const sugarCls = totals.sugar_g > sugarLimit ? 'over' : totals.sugar_g > sugarLimit * 0.6 ? 'warn' : 'ok';

  const ringC = 2 * Math.PI * 58;
  const ringOffset = ringC - (Math.min(100, zone.ringPct) / 100) * ringC;

  // Status card background + accent — soft tint matching the zone color
  const statusBg = zone.zone === 'win' || zone.zone === 'extra'
    ? 'var(--green-soft)'
    : zone.zone === 'danger-low' || zone.zone === 'danger-high'
      ? 'var(--red-soft)'
      : 'var(--amber-soft)';

  return `

      <div class="header">
        <button class="icon-btn" data-act="nav-users" aria-label="สลับผู้ใช้" title="สลับผู้ใช้" style="padding:6px">
          ${avatarHtml(u, 30)}
        </button>
        <div style="flex:1">
          <h1 style="margin:0;font-size:20px">สวัสดี ${h(u.name)}</h1>
          <div class="sub">${formatDateTH(todayKey())}</div>
        </div>
        <button class="icon-btn" data-act="nav-settings" aria-label="ตั้งค่า">⚙️</button>
      </div>

      <div class="card">
        <div class="ring-wrap">
          <div class="ring zone-${zone.zone}${zone.pulse ? ' pulse' : ''}" aria-label="แคลอรี่วันนี้">
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle cx="70" cy="70" r="58" fill="none" stroke="var(--bg-2)" stroke-width="14"/>
              <circle cx="70" cy="70" r="58" fill="none" stroke="${zone.ringColor}" stroke-width="14"
                stroke-dasharray="${ringC.toFixed(2)}" stroke-dashoffset="${ringOffset.toFixed(2)}"
                stroke-linecap="round"/>
            </svg>
            <div class="num">
              <b>${fmt(totals.calories)}</b>
              <small>/ ${fmt(zone.effective)} kcal</small>
            </div>
          </div>
          <div class="ring-labels" style="font-size:13px;line-height:1.7">
            <div><span class="muted">🔥 เผา</span> <b>${fmt(totalDailyBurn)}</b>${burned > 0 ? ` <span style="color:var(--muted);font-size:12px">(+${fmt(burned)} ออกกำลัง)</span>` : ''}</div>
            <div><span class="muted">🍽️ กิน</span> <b>${fmt(totals.calories)}</b></div>
            <div style="margin-top:5px;padding-top:5px;border-top:1px solid var(--line)">
              <span class="muted">⚖️ ส่วนต่าง</span>
              <b style="color:${energyDelta < 0 ? 'var(--green)' : energyDelta > 0 ? 'var(--amber)' : 'var(--ink)'}">
                ${energyDelta === 0 ? '0' : (energyDelta < 0 ? '−' : '+') + fmt(Math.abs(energyDelta))}
              </b>
            </div>
          </div>
        </div>

        <div class="zone-card" style="margin-top:12px;padding:12px 14px;background:${statusBg};border-radius:12px;text-align:center;line-height:1.6">
          <div style="font-weight:700;font-size:15px;color:${zone.ringColor}">${h(zone.headline)}</div>
          <div style="font-size:13px;color:var(--ink-2);margin-top:3px">${h(zone.sub)}</div>
          <div class="muted" style="font-size:11.5px;margin-top:6px;padding-top:6px;border-top:1px dashed rgba(0,0,0,0.08)">
            กิน ${fmt(totals.calories)} − เผา ${fmt(totalDailyBurn)} = ${energyDelta === 0 ? '0' : (energyDelta < 0 ? '−' : '+') + fmt(Math.abs(energyDelta))}
            · เป้า ${goalAdj > 0 ? '+' : ''}${goalAdj}/วัน${burned > 0 ? ` · งบ ${fmt(baseTarget)}+${fmt(burned)} ออกกำลัง` : ''}
          </div>
        </div>

        <div class="bar-wrap mt">
          <div class="bar-label">
            <span>🥩 โปรตีน ${helpHtml('protein')}</span>
            <span><span class="v">${fmt(totals.protein_g)}</span> / ${fmt(protTarget)} ก.</span>
          </div>
          <div class="bar"><i class="${protPct >= 100 ? '' : protPct >= 60 ? 'warn' : 'over'}" style="width:${protPct.toFixed(1)}%"></i></div>
        </div>

        <div class="bar-wrap mt">
          <div class="bar-label">
            <span>🍚 คาร์บ ${helpHtml('carbs')}</span>
            <span><span class="v">${fmt(totals.carbs_g)}</span> / ${fmt(carbsTarget)} ก.</span>
          </div>
          <div class="bar"><i class="${carbsPct >= 100 ? 'over' : carbsPct >= 85 ? 'warn' : 'ok'}" style="width:${carbsPct.toFixed(1)}%"></i></div>
        </div>

        <div class="bar-wrap mt">
          <div class="bar-label">
            <span>🍭 น้ำตาล ${helpHtml('sugar')}</span>
            <span><span class="v">${fmt(totals.sugar_g, 1)}</span> / ${fmt(sugarLimit)} ก.${totals.sugar_g > sugarLimit ? ' ⚠️' : ''}</span>
          </div>
          <div class="bar"><i class="${sugarCls}" style="width:${sugarPct.toFixed(1)}%"></i></div>
          <div class="hint">💡 WHO แนะนำ &lt;${SUGAR_WHO_RECOMMENDED_G}g/วัน · ${totals.sugar_g > 0 ? `กินไป ≈${Math.round(totals.sugar_g / 4)} ช้อนชา` : ''}</div>
        </div>

        <div class="facts mt">
          <div><div class="v">${fmt(totals.fat_g, 1)} ก.</div><div class="l">ไขมัน</div></div>
          <div><div class="v">${entries.length}</div><div class="l">รายการ</div></div>
          <div><div class="v">${protRemain > 0 ? fmt(protRemain) + ' ก.' : '✓'}</div><div class="l">โปรตีนเหลือ</div></div>
        </div>
        <div class="hint" style="margin-top:10px;font-size:13px">${breakdownText(u)}</div>
      </div>

      ${(() => {
        // v1.10.13 — suggest-chip: show only when there's meaningful budget left
        const remainingCal = Math.max(0, zone.effective - totals.calories);
        const proteinGap = Math.max(0, protTarget - totals.protein_g);
        if (remainingCal < 150) return '';
        return `
          <div class="card" data-act="nav-suggest" style="background:linear-gradient(135deg,var(--primary-soft),#fef3c7);cursor:pointer;border:1.5px solid var(--primary);padding:12px 14px;margin-top:8px">

                <div class="muted" style="font-size:12.5px">เหลือ <b>${fmt(remainingCal)} cal</b>${proteinGap > 10 ? ` · ขาดโปรตีน <b>${fmt(proteinGap, 0)}g</b>` : ''}</div>
              </div>
              <div style="color:var(--primary-dark);font-weight:700;font-size:18px">→</div>
            </div>
          </div>
        `;
      })()}

      <div class="card" data-act="nav-meal-plan-setup" style="background:linear-gradient(135deg,#e0e7ff,#fce7f3);cursor:pointer;border:1.5px solid #818cf8;padding:12px 14px;margin-top:8px">

          <div style="font-size:28px">📋</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;color:#3730a3">สร้างแผนอาหาร</div>
            <div class="muted" style="font-size:12.5px">วันนี้ 3 มื้อ · หรือล่วงหน้า 3-14 วัน · เลือกตามแคล/โปรตีน</div>
          </div>
          <div style="color:#3730a3;font-weight:700;font-size:18px">→</div>
        </div>
      </div>

      ${(() => {
        // v1.10.31 — T-013a: BPC chip · only show when user has any body data (weight or waist)
        const hasBodyData = (u.weights || []).length > 0 || (u.waist || []).length > 0;
        if (!hasBodyData) return '';
        const checkInCount = (u.checkIns || []).length;
        return `
          <div class="card" data-act="nav-bpc" style="background:linear-gradient(135deg,#fef3c7,#fde68a);cursor:pointer;border:1.5px solid #f59e0b;padding:12px 14px;margin-top:8px">
            <div class="row" style="gap:10px;align-items:center">
              <div style="font-size:28px">📊</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;color:#92400e">Body Progress</div>
                <div class="muted" style="font-size:12.5px">${checkInCount === 0 ? 'ยังไม่มี check-in · เริ่มได้ตอนนี้' : `${checkInCount} check-in${checkInCount > 1 ? 's' : ''} · ดูการเปลี่ยนแปลง`}</div>
              </div>
              <div style="color:#92400e;font-weight:700;font-size:18px">→</div>
            </div>
          </div>
        `;
      })()}

      ${streakStripHtml(u)}

      ${weeklyStripHtml(u, baseTarget)}

      ${incExercise ? `
        <div class="card" style="background:#fef3c7;border:1px solid #fbbf24">
          <div style="font-weight:600;margin-bottom:6px">💡 ระดับ "${h(ACTIVITY_LABELS[normalizeActivityLevel(u.defaultActivity)].name)}" รวมออกกำลังในเป้าแล้ว</div>
          <div style="font-size:13px;color:#92400e;line-height:1.6">
            ×${ACTIVITY_LABELS[normalizeActivityLevel(u.defaultActivity)].multiplier} ครอบ BMR + NEAT + ออกกำลังประจำ<br>

          <button class="btn secondary block sm mt" data-act="switch-to-light">เปลี่ยนเป็น "เบา" + log แยก</button>
        </div>
      ` : ''}

      ${allowsLogging ? (() => {
        const acts = todayActivities();
        return `
          <div class="card">
            <div class="row between" style="margin-bottom:6px">
              <h3 style="margin:0;font-size:16px">💪 กิจกรรมวันนี้</h3>

            ${acts.length === 0 ? `
              <div class="hint" style="font-size:13px;margin-bottom:8px">log ออกกำลังจริงเพิ่ม (multiplier ครอบแค่ BMR + NEAT)</div>
            ` : acts.map(a => {
              const at = ACTIVITY_TYPES.find(x => x.id === a.type) || ACTIVITY_TYPES[ACTIVITY_TYPES.length - 1];
              const intLabel = a.intensity ? ACTIVITY_INTENSITY_LABELS[a.intensity]?.name : '';
              const sourceTag = a.source === 'manual' ? (a.sourceNote || 'manual') : 'MET';
              return `
                <div class="activity-item">
                  <div class="emo">${at.emoji}</div>
                  <div class="body">
                    <div class="name">${h(at.name)}${intLabel ? ' ' + h(intLabel) : ''} · ${a.durationMin || 0} นาที</div>
                    <div class="sub">จาก ${h(sourceTag)}</div>
                  </div>
                  <div class="burn">-${fmt(a.caloriesBurned)} kcal</div>
                  <button class="del" data-act="delete-activity" data-id="${a.id}" aria-label="ลบ">🗑️</button>
                </div>
              `;
            }).join('')}
            <button class="btn secondary block sm mt" data-act="nav-add-activity">+ เพิ่มกิจกรรม</button>
          </div>
        `;
      })() : ''}

      <button class="btn block" data-act="nav-special" style="background:linear-gradient(135deg,#fde7c8,#fbcb8d);color:#5a2e00;font-weight:700;border:1.5px solid #e8a766;height:64px;font-size:18px;margin-top:8px">🎉 บันทึกมื้อพิเศษ <span style="font-weight:400;font-size:14px;opacity:0.85">— ชาบู / บุฟเฟ่ / ร้านอาหาร</span></button>

      <h2>🍽️ วันนี้กินอะไรไปบ้าง</h2>
      ${entries.length === 0 ? `
        <div class="card empty">

      ` : entries.map(e => logEntryHtml(e)).join('')}

      <div style="height:30px"></div>
    </div>

    <button class="fab" data-act="nav-add" aria-label="เพิ่มเมนู">+</button>

    ${bottomNavHtml('home')}
  `;

function logEntryHtml(entry) {
  const m = entry.snapshot || findMeal(entry.mealId);
  const t = calcEntryTotals(entry);
  const pct = entry.sizePct || 100;
  const qty = entry.quantity || 1;
  const isSpecial = !!entry.special;
  const addonList = (entry.addons || []).map(a => {
    const id = typeof a === 'string' ? a : a.id;
    const count = typeof a === 'string' ? 1 : (a.count || 0);
    if (!count) return '';
    const def = ADDONS.find(x => x.id === id);
    if (!def) return '';
    return count > 1 ? `${count}×${def.name}` : def.name;
  }).filter(Boolean).join(', ');
  const customList = (entry.customizations || []).map(cid => {
    const c = m?.customizations?.find(x => x.id === cid);
    return c?.label || '';
  }).filter(Boolean).join(', ');
  if (isSpecial) {
    const sp = entry.special;
    const subText = sp.method === 'detailed'
      ? (sp.itemSummary ? sp.itemSummary.slice(0, 40) + (sp.itemSummary.length > 40 ? '...' : '') : `${sp.items?.length || 0} รายการ`)
      : `Quick · ${pct === 100 ? '' : pct + '% '}${sp.addons?.length ? '+' + sp.addons.length + ' add-on' : ''}`;
    return `
      <div class="log-item" style="border-left:4px solid #d97706">
        <div class="emo">${m ? (m.emoji || '🎉') : '🎉'}</div>
        <div class="body">
          <div class="name"><span class="badge" style="margin-right:6px">🎉 พิเศษ</span>${h(m ? m.name : '?')}</div>
          <div class="sub">${h(subText)}</div>
        </div>
        <div class="cal">${fmt(t.calories)} kcal</div>
        <button class="del" data-act="delete-entry" data-id="${entry.id}" aria-label="ลบ">🗑️</button>
      </div>
    `;
  }
  return `
    <div class="log-item" data-act="edit-entry" data-id="${entry.id}">
      <div class="emo">${qty > 1 ? `<span style="font-size:14px;background:var(--primary);color:#fff;padding:2px 6px;border-radius:8px;font-weight:700">${qty}×</span>` : (m ? (m.emoji || '🍽️') : '🍽️')}</div>
      <div class="body">
        <div class="name">${h(m ? m.name : 'ไม่พบเมนู')}${customList ? ` <span style="color:var(--primary-dark);font-size:13px;font-weight:500">(${h(customList)})</span>` : ''}</div>
        <div class="sub">${pct}% ${addonList ? '· + ' + h(addonList) : ''}</div>
      </div>
      <div class="cal">${fmt(t.calories)} kcal</div>
      <button class="del" data-act="delete-entry" data-id="${entry.id}" aria-label="ลบ">🗑️</button>
    </div>
  `;
}

function renderLibrary() {
  const t = state.tmp;
  const cat = t.cat || 'all';
  const query = (t.query || '').trim().toLowerCase();

  // v1.10.11 — numeric filters (calorie range, min protein, max sugar)
  const calMinNum = parseFloat(t.calMin);
  const calMaxNum = parseFloat(t.calMax);
  const protMinNum = parseFloat(t.protMin);
  const sugarMaxNum = parseFloat(t.sugarMax);
  const calMin = isFinite(calMinNum) && calMinNum > 0 ? calMinNum : 0;
  const calMax = isFinite(calMaxNum) && calMaxNum > 0 ? calMaxNum : Infinity;
  const protMin = isFinite(protMinNum) && protMinNum > 0 ? protMinNum : 0;
  const sugarMax = isFinite(sugarMaxNum) && sugarMaxNum >= 0 ? sugarMaxNum : Infinity;
  const filterCount =
    (calMin > 0 ? 1 : 0) +
    (isFinite(calMax) ? 1 : 0) +
    (protMin > 0 ? 1 : 0) +
    (isFinite(sugarMax) ? 1 : 0);
  const hasFilter = filterCount > 0;

  let meals = allMeals();
  if (cat === 'custom') {
    meals = state.customMeals;
  } else if (cat === 'branded') {
    meals = meals.filter(m => m.source === 'branded' || m.source === 'scanned');
  } else if (cat !== 'all') {
    meals = meals.filter(m => m.category === cat);
  }
  if (query) {
    meals = meals.filter(m => m.name.toLowerCase().includes(query));
  }
  const totalBeforeFilter = meals.length;
  if (hasFilter) {
    meals = meals.filter(m => {
      const cal = m.baseCalories || 0;
      const prot = m.protein_g || 0;
      const sugar = m.sugar_g || 0;
      if (cal < calMin || cal > calMax) return false;
      if (prot < protMin) return false;
      if (sugar > sugarMax) return false;
      return true;
    });
  }
  meals = meals.slice(0, 300);

  // v1.10.1 — cart chip when picking items for a special-detail meal
  let specialCartChip = '';
  if (t.pickMode === 'special-add') {
    const sdItems = t.specialDetail?.items || [];
    const sdCal = sdItems.reduce((s, i) => s + (i.perPersonCal || 0), 0);
    if (sdItems.length > 0) {
      specialCartChip = `
        <div class="special-cart-chip" data-act="goto-special-summary">
          <span style="font-size:18px">🛒</span>
          <div style="flex:1">
            <div><b>${sdItems.length} เมนู</b> ในรายการ · <b>${fmt(sdCal)} kcal</b></div>

function renderAiResultCard(r) {
  const confLabel = r.confidence === 'high' ? '🟢 สูง' : r.confidence === 'medium' ? '🟡 ปานกลาง' : '🔴 ต่ำ';
  const notes = r.notes;
  const reasoning = r.reasoning;
  const sugar = r.sugar_g || 0;
  return `
    <div class="card">
      <h3 style="margin-top:0">🍽️ ${h(r.name)}</h3>
      ${reasoning ? `<div class="hint" style="background:var(--bg-2);padding:8px 12px;border-radius:8px;margin-bottom:10px;font-size:12.5px;line-height:1.55;color:var(--ink-2)"><b style="color:var(--ink)">🧮 AI คำนวณจาก:</b> ${h(reasoning)}</div>` : ''}
      <div class="row between"><span class="muted">แคลอรี่</span><b>${fmt(r.calories)} kcal</b></div>
      <div class="row between"><span class="muted">ขนาด/ปริมาตร</span><b>~${fmt(r.weight_g)} ก./มล.</b></div>
      <div class="row between"><span class="muted">โปรตีน</span><b>${fmt(r.protein_g, 1)} ก.</b></div>
      <div class="row between"><span class="muted">คาร์บ</span><b>${fmt(r.carbs_g, 1)} ก.</b></div>
      <div class="row between"><span class="muted">น้ำตาล</span><b style="color:${sugar > 25 ? 'var(--red)' : sugar > 10 ? 'var(--amber)' : 'var(--ink)'}">${fmt(sugar, 1)} ก.${sugar > 0 ? ` (≈${Math.round(sugar / 4)} ช้อนชา)` : ''}</b></div>
      <div class="row between"><span class="muted">ไขมัน</span><b>${fmt(r.fat_g, 1)} ก.</b></div>
      <div class="row between mt"><span class="muted">ความแม่นยำ</span><span class="chip ${r.confidence}">${confLabel}</span></div>
      ${notes ? `<div class="callout mt">💡 ${h(notes)}</div>` : ''}
      ${r.confidence === 'low' ? `<div class="callout" style="background:var(--red-soft);color:var(--red)">⚠️ ความแม่นยำต่ำ ควรปรับแก้ค่าก่อนบันทึก</div>` : ''}
      <div class="btn-row mt">
        <button class="btn green" data-act="ai-log-today">✅ เพิ่มในวันนี้</button>
        <button class="btn secondary" data-act="ai-save-library">💾 บันทึกเมนู</button>
      </div>
      <button class="btn ghost block sm mt" data-act="ai-edit">✏️ ปรับแก้ค่าก่อนใช้</button>
      ${r.fromCache ? `
        <div class="row between" style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line)">
          <span class="muted" style="font-size:13px">💾 จากข้อมูลที่เคยค้นหา</span>
          <button class="btn ghost sm" data-act="online-refresh" style="font-size:13px;min-height:36px">🔄 ค้นหาใหม่</button>
        </div>
      ` : ''}
    </div>
  `;
}

function normalizeAddons(arr) {
  return (arr || []).map(a => typeof a === 'string' ? { id: a, count: 1 } : { id: a.id, count: a.count || 0 }).filter(x => x.count > 0);
}

function renderMealDetail() {
  const t = state.tmp;
  const meal = t.meal || findMeal(t.mealId);
  if (!meal) {
    return `<div class="screen"><div class="header"><button class="icon-btn" data-act="back">←</button><h1>ไม่พบเมนู</h1></div></div>`;
  }
  const sizePct = t.sizePct || 100;
  const quantity = t.quantity == null ? 1 : t.quantity;
  const addonCounts = t.addonCounts || {};
  const customizations = t.customizations || [];
  const mult = sizePct / 100;
  const factor = mult * quantity;
  // Apply customizations to base
  let baseCal = meal.baseCalories;
  let baseProt = meal.protein_g;
  let baseCarb = meal.carbs_g;
  let baseFat = meal.fat_g;
  let baseSugar = meal.sugar_g || 0;
  if (customizations.length && Array.isArray(meal.customizations)) {
    customizations.forEach(cid => {
      const c = meal.customizations.find(x => x.id === cid);
      if (!c) return;
      baseCal += c.calChange || 0;
      baseProt += c.proteinChange || 0;
      baseCarb += c.carbChange || 0;
      baseFat += c.fatChange || 0;
      baseSugar += c.sugarChange || 0;
    });
  }
  let cal = baseCal * factor;
  let prot = baseProt * factor;
  let carb = baseCarb * factor;
  let fat = baseFat * factor;
  let sugar = baseSugar * factor;
  ADDONS.forEach(a => {
    const c = addonCounts[a.id] || 0;
    cal += a.calories * c;
    prot += a.protein_g * c;
    carb += a.carbs_g * c;
    fat += a.fat_g * c;
    sugar += (a.sugar_g || 0) * c;
  });
  const wt = meal.baseWeight_g * factor;
  const isFav = state.favorites.includes(meal.id);
  const editing = !!t.editingEntryId;
  const isCustom = state.customMeals.some(m => m.id === meal.id);
  const presetOn = SIZE_PRESETS.find(p => p.pct === sizePct);
  // v1.10.19 — plan-edit mode: opened from meal-plan view to modify a slot.
  // Hides log/edit buttons and hides "ดูเมนูคล้ายกัน" (use plan view's swap drawer instead).
  const planEditing = !!t.planEditing;

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1 style="flex:1">${meal.emoji || '🍽️'} ${h(meal.name)}</h1>
        <button class="icon-btn" data-act="toggle-fav" data-id="${meal.id}" aria-label="เมนูประจำ" title="เมนูประจำ">${isFav ? '⭐' : '☆'}</button>
      </div>
      ${planEditing ? `
        <div class="callout info" style="background:#e0e7ff;border-left:4px solid #818cf8;font-size:13px">
          📋 <b>กำลังแก้ไขในแผน</b> — ปรับขนาด/Add-on แล้วกด <b>"💾 บันทึกกลับเข้าแผน"</b><br>
          <span style="font-size:11.5px;color:#3730a3">ค่าจะอัปเดตเฉพาะในแผน · ยังไม่บันทึกเข้าวันนี้ จนกว่าจะกด "ยืนยัน" ในหน้าแผน</span>
        </div>
      ` : backdateBannerHtml(t.targetDate)}

      <div class="card">
        <div class="row between">
          <div class="muted">รวม ${quantity > 1 ? `× ${quantity}` : ''}</div>
          <div style="font-size:24px;font-weight:700;color:var(--primary-dark)">${fmt(cal)} kcal</div>
        </div>
        <div class="facts">
          <div><div class="v">${fmt(prot, 1)} ก.</div><div class="l">โปรตีน</div></div>
          <div><div class="v">${fmt(carb, 1)} ก.</div><div class="l">คาร์บ</div></div>
          <div><div class="v">${fmt(fat, 1)} ก.</div><div class="l">ไขมัน</div></div>
        </div>
        <div class="hint mt">น้ำหนักโดยประมาณ ${fmt(wt)} ก. · น้ำตาล ${fmt(sugar, 1)} ก.${sugar > 20 ? ` ≈ ${Math.round(sugar / 4)} ช้อนชา` : ''}</div>
      </div>
      ${planEditing ? '' : `<button class="btn ghost block sm mt" data-act="show-similar" data-id="${meal.id}" style="font-size:13px">🔄 ดูเมนูที่คล้ายกัน</button>`}

      ${Array.isArray(meal.customizations) && meal.customizations.length ? (() => {
        // v1.10.0 — group customizations with the same groupId into mutually-exclusive radio.
        // Customizations without groupId remain checkboxes (legacy behavior).
        const groups = {};
        const ungrouped = [];
        meal.customizations.forEach(c => {
          if (c.groupId) {
            if (!groups[c.groupId]) groups[c.groupId] = [];
            groups[c.groupId].push(c);
          } else {
            ungrouped.push(c);
          }
        });
        const renderItem = (c, isRadio) => {
          const on = customizations.includes(c.id);
          const sign = (c.calChange || 0) >= 0 ? '+' : '';
          const noteHtml = c.note ? `<div class="d" style="font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4">${h(c.note)}</div>` : '';
          return `
            <div class="addon ${on ? 'on' : ''}" data-act="${isRadio ? 'toggle-radio-customization' : 'toggle-customization'}" data-v="${c.id}"${isRadio ? ` data-group="${h(c.groupId)}"` : ''}>
              <div class="emo">${isRadio ? (on ? '●' : '○') : '⚙️'}</div>
              <div class="n">${h(c.label)}${noteHtml}</div>
              <div class="c" style="color:${(c.calChange || 0) < 0 ? 'var(--green)' : (c.calChange || 0) > 0 ? 'var(--primary-dark)' : 'var(--muted)'}">${(c.calChange || 0) === 0 ? '~ 0' : sign + fmt(c.calChange) + ' kcal'}</div>
              <div class="chk">${on ? '✓' : ''}</div>
            </div>
          `;
        };
        const groupHeaders = {
          chicken_rice_skin: '🍗 ไม่หนัง?',
          duck_skin: '🦆 ไม่หนังเป็ด?',
          pork_leg_skin_fat: '🍖 ไม่หนังไม่มัน?',
          crispy_pork_skin_fat: '🥓 หนัง/มันหมูกรอบ?',
          pork_belly_skin_fat: '🥓 ลอกหนัง/มันสามชั้น?',
          red_pork_fat: '🍖 ส่วนมันหมูแดง?',
          fried_chicken_skin_batter: '🍗 หนัง/แป้งทอด?'
        };
        let html = '<h2>🛠️ ปรับแต่ง</h2>';
        Object.keys(groups).forEach(gid => {
          const header = groupHeaders[gid] || '⚙️ เลือก 1 ตัวเลือก';
          html += `<div style="font-size:13px;color:var(--ink-2);font-weight:600;margin:10px 0 6px">${h(header)} <span class="muted" style="font-weight:400;font-size:11.5px">(เลือกได้ 1 ข้อ)</span></div>`;
          html += groups[gid].map(c => renderItem(c, true)).join('');
        });
        if (ungrouped.length) {
          if (Object.keys(groups).length) {
            html += `<div style="font-size:13px;color:var(--ink-2);font-weight:600;margin:12px 0 6px">เพิ่มเติม</div>`;
          }
          html += ungrouped.map(c => renderItem(c, false)).join('');
        }
        return html;
      })() : ''}

      <h2>ขนาดแต่ละจาน</h2>
      <div class="size-grid">
        ${SIZE_PRESETS.map(p => `
          <button type="button" class="${p.pct === sizePct && presetOn ? 'on' : ''}" data-act="set-size" data-v="${p.pct}">
            <span class="pct">${p.pct}%</span>
            <span class="label">${h(p.label)}</span>
          </button>
        `).join('')}
      </div>
      <div class="card tight mt">
        <div class="row between"><span class="muted">ปรับขนาดเอง</span><b>${sizePct}%</b></div>
        <div class="slider-wrap">
          <input type="range" id="size-slider" min="25" max="300" step="5" value="${sizePct}">
        </div>
      </div>

      <h2>จำนวน (กี่จาน/ชาม)</h2>
      <div class="card tight">
        <div class="row between">
          <div>
            <div style="font-weight:600">${h(meal.name)}</div>
            <div class="muted" style="font-size:13px">× ${fmt(meal.baseCalories * mult)} kcal/จาน = ${fmt(cal - ADDONS.reduce((s, a) => s + a.calories * (addonCounts[a.id] || 0), 0))} kcal</div>
          </div>
          ${qtyStepperHtml('main', quantity, 0, 5)}
        </div>
      </div>

      <h2>เพิ่มเติม (ไม่จำเป็น)</h2>
      ${ADDONS.map(a => {
        const c = addonCounts[a.id] || 0;
        const addCal = a.calories * c;
        return `
          <div class="addon-q ${c > 0 ? 'on' : ''}">

function renderHistory() {
  const u = currentUser();
  const userLogs = state.logs[state.currentUserId] || {};
  const dates = Object.keys(userLogs).sort().reverse().slice(0, 60);
  const baseTarget = effectiveCalorieTarget(state.currentUserId);
  const tdee = u ? calcTDEE(u) : 2000;
  const incExercise = u ? activityIncludesExercise(u) : false;
  const goalAdj = u ? effectiveGoalAdjust(u) : 0;
  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1>📅 ย้อนหลัง</h1>
      </div>
      ${dates.length === 0 ? `
        <div class="card empty"><div class="big">📅</div><div>ยังไม่มีประวัติ</div></div>
      ` : dates.map(d => {
        const entries = userLogs[d] || [];
        const totals = sumEntries(entries);
        const exerciseBurn = incExercise ? 0 : sumActivitiesBurn(state.currentUserId, d);
        const dayBudget = baseTarget + exerciseBurn;
        const pct = dayBudget ? Math.round((totals.calories / dayBudget) * 100) : 0;
        const goalDelta = totals.calories - (tdee + exerciseBurn) - goalAdj;
        const inZone = Math.abs(goalDelta) < 250;
        return `
          <div class="card tight" data-act="view-history-day" data-v="${d}" style="cursor:pointer">
            <div class="row between">
              <div>
                <div style="font-weight:600">${formatDateTH(d)}${d === todayKey() ? ' <span class="badge">วันนี้</span>' : ''}${inZone ? ' <span style="color:var(--green);font-size:12px">🎯</span>' : ''}</div>
                <div class="muted" style="font-size:13px">${entries.length} รายการ · โปรตีน ${fmt(totals.protein_g)}g${exerciseBurn > 0 ? ` · ออกกำลัง ${fmt(exerciseBurn)} kcal` : ''}</div>
              </div>
              <div style="text-align:right">
                <div style="font-weight:700;color:var(--primary-dark);font-size:17px">${fmt(totals.calories)}</div>
                <div class="muted" style="font-size:12px">${pct}% ของงบ${exerciseBurn > 0 ? ` (${fmt(dayBudget)})` : ''}</div>
              </div>
            </div>
          </div>
        `;
      }).join('')}
      <div style="height:30px"></div>
    </div>
    ${bottomNavHtml('history')}
  `;
}

function renderMealPlanSetup() {
  const u = currentUser();
  const t = state.tmp;
  // Sensible defaults: derive from user's current target if available
  const cfg = t.planConfig || {
    days: 1,                                                        // v1.10.18: default 1 day (fast-track for "วันนี้")
    calPerDay: u ? effectiveCalorieTarget(u.id) : 1600,
    proteinMin: u ? effectiveProteinTarget(u.id) : 100,
    sugarMax: '',
    mealsPerDay: 3,                                                 // v1.10.18: default 3 meals/day
    fixedName: '',
    fixedCal: '',
    fixedProtein: '',
    excludeKeywords: 'เบียร์,แอลกอฮอล์'
  };
  // v1.10.18 — live projection (recomputed every render as user types)
  const proj = u ? computePlanProjection(u, cfg) : null;
  const flagColor = (f) => f === 'danger' ? 'var(--red)' : f === 'caution' ? 'var(--amber)' : 'var(--green)';
  const flagBg = (f) => f === 'danger' ? 'var(--red-soft)' : f === 'caution' ? '#fef3c7' : 'var(--green-soft)';
  // Weight change phrasing
  const wcKg = proj ? proj.weightChangeKg : 0;
  const wcAbs = Math.abs(wcKg);
  const wcText = wcAbs < 0.05
    ? 'คงน้ำหนัก'
    : wcKg < 0
      ? `ลด ${wcAbs.toFixed(2)} kg`
      : `เพิ่ม ${wcAbs.toFixed(2)} kg`;
  const wcColor = wcAbs < 0.05 ? 'var(--ink-2)' : wcKg < 0 ? 'var(--green)' : 'var(--amber)';
  // Compare plan vs profile target
  let vsProfileText = '';
  if (proj) {
    const pd = proj.profileDelta;
    if (Math.abs(pd) < 50) vsProfileText = 'ตรงกับเป้า profile';
    else if (pd < 0) vsProfileText = `น้อยกว่าเป้า profile ${fmt(Math.abs(pd))} kcal/วัน`;

  const isOneDay = cfg.days === 1;
  return `

          : `ระบบจะสร้างแผน ${cfg.days} วัน โดยใช้เมนูใน database (${fmt(state.preloadedMeals.length)} รายการ)<br>คำนวณให้ครบเงื่อนไข cal/protein + ไม่ซ้ำเมนู 3 วันติด + ใช้ favorites`}
      </div>

      <div class="card mt">
        <label style="font-weight:600;font-size:14px">📅 จำนวนวัน</label>
        <div class="seg mt">
          ${[1, 3, 7, 14].map(n => `<button type="button" class="${cfg.days === n ? 'on' : ''}" data-act="plan-set-days" data-v="${n}">${n === 1 ? 'วันนี้' : n + ' วัน'}</button>`).join('')}
        </div>
        ${proj && wcAbs >= 0.05 ? `<div class="hint" style="font-size:12px;margin-top:6px">→ <b style="color:${wcColor}">${wcText}</b> ใน ${cfg.days} วัน</div>` : ''}
      </div>

              <span class="muted">เทียบ TDEE</span><b style="color:${proj.dailyDelta < 0 ? 'var(--green)' : 'var(--amber)'}">${proj.dailyDelta >= 0 ? '+' : ''}${fmt(proj.dailyDelta)} kcal/วัน</b>
