          <div class="field" style="flex:1">
            <label for="plan-fixed-cal">แคล</label>
            <input id="plan-fixed-cal" type="number" inputmode="numeric" class="input" placeholder="0 = ไม่มี" value="${h(String(cfg.fixedCal || ''))}" min="0" max="2000">
          </div>
          <div class="field" style="flex:1">
            <label for="plan-fixed-protein">โปรตีน (g)</label>
            <input id="plan-fixed-protein" type="number" inputmode="numeric" class="input" value="${h(String(cfg.fixedProtein || ''))}" min="0" max="200">
          </div>
        </div>
      </div>

      <div class="card mt">
        <div class="field">
          <label for="plan-exclude">🚫 หลีกเลี่ยงคำ (คั่นด้วย ,)</label>
          <input id="plan-exclude" type="text" class="input" value="${h(cfg.excludeKeywords || '')}" placeholder="เช่น เบียร์,แอลกอฮอล์,ไก่ทอด" maxlength="200">
          <div class="hint" style="font-size:11.5px">เมนูที่ชื่อมีคำเหล่านี้จะไม่ถูกเลือก</div>
        </div>
      </div>

      ${proj ? `
        <div class="card mt" style="background:linear-gradient(135deg,var(--primary-soft),#fef3c7);border:1.5px solid var(--primary)">
          <div style="font-weight:700;font-size:14px;margin-bottom:8px">📊 ถ้าทำตามแผน ${cfg.days} วัน</div>
          <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:13px;line-height:1.6">
            <span class="muted">${proj.dailyDelta < 0 ? 'ขาดดุลรวม' : proj.dailyDelta > 0 ? 'ส่วนเกินรวม' : 'สมดุลแคล'}</span>
            <b>${proj.dailyDelta !== 0 ? `${fmt(Math.abs(proj.dailyDelta))} × ${cfg.days} = ${fmt(Math.abs(proj.totalDelta))} kcal` : '0 kcal'}</b>
            <span class="muted">น้ำหนักคาดการณ์</span>
            <b style="color:${wcColor}">${proj.wKg > 0 && wcAbs >= 0.05 ? `${proj.wKg.toFixed(1)} → ${(proj.wKg + wcKg).toFixed(2)} kg (${wcText})` : wcText}</b>
            <span class="muted">เทียบเป้า profile</span>
            <b>${vsProfileText || '-'}</b>
            <span class="muted">โปรตีนต่อ kg</span>
            <b style="color:${flagColor(proj.proteinFlag)}">${proj.wKg > 0 ? proj.proteinPerKg.toFixed(2) + ' g/kg' : '-'}</b>
          </div>
        </div>
      ` : ''}

      <button class="btn block lg mt2" data-act="generate-plan">${isOneDay ? '🪄 สร้างแผนวันนี้' : '🪄 สร้างแผน'}</button>
      <div style="height:30px"></div>
    </div>
    ${bottomNavHtml('')}
  `;
}

// v1.10.14 — Meal plan result: shows N days with totals + per-meal swap
// v1.10.19 — swap opens bottom-sheet drawer · 📋 opens modify mode (not log mode)
function renderMealPlanResult() {
  const t = state.tmp;
  const plan = t.plan;
  if (!plan) {
    return `<div class="screen"><div class="header"><button class="icon-btn" data-act="back">←</button><h1>ยังไม่มีแผน</h1></div></div>`;
  }
  const cfg = plan.config;
  // v1.10.18 — 1-day mode: "ยืนยันบันทึก" button instead of just preview
  // v1.10.21 — count includes fixed slot (it gets logged too via snapshot)
  const isOneDay = cfg.days === 1;
  const loggableCount = isOneDay
    ? plan.days[0].meals.filter(m => (m.slot === 'meal' && m.mealId) || m.slot === 'fixed').length
    : 0;

  // v1.10.19 — swap drawer (bottom sheet)
  // v1.10.20 — show all alternatives (no slice) + search input · budget filter
  // relaxes 1.5× → 3× when searching so user can find specific big meals.
  let drawerHtml = '';
  if (t.swapDrawer) {
    const sd = t.swapDrawer;
    const day = plan.days.find(d => d.day === sd.day);
    const meal = day?.meals[sd.idx];
    if (meal) {
      const slotTarget = meal.cal;
      const dayMealIds = day.meals.filter(m => m.mealId).map(m => m.mealId);
      const proteinGap = Math.max(0, cfg.proteinMin - day.totalProtein + meal.protein);
      const searchText = t.swapDrawerSearch || '';
      const alts = alternativesForSlot(meal.mealId, slotTarget, proteinGap, dayMealIds, Infinity, searchText);
      const hasSearch = searchText.trim().length > 0;
      drawerHtml = `
        <div class="modal-back" data-act="swap-drawer-close">
          <div class="modal" data-act="noop" style="max-height:85vh;display:flex;flex-direction:column">
            <div class="row between" style="margin-bottom:6px;flex-shrink:0">
              <h3 style="margin:0;font-size:18px">🔄 เปลี่ยนเป็น...</h3>
              <button class="icon-btn ghost" data-act="swap-drawer-close" style="font-size:18px">✕</button>
            </div>
            <div class="hint" style="font-size:12px;margin-bottom:8px;flex-shrink:0">เป้าโดยประมาณ ~${fmt(slotTarget)} cal · ปัจจุบัน: ${meal.emoji} ${h(meal.name)}</div>
            <div class="field" style="margin-bottom:8px;flex-shrink:0">
              <input id="swap-search" type="text" class="input" placeholder="🔍 ค้นชื่อเมนู (ค้นเจอจะขยายช่วงงบ)" value="${h(searchText)}" autocomplete="off" style="height:40px">
            </div>
            <div class="hint" style="font-size:11.5px;margin-bottom:6px;flex-shrink:0;color:${alts.length > 0 ? 'var(--ink-2)' : 'var(--red)'}">
              ${alts.length > 0
                ? `พบ <b>${alts.length}</b> รายการ${hasSearch ? ` · ขยายช่วงงบเป็น ~${fmt(slotTarget * 3)} cal` : ` · ในงบ ~${fmt(slotTarget * 1.5)} cal`}`
                : hasSearch ? 'ไม่พบเมนูที่ตรงกับคำค้น' : 'ไม่มีเมนูใกล้เคียงในงบ'}
            </div>
            <div style="overflow-y:auto;flex:1;min-height:0;-webkit-overflow-scrolling:touch">
              ${alts.length === 0 ? `
                <div class="card empty"><div class="muted">${hasSearch ? 'ลองคำอื่น หรือล้างคำค้น' : 'ลองพิมพ์คำค้น เพื่อขยายช่วงงบ'}</div></div>
              ` : alts.map(alt => {
                const isFav = state.favorites.includes(alt.id);
                const overBudget = alt.baseCalories > slotTarget * 1.5;
                return `
                  <div class="row" data-act="swap-drawer-pick" data-id="${alt.id}" style="gap:10px;align-items:center;padding:10px 6px;border-bottom:1px solid var(--line);cursor:pointer">
                    <div style="font-size:26px;flex-shrink:0">${alt.emoji || '🍽️'}</div>
                    <div style="flex:1;min-width:0">
                      <div style="font-weight:500;font-size:14px">${isFav ? '⭐ ' : ''}${h(alt.name)}${overBudget ? ` <span style="color:var(--amber);font-size:11px">(เกินงบ)</span>` : ''}</div>
                      <div class="muted" style="font-size:12px">${fmt(alt.baseCalories)} cal · P ${fmt(alt.protein_g, 0)}g · F ${fmt(alt.fat_g, 0)}g</div>
                    </div>
                    <div style="color:var(--primary-dark);font-weight:700">→</div>
                  </div>
                `;
              }).join('')}
            </div>
            <button class="btn ghost block sm" data-act="swap-drawer-close" style="margin-top:8px;flex-shrink:0">ยกเลิก</button>
          </div>
        </div>
      `;
    }
  }

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1 style="flex:1;font-size:18px">📋 ${isOneDay ? 'แผนวันนี้' : `แผน ${cfg.days} วัน`}</h1>
        <button class="icon-btn ghost" data-act="regenerate-plan" title="สร้างใหม่">🔄</button>
      </div>
      <div class="card" style="background:var(--primary-soft);border:1.5px solid var(--primary)">
        <div class="row between"><span>🔥 ${isOneDay ? 'รวมวันนี้' : 'เฉลี่ย/วัน'}</span><b>${fmt(plan.avgCal)} kcal</b></div>
        <div class="row between"><span>🥩 โปรตีน${isOneDay ? '' : '/วัน'}</span><b>${fmt(plan.avgProtein, 0)} g</b></div>
        <div class="row between"><span class="muted">🎯 เป้าที่ตั้ง</span><span class="muted">${fmt(cfg.calPerDay)} cal · ${fmt(cfg.proteinMin)}g protein</span></div>
      </div>

      ${plan.days.map(day => `
        <div class="card mt">
          ${isOneDay ? '' : `
            <div class="row between" style="margin-bottom:8px">
              <b>วัน ${day.day}</b>
              <span class="muted" style="font-size:13px">${fmt(day.totalCal)} cal · P ${fmt(day.totalProtein, 0)}g</span>
            </div>
          `}
          ${day.meals.map((meal, mIdx) => `
            <div class="row" style="gap:10px;align-items:center;padding:8px 0;${mIdx === 0 && isOneDay ? '' : 'border-top:1px solid var(--line)'}">
              <div style="font-size:24px">${meal.emoji}</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:500;font-size:14px">${meal.slot === 'fixed' ? '🔒 ' : ''}${h(meal.name)}${meal.sizePct && meal.sizePct !== 100 ? ` <span class="muted" style="font-size:11.5px">(${meal.sizePct}%)</span>` : ''}${meal.quantity > 1 ? ` <span class="muted" style="font-size:11.5px">× ${meal.quantity}</span>` : ''}</div>
                <div class="muted" style="font-size:12px">${fmt(meal.cal)} cal · P ${fmt(meal.protein, 0)}g</div>
              </div>
              ${meal.slot === 'meal' && meal.mealId ? `
                <button class="icon-btn ghost" data-act="swap-plan-meal" data-day="${day.day}" data-idx="${mIdx}" title="เปลี่ยนเมนู" style="font-size:16px">🔄</button>
                <button class="icon-btn ghost" data-act="goto-plan-meal-edit" data-day="${day.day}" data-idx="${mIdx}" title="ปรับขนาด/Add-on" style="font-size:14px">📋</button>
              ` : ''}
            </div>
          `).join('')}
        </div>
      `).join('')}

      ${isOneDay && loggableCount > 0 ? `
        <button class="btn green block lg mt2" data-act="confirm-1day-plan" style="font-size:16px">✅ ยืนยัน — บันทึกทั้ง ${loggableCount} มื้อให้วันนี้</button>
        <div class="hint" style="font-size:12px;margin-top:6px;text-align:center">💡 กด 🔄 เปลี่ยนเมนู · 📋 ปรับขนาด/add-on · เสร็จแล้วกดยืนยัน</div>
      ` : `
        <div class="hint" style="font-size:12px;margin-top:14px;text-align:center">💡 กด 🔄 เปลี่ยนเมนู · กด 📋 เพื่อปรับขนาด/add-on</div>
      `}
      <div style="height:30px"></div>
    </div>
    ${drawerHtml}
    ${bottomNavHtml('')}
  `;
}

// v1.10.13 — Real-time meal suggester: "มื้อต่อไปกินอะไรดี?"
// v1.10.16 — user-controlled splitter (1/2/3 meals left) + custom tolerance
// (preset ±10/±25/±50 or free-input up to 50). Replaces "stuff into one meal"
// percentage-based logic with per-meal target + hard ±cal filter.
// v1.10.22 — shows ALL matches (no slice). Adds search, sort selector
// (score/protein/cal-asc), favorites-only toggle, compact row design.
function renderSuggestView() {
  const u = currentUser();
  if (!u) return '';
  const entries = todayEntries();
  const totals = sumEntries(entries);
  const baseTarget = effectiveCalorieTarget(u.id);
  const protTarget = effectiveProteinTarget(u.id);
  const incExercise = activityIncludesExercise(u);
  const burned = !incExercise ? sumActivitiesBurn(u.id) : 0;
  const dayBudget = baseTarget + burned;
  const remainingCal = Math.max(0, dayBudget - totals.calories);
  const proteinGap = Math.max(0, protTarget - totals.protein_g);

  // Smart default: more meals if budget is large
  const defaultMealsLeft = remainingCal > 2000 ? 3 : remainingCal > 1200 ? 2 : 1;
  const mealsLeft = Math.max(1, Math.min(3, state.tmp.mealsLeft ?? defaultMealsLeft));
  const tolerance = Math.max(5, Math.min(50, state.tmp.tolerance ?? 25));
  const targetPerMeal = remainingCal / mealsLeft;
  const proteinPerMeal = proteinGap / mealsLeft;
  // v1.10.22 — list controls
  const sort = state.tmp.suggestSort || 'score';
  const favOnly = !!state.tmp.suggestFavOnly;
  const searchText = state.tmp.suggestSearch || '';
  const hasSearch = searchText.trim().length > 0;

  const recentIds = entries.map(e => e.mealId);
  const suggestions = suggestMealsForBudget(remainingCal, mealsLeft, tolerance, proteinGap, recentIds, Infinity, {
    searchText, sort, favOnly
  });

  // Empty-state messages tuned to which control caused the empty list
  let emptyMsg;
  if (remainingCal < 100) emptyMsg = '🎉 งบเต็มวันแล้ว — ไม่ต้องกินเพิ่ม';
  else if (favOnly) emptyMsg = `⭐ ไม่มี favorites ในช่วง ±${tolerance} cal · ลองปิด "เฉพาะ favorites" หรือเพิ่ม tolerance`;
  else if (hasSearch) emptyMsg = `🔍 ไม่พบ "${h(searchText)}" ในช่วง ±${tolerance} cal · ลองคำอื่น`;
  else emptyMsg = `ไม่พบเมนูในช่วง ±${tolerance} cal จาก ${fmt(targetPerMeal)} kcal<br><span style="font-size:12px">ลองเพิ่ม tolerance หรือเปลี่ยนจำนวนมื้อ</span>`;

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1 style="flex:1;font-size:18px">🍽️ มื้อต่อไปกินอะไรดี?</h1>
      </div>
      <div class="card" style="background:var(--primary-soft);border:1.5px solid var(--primary);margin-bottom:10px">
        <div class="row between"><span>📊 งบเหลือวันนี้</span><b style="color:var(--primary-dark);font-size:18px">${fmt(remainingCal)} kcal</b></div>
        ${proteinGap > 5 ? `<div class="row between"><span class="muted">ขาดโปรตีน</span><b style="color:var(--amber)">${fmt(proteinGap, 0)} g</b></div>` : ''}
      </div>

      <div class="card" style="margin-bottom:10px">
        <label style="font-weight:600;font-size:14px">🍱 เหลือกินอีก (รวมมื้อนี้)</label>
        <div class="seg mt">
          ${[1, 2, 3].map(n => `<button type="button" class="${mealsLeft === n ? 'on' : ''}" data-act="set-meals-left" data-v="${n}">${n} มื้อ</button>`).join('')}
        </div>
        <div class="hint" style="font-size:12px;margin-top:6px;line-height:1.5">
          → เป้ามื้อนี้: <b style="color:var(--primary-dark)">${fmt(targetPerMeal)} kcal</b>${proteinPerMeal > 5 ? ` · โปรตีน ~${fmt(proteinPerMeal, 0)}g` : ''}
        </div>
      </div>

      <div class="card" style="margin-bottom:10px">
        <label style="font-weight:600;font-size:14px">📐 ความคลาดเคลื่อนที่ยอมรับ</label>
        <div class="seg mt">
          ${[10, 25, 50].map(n => `<button type="button" class="${tolerance === n ? 'on' : ''}" data-act="set-tolerance" data-v="${n}">±${n}</button>`).join('')}
        </div>
        <div class="row mt" style="gap:8px;align-items:center">
          <span class="hint" style="font-size:12px">หรือกำหนดเอง:</span>
          <input id="suggest-tolerance-input" type="number" inputmode="numeric" class="input" value="${tolerance}" min="5" max="50" step="1" style="max-width:90px;text-align:center;height:36px">
          <span class="hint" style="font-size:12px">cal (สูงสุด 50)</span>
        </div>
      </div>

      <div class="card" style="margin-bottom:10px">
        <div class="field" style="margin-bottom:8px">
          <input id="suggest-search" type="text" class="input" placeholder="🔍 ค้นชื่อเมนู (เช่น ข้าว, สลัด)" value="${h(searchText)}" autocomplete="off" style="height:40px">
        </div>
        <div class="seg" style="margin-bottom:8px">
          <button type="button" class="${sort === 'score' ? 'on' : ''}" data-act="set-suggest-sort" data-v="score">🎯 ใกล้เป้า</button>
          <button type="button" class="${sort === 'protein' ? 'on' : ''}" data-act="set-suggest-sort" data-v="protein">💪 โปรตีนสูง</button>
          <button type="button" class="${sort === 'cal-asc' ? 'on' : ''}" data-act="set-suggest-sort" data-v="cal-asc">🔥 แคลน้อย</button>
        </div>
        <div class="row between" style="align-items:center;gap:8px">
          <button type="button" class="btn ${favOnly ? '' : 'ghost'} sm" data-act="toggle-suggest-fav-only" style="font-size:13px;padding:6px 12px">${favOnly ? '⭐ เฉพาะ favorites' : '☆ เฉพาะ favorites'}</button>
          <span class="muted" style="font-size:12.5px">📊 พบ <b style="color:var(--primary-dark)">${suggestions.length}</b> เมนู</span>
        </div>
      </div>

      ${suggestions.length === 0 ? `
        <div class="card empty"><div class="muted">${emptyMsg}</div></div>
      ` : suggestions.map((m, idx) => `
        <div class="card" data-act="goto-meal-detail-from-suggest" data-id="${m.id}" style="margin-bottom:8px;padding:10px 12px;cursor:pointer;${idx === 0 && sort === 'score' && !hasSearch && !favOnly ? 'border:1.5px solid var(--primary)' : ''}">
          <div class="row" style="gap:10px;align-items:center">
            <div style="font-size:28px;flex-shrink:0">${m.emoji || '🍽️'}</div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:14.5px">${idx === 0 && sort === 'score' && !hasSearch && !favOnly ? '⭐ ' : ''}${state.favorites.includes(m.id) && !(idx === 0 && sort === 'score' && !hasSearch && !favOnly) ? '⭐ ' : ''}${h(m.name)}</div>
              <div class="muted" style="font-size:12px;margin-top:1px">${fmt(m.baseCalories)} cal · P ${fmt(m.protein_g, 0)}g · C ${fmt(m.carbs_g, 0)}g · F ${fmt(m.fat_g, 0)}g</div>
              <div class="hint" style="font-size:11px;margin-top:2px;color:var(--ink-2)">${suggestReasoning(m, targetPerMeal, tolerance, proteinPerMeal)}</div>
            </div>
            <button class="btn green sm" data-act="quick-log-suggested" data-id="${m.id}" style="flex-shrink:0;padding:8px 12px;font-size:13px">✅ บันทึก</button>
          </div>
        </div>
      `).join('')}
      <div style="height:30px"></div>
    </div>
    ${bottomNavHtml('home')}
  `;
}

// v1.10.12 — Similar-meals view: shows meals with macros close to the source meal.
// Reachable from meal-detail via the "🔄 ดูเมนูที่คล้ายกัน" button.
function renderSimilarMealsView() {
  const t = state.tmp;
  const source = t.sourceMeal || (t.sourceMealId ? findMeal(t.sourceMealId) : null);
  if (!source) {
    return `<div class="screen"><div class="header"><button class="icon-btn" data-act="back">←</button><h1>ไม่พบเมนูต้นทาง</h1></div></div>`;
  }
  const similar = findSimilarMeals(source, 12);
  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1 style="flex:1;font-size:18px">🔄 เมนูคล้ายกัน</h1>
      </div>
      <div class="card tight" style="background:var(--primary-soft);border:1.5px solid var(--primary);margin-bottom:8px">
        <div class="row" style="gap:10px">
          <div style="font-size:28px">${source.emoji || '🍽️'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600">${h(source.name)}</div>
            <div class="muted" style="font-size:13px">${fmt(source.baseCalories)} kcal · P ${fmt(source.protein_g, 0)}g · C ${fmt(source.carbs_g, 0)}g · F ${fmt(source.fat_g, 0)}g</div>
          </div>
        </div>
        <div class="hint" style="font-size:11.5px;margin-top:6px">เมนูด้านล่างมีค่าโภชนาการใกล้เคียง — กดเลือกเพื่อดูรายละเอียด/log แทน</div>
      </div>
      <h2 style="margin:8px 0">ตัวเลือกใกล้เคียง</h2>
      ${similar.length === 0 ? `
        <div class="card empty"><div class="muted">ไม่พบเมนูที่คล้ายกันใน database</div></div>
      ` : similar.map(m => {
        const dCal = m.baseCalories - source.baseCalories;
        const dProt = (m.protein_g || 0) - (source.protein_g || 0);
        return `
          <div class="meal-item" data-act="pick-meal" data-id="${m.id}">
            <div class="emo">${m.emoji || '🍽️'}</div>
            <div class="body">
              <div class="name">${h(m.name)}</div>
              <div class="sub">
                ${fmt(m.baseCalories)} cal
                <span style="color:${dCal === 0 ? 'var(--muted)' : dCal < 0 ? 'var(--green)' : 'var(--amber)'};font-size:12px">(${dCal > 0 ? '+' : ''}${fmt(dCal)})</span>
                · P ${fmt(m.protein_g, 0)}g
                <span style="color:${dProt < 0 ? 'var(--amber)' : 'var(--green)'};font-size:12px">(${dProt > 0 ? '+' : ''}${fmt(dProt, 0)})</span>
              </div>
            </div>
            <div class="cal">${fmt(m.baseCalories)}</div>
          </div>
        `;
      }).join('')}
      <div style="height:30px"></div>
    </div>
    ${bottomNavHtml('')}
  `;
}

function renderHistoryDay() {
  const date = state.tmp.date;
  const u = currentUser();
  const entries = ((state.logs[state.currentUserId] || {})[date] || []).slice();
  const totals = sumEntries(entries);
  const baseTarget = effectiveCalorieTarget(state.currentUserId);
  const tdee = u ? calcTDEE(u) : 2000;
  const incExercise = u ? activityIncludesExercise(u) : false;
  const goalAdj = u ? effectiveGoalAdjust(u) : 0;
  const exerciseBurn = incExercise ? 0 : sumActivitiesBurn(state.currentUserId, date);
  const dayBudget = baseTarget + exerciseBurn;
  const totalBurn = tdee + exerciseBurn;
  const energyDelta = totals.calories - totalBurn;
  const goalDelta = energyDelta - goalAdj;
  const deltaColor = energyDelta < 0 ? 'var(--green)' : energyDelta > 0 ? 'var(--amber)' : 'var(--ink)';

  // v1.10.3 — backdate eligibility (today doesn't need this UI; > 30 days is locked)
  const today = todayKey();
  const isToday = date === today;
  const isFuture = date > today;
  const ago = isFuture ? -1 : daysBetween(date, today);
  const canBackdate = !isToday && !isFuture && ago <= 30;

  // Activities for this day (for review + delete)
  const dayActs = todayActivities(state.currentUserId, date);
  const allowsActivityLog = u && !incExercise;

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1 style="flex:1">${formatDateTH(date)}${isToday ? ' <span class="badge">วันนี้</span>' : ''}</h1>
      </div>
      <div class="card">
        <div class="row between"><span>แคลอรี่กิน</span><b style="color:var(--primary-dark);font-size:20px">${fmt(totals.calories)} kcal</b></div>
        <div class="row between"><span class="muted">งบรายวัน</span><span>${fmt(dayBudget)} kcal${exerciseBurn > 0 ? ` <span class="muted" style="font-size:12px">(${fmt(baseTarget)} + ${fmt(exerciseBurn)} ออกกำลัง)</span>` : ''}</span></div>
        ${entries.length > 0 ? `
          <div class="row between"><span class="muted">เผารวม</span><span>${fmt(totalBurn)} kcal</span></div>
          <div class="row between"><span>ส่วนต่าง</span><b style="color:${deltaColor}">${energyDelta === 0 ? '0' : (energyDelta < 0 ? '−' : '+') + fmt(Math.abs(energyDelta))} kcal</b></div>
          <div class="row between"><span class="muted">เป้า</span><span class="muted">${goalAdj > 0 ? '+' : ''}${goalAdj} kcal/วัน · vs goal ${goalDelta === 0 ? '0' : (goalDelta < 0 ? '−' : '+') + fmt(Math.abs(goalDelta))}</span></div>
        ` : ''}
        <div class="facts">
          <div><div class="v">${fmt(totals.protein_g, 1)} ก.</div><div class="l">โปรตีน</div></div>
          <div><div class="v">${fmt(totals.carbs_g, 1)} ก.</div><div class="l">คาร์บ</div></div>
          <div><div class="v">${fmt(totals.fat_g, 1)} ก.</div><div class="l">ไขมัน</div></div>
        </div>
      </div>

      <h2 style="margin-top:14px">🍽️ มื้ออาหาร (${entries.length})</h2>
      ${entries.length === 0 ? `<div class="card empty"><div class="muted">ไม่มีรายการ</div></div>` : entries.map(e => logEntryHtml(e)).join('')}

      ${dayActs.length > 0 ? `
        <h2 style="margin-top:14px">💪 กิจกรรม (${dayActs.length} · เผา ${fmt(exerciseBurn)} kcal)</h2>
        ${dayActs.map(a => {
          const at = ACTIVITY_TYPES.find(x => x.id === a.type) || ACTIVITY_TYPES[ACTIVITY_TYPES.length - 1];
          const intLabel = a.intensity ? ACTIVITY_INTENSITY_LABELS[a.intensity]?.name : '';
          const sourceTag = a.source === 'manual' ? (a.sourceNote || 'manual') : 'MET';
          return `
            <div class="activity-item">
              <div class="emo">${at.emoji}</div>
              <div class="body">
                <div class="name">${h(at.name)}${intLabel ? ' ' + h(intLabel) : ''} · ${a.durationMin || 0} นาที</div>
                <div class="sub">จาก ${h(sourceTag)}</div>
              </div>
              <div class="burn">-${fmt(a.caloriesBurned)} kcal</div>
              <button class="del" data-act="delete-activity-historical" data-id="${a.id}" data-date="${date}" aria-label="ลบ">🗑️</button>
            </div>
          `;
        }).join('')}
      ` : ''}

      ${canBackdate ? `
        <div class="card mt" style="border:1.5px dashed var(--primary);background:var(--primary-soft)">
          <div style="font-weight:600;font-size:14px;color:var(--primary-dark);margin-bottom:8px">📅 บันทึกย้อนหลังสำหรับวันนี้</div>
          <button class="btn block" data-act="nav-add-meal-backdate" style="margin-bottom:8px">+ เพิ่มเมนูย้อนหลัง</button>
          <button class="btn secondary block" data-act="nav-add-special-backdate" style="margin-bottom:8px;background:linear-gradient(135deg,#fde7c8,#fbcb8d);color:#5a2e00;border:1.5px solid #e8a766">🎉 เพิ่มมื้อพิเศษย้อนหลัง</button>
          ${allowsActivityLog ? `<button class="btn secondary block" data-act="nav-add-activity-backdate">+ เพิ่มกิจกรรมย้อนหลัง</button>` : ''}
        </div>
      ` : ''}
      ${isFuture ? `<div class="callout" style="background:var(--amber-soft);color:#92400e">⚠️ วันในอนาคต — ยังบันทึกไม่ได้</div>` : ''}
      ${!isToday && !isFuture && ago > 30 ? `<div class="callout" style="background:var(--amber-soft);color:#92400e">⚠️ ย้อนหลังเกิน 30 วัน — ไม่สามารถเพิ่มรายการใหม่ได้ (แก้ของเดิมได้ผ่านปุ่มลบ)</div>` : ''}

      <div style="height:30px"></div>
    </div>
  `;
}

// v1.10.27 — Range-based reports (T-009). Replaces month-nav with
// segmented [7][14][30][90] · adds 3 new daily-trend charts (calorie line,
// energy balance bars, protein bars) · keeps existing weight chart but driven
// by range.
// v1.10.29 — T-011: adds custom-range mode with native date pickers.
function renderReports() {
  const u = currentUser();
  if (!u) return '';
  const t = state.tmp;
  const rangeDays = [7, 14, 30, 90].includes(t.rangeDays) ? t.rangeDays : 30;
  const rangeMode = t.rangeMode === 'custom' ? 'custom' : 'rolling';

  // Build rangeSpec for aggregate
  let rangeSpec;
  let rangeLabel;
  if (rangeMode === 'custom' && t.customStart && t.customEnd) {
    // Clamp end to today (display side; aggregate auto-handles via keysBetween)
    const today = todayKey();
    const cs = t.customStart;
    let ce = t.customEnd > today ? today : t.customEnd;
    rangeSpec = { start: cs, end: ce };
    // Build label "D MMM – D MMM"
    const fmtShort = (k) => {
      const d = keyToDate(k);
      const m = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
      return `${d.getDate()} ${m[d.getMonth()]}`;
    };
    const swap = cs > ce;
    rangeLabel = swap
      ? `${fmtShort(ce)} – ${fmtShort(cs)}`
      : `${fmtShort(cs)} – ${fmtShort(ce)}`;
  } else {
    rangeSpec = rangeDays;
    rangeLabel = `${rangeDays} วันล่าสุด`;
  }
  const agg = rangeAggregate(u.id, rangeSpec);
  const protTarget = effectiveProteinTarget(u.id);

  // Range start/end keys for filtering weights
  const rStart = agg.days[0].key;
  const rEnd = agg.days[agg.days.length - 1].key;
  const rangeWeights = (u.weights || []).filter(w => w.date >= rStart && w.date <= rEnd).sort((a, b) => a.date.localeCompare(b.date));
  const wStart = rangeWeights[0];
  const wEnd = rangeWeights[rangeWeights.length - 1];
  const wChange = (wStart && wEnd) ? (wEnd.weight_kg - wStart.weight_kg) : null;

  // v1.10.30 — T-012: waist data in range
  const rangeWaist = (u.waist || []).filter(w => w.date >= rStart && w.date <= rEnd).sort((a, b) => a.date.localeCompare(b.date));
  const waistStart = rangeWaist[0];
  const waistEnd = rangeWaist[rangeWaist.length - 1];
  const waistChange = (waistStart && waistEnd) ? (waistEnd.waist_cm - waistStart.waist_cm) : null;
  const waistFlagRpt = waistEnd ? waistHealthFlag(u, waistEnd.waist_cm) : null;
  const waistFlagColor = waistFlagRpt ? (waistFlagRpt.color === 'green' ? 'var(--green)' : waistFlagRpt.color === 'red' ? 'var(--red)' : 'var(--amber)') : '';
  const waistFlagBg = waistFlagRpt ? (waistFlagRpt.color === 'green' ? 'var(--green-soft)' : waistFlagRpt.color === 'red' ? 'var(--red-soft)' : 'var(--amber-soft)') : '';

  // Real energy delta (includes exercise per day) — projection from this is accurate
  const avgEnergyDelta = agg.avg.energyDelta;        // − = avg deficit, + = avg surplus
  const avgGoalDelta = agg.avg.goalDelta;            // 0 = average day on goal
  const avgExerciseBurn = Math.round(agg.avg.exerciseBurn);
  const projKg = agg.loggedCount > 0 ? (avgEnergyDelta * 30) / KCAL_PER_KG_FAT : 0;
  const goalCat = goalCategory(u);
  const goalAdjRpt = effectiveGoalAdjust(u);
  const tdeeRpt = calcTDEE(u);

  // Goal-aware status framing (same logic as dashboard ring)
  let rptStatus, rptStatusColor;
  if (goalCat === 'lose') {
    if (avgGoalDelta < -500)      { rptStatus = '⚠️ ขาดดุลเยอะเกินไป — เสี่ยงเสียกล้าม'; rptStatusColor = 'var(--red)'; }
    else if (avgGoalDelta < -150) { rptStatus = '💪 ขาดดุลเกินแผน — ลดเร็วกว่าคาด'; rptStatusColor = 'var(--green)'; }
    else if (avgGoalDelta < 150)  { rptStatus = '🎯 ตามแผนเป๊ะ'; rptStatusColor = 'var(--green)'; }
    else if (avgGoalDelta < 400)  { rptStatus = 'กินเกินแผนเล็กน้อย'; rptStatusColor = 'var(--amber)'; }
    else                           { rptStatus = '⚠️ กินเกินแผนเยอะ — น้ำหนักอาจไม่ลด'; rptStatusColor = 'var(--red)'; }
  } else if (goalCat === 'gain') {
    if (avgGoalDelta < -300)      { rptStatus = '⚠️ ยังกินไม่ถึงเป้า surplus'; rptStatusColor = 'var(--amber)'; }
    else if (avgGoalDelta < -100) { rptStatus = 'เกือบถึงเป้า surplus'; rptStatusColor = 'var(--amber)'; }
    else if (avgGoalDelta < 200)  { rptStatus = '💪 ตามเป้าเพิ่มกล้าม'; rptStatusColor = 'var(--green)'; }
    else if (avgGoalDelta < 500)  { rptStatus = 'กินเกินเป้า — ระวังไขมันเยอะ'; rptStatusColor = 'var(--amber)'; }
    else                           { rptStatus = '⚠️ กินเยอะเกินเป้ามาก'; rptStatusColor = 'var(--red)'; }
  } else {
    if (Math.abs(avgGoalDelta) < 150) { rptStatus = '⚖️ สมดุลดี'; rptStatusColor = 'var(--green)'; }
    else if (avgGoalDelta < 0)        { rptStatus = 'ขาดดุล — น้ำหนักจะลดช้าๆ'; rptStatusColor = 'var(--amber)'; }
    else                               { rptStatus = 'เกินสมดุล — น้ำหนักจะเพิ่ม'; rptStatusColor = 'var(--amber)'; }
  }
  const rptStatusBg = rptStatusColor === 'var(--green)' ? 'var(--green-soft)'
                    : rptStatusColor === 'var(--red)' ? 'var(--red-soft)' : 'var(--amber-soft)';

  const proteinMetDays = agg.days.filter(d => d.logged && d.totals.protein_g >= protTarget).length;
  const proteinGap = protTarget - agg.avg.protein_g;

  const isEmpty = agg.loggedCount === 0 && rangeWeights.length === 0;

  const recommendations = [];
  if (u.goal === 'lose' && wChange !== null && wChange < 0) recommendations.push('✓ รักษาอัตราการลด');
  if (u.goal === 'lose' && wChange !== null && wChange >= 0 && agg.loggedCount >= 7) recommendations.push('⚠️ น้ำหนักไม่ลด ลองลดแคลเฉลี่ย 200/วัน');
  if (proteinGap > 5) recommendations.push(`✓ เพิ่มโปรตีนอีก ${fmt(proteinGap)} ก./วัน`);
  if (agg.avg.sugar_g > SUGAR_DAILY_LIMIT_G) recommendations.push('⚠️ ลดน้ำตาลลงครึ่งหนึ่ง');
  if (agg.loggedCount / agg.totalDays < 0.6 && agg.loggedCount > 0) recommendations.push('💡 บันทึกให้สม่ำเสมอขึ้น');
  if (agg.streak >= 7) recommendations.push(`🏆 บันทึกต่อเนื่อง ${agg.streak} วัน!`);

  // v1.10.28 (T-010): chart selection state for tap-to-read details
  const chartSel = t.chartSelection || null;
  const selIdx = (chartId) => chartSel && chartSel.chartId === chartId ? chartSel.idx : null;
  const selDay = (chartId) => {
    const idx = selIdx(chartId);
    return idx != null && agg.days[idx] ? agg.days[idx] : null;
  };

  // Chart configs
  const calorieChart = svgDailyLineChart(agg.days, {
    valueFn: d => d.totals.calories,
    targetFn: d => d.totalBurn,    // v1.10.28: now rendered per-day (was flat-avg bug)
    color: '#d97706',
    targetColor: '#9ca3af',
    label: 'แคลอรี่รายวัน',
    chartId: 'cal',
    selectedIdx: selIdx('cal')
  });
  const balanceChart = svgDailyBarChart(agg.days, {
    valueFn: d => d.energyDelta,
    colorFn: v => v < 0 ? '#10b981' : v > 0 ? '#f59e0b' : '#9ca3af',
    zeroLine: true,
    label: 'ส่วนต่างพลังงานรายวัน',
    chartId: 'bal',
    selectedIdx: selIdx('bal')
  });
  const proteinChart = svgDailyBarChart(agg.days, {
    valueFn: d => d.totals.protein_g,
    colorFn: v => v >= protTarget ? '#10b981' : '#f59e0b',
    targetLine: protTarget,
    label: 'โปรตีนรายวัน',
    chartId: 'prot',
    selectedIdx: selIdx('prot')
  });

  // v1.10.28 (T-010): per-chart detail-box renderers (shown when a day is selected)
  function chartDetailCal(d) {
    if (!d) return '';
    const date = formatDateTH(d.key);
    if (!d.logged) return `<div class="chart-detail">📅 ${date} · ไม่ได้บันทึก</div>`;
    const delta = d.energyDelta;
    const sign = delta < 0 ? '−' : '+';
    return `<div class="chart-detail">📅 ${date} · กิน <b>${fmt(d.totals.calories)}</b> · เผารวม <b>${fmt(d.totalBurn)}</b> ${d.exerciseBurn > 0 ? `<span class="muted">(TDEE ${fmt(tdeeRpt)} + ออกกำลัง ${fmt(d.exerciseBurn)})</span>` : `<span class="muted">(TDEE)</span>`} · ส่วนต่าง <b style="color:${delta < 0 ? 'var(--green)' : delta > 0 ? 'var(--amber)' : 'var(--ink)'}">${sign}${fmt(Math.abs(delta))}</b></div>`;
  }
  function chartDetailBal(d) {
    if (!d) return '';
    const date = formatDateTH(d.key);
    if (!d.logged) return `<div class="chart-detail">📅 ${date} · ไม่ได้บันทึก</div>`;
    const delta = d.energyDelta;
    const sign = delta < 0 ? '−' : '+';
    const label = delta < 0 ? 'ขาดดุล' : delta > 0 ? 'ส่วนเกิน' : 'สมดุล';
    return `<div class="chart-detail">📅 ${date} · ส่วนต่าง <b style="color:${delta < 0 ? 'var(--green)' : delta > 0 ? 'var(--amber)' : 'var(--ink)'}">${sign}${fmt(Math.abs(delta))} kcal</b> (${label}) · กิน ${fmt(d.totals.calories)} vs เผา ${fmt(d.totalBurn)}</div>`;
  }
  function chartDetailProt(d) {
    if (!d) return '';
    const date = formatDateTH(d.key);
    if (!d.logged) return `<div class="chart-detail">📅 ${date} · ไม่ได้บันทึก</div>`;
    const v = d.totals.protein_g;
    const met = v >= protTarget;
    return `<div class="chart-detail">📅 ${date} · โปรตีน <b>${fmt(v)} g</b> (เป้า ${fmt(protTarget)} g — <b style="color:${met ? 'var(--green)' : 'var(--amber)'}">${met ? 'ผ่าน ✓' : `ขาด ${fmt(protTarget - v)} g`}</b>)</div>`;
  }

  return `
    <div class="screen">
      <div class="header">
        <h1 style="flex:1">📊 รายงาน</h1>
        <button class="icon-btn ghost" data-act="nav-weight" title="น้ำหนัก">⚖️</button>
        <button class="icon-btn ghost" data-act="nav-history" title="ประวัติรายวัน">📅</button>
      </div>

      <div class="seg" style="margin-bottom:${rangeMode === 'custom' ? '6px' : '12px'}">
        ${[7, 14, 30, 90].map(n => `<button type="button" class="${rangeMode === 'rolling' && rangeDays === n ? 'on' : ''}" data-act="set-range-days" data-v="${n}">${n} วัน</button>`).join('')}
        <button type="button" class="${rangeMode === 'custom' ? 'on' : ''}" data-act="set-range-mode" data-mode="custom">📅 กำหนดเอง</button>
      </div>
      ${rangeMode === 'custom' ? `
        <div class="card tight" style="margin-bottom:12px;padding:10px 12px">
          <div class="row" style="gap:8px;align-items:center;flex-wrap:wrap">
            <span class="muted" style="font-size:13px">ตั้งแต่</span>
            <input id="range-start" type="date" class="input" value="${h(t.customStart || '')}" max="${todayKey()}" style="flex:1;min-width:120px;height:36px;font-size:13px">
            <span class="muted" style="font-size:13px">ถึง</span>
            <input id="range-end" type="date" class="input" value="${h(t.customEnd || '')}" max="${todayKey()}" style="flex:1;min-width:120px;height:36px;font-size:13px">
          </div>
          <div class="hint" style="font-size:11.5px;margin-top:6px">${rangeLabel} · ${agg.days.length} วัน</div>
        </div>
      ` : ''}

      ${isEmpty ? `
        <div class="card empty"><div class="big">📊</div><div>ยังไม่มีข้อมูลใน${rangeLabel}</div><div class="muted" style="font-size:14px;margin-top:4px">เริ่มบันทึกเพื่อดูรายงาน</div></div>
      ` : ''}

      ${rangeWeights.length >= 1 ? `
        <div class="stat-card">
          <h3>⚖️ น้ำหนัก (${rangeLabel})</h3>
          <div class="stat-row"><span>เริ่มต้น</span><b>${wStart.weight_kg.toFixed(1)} kg</b></div>
          <div class="stat-row"><span>ล่าสุด</span><b>${wEnd.weight_kg.toFixed(1)} kg</b></div>
          ${wChange !== null && rangeWeights.length > 1 ? `
            <div class="stat-row bold"><span>เปลี่ยนแปลง</span><b style="color:${wChange < 0 ? 'var(--green)' : wChange > 0 ? 'var(--red)' : ''}">${wChange > 0 ? '+' : ''}${wChange.toFixed(1)} kg ${wChange < 0 ? '⬇️' : wChange > 0 ? '⬆️' : ''}</b></div>
            <div class="chart-card mt">${svgLineChart(rangeWeights, movingAverage(rangeWeights, 7))}</div>
          ` : ''}
        </div>
      ` : ''}

      ${rangeWaist.length >= 1 ? `
        <div class="stat-card">
          <h3>📐 รอบเอว (${rangeLabel})</h3>
          <div class="stat-row"><span>เริ่มต้น</span><b>${waistStart.waist_cm.toFixed(1)} cm</b></div>
          <div class="stat-row"><span>ล่าสุด</span><b>${waistEnd.waist_cm.toFixed(1)} cm</b></div>
          ${waistChange !== null && rangeWaist.length > 1 ? `
            <div class="stat-row bold"><span>เปลี่ยนแปลง</span><b style="color:${waistChange < 0 ? 'var(--green)' : waistChange > 0 ? 'var(--red)' : ''}">${waistChange > 0 ? '+' : ''}${waistChange.toFixed(1)} cm ${waistChange < 0 ? '⬇️' : waistChange > 0 ? '⬆️' : ''}</b></div>
            <div class="chart-card mt">${svgLineChart(rangeWaist, movingAverage(rangeWaist, 7, 'waist_cm'), 320, 140, { valueKey: 'waist_cm', ariaLabel: 'กราฟรอบเอว', dotColor: '#818cf8', lineColor: '#e0e7ff', avgColor: '#3730a3' })}</div>
          ` : ''}
          ${waistFlagRpt ? `
            <div class="stat-row mt"><span>waist:height ratio</span><b style="color:${waistFlagColor}">${waistFlagRpt.ratio.toFixed(2)}</b></div>
            <div style="background:${waistFlagBg};color:${waistFlagColor};font-weight:500;font-size:13px;padding:8px 10px;border-radius:8px;margin-top:6px;line-height:1.5">${waistFlagRpt.text}</div>
          ` : ''}
        </div>
      ` : ''}

      ${agg.loggedCount > 0 ? `
        <div class="stat-card">
          <h3>🔥 แคลอรี่ (${rangeLabel}) ${helpHtml('deficit')}</h3>
          <div class="stat-row"><span>กินเฉลี่ย/วัน</span><b>${fmt(agg.avg.calories)} kcal</b></div>
          <div class="stat-row"><span>เผารวมเฉลี่ย/วัน</span><span>${fmt(tdeeRpt + avgExerciseBurn)} kcal${avgExerciseBurn > 0 ? ` <span class="muted" style="font-size:12px">(TDEE ${fmt(tdeeRpt)} + ${fmt(avgExerciseBurn)} ออกกำลัง)</span>` : ''}</span></div>
          <div class="stat-row"><span>ส่วนต่างเฉลี่ย</span><b style="color:${avgEnergyDelta < 0 ? 'var(--green)' : avgEnergyDelta > 0 ? 'var(--amber)' : 'var(--ink)'}">${avgEnergyDelta === 0 ? '0' : (avgEnergyDelta < 0 ? '−' : '+') + fmt(Math.abs(avgEnergyDelta))} kcal/วัน</b></div>
          <div class="stat-row"><span class="muted">เป้าหมาย</span><span class="muted">${goalAdjRpt > 0 ? '+' : ''}${goalAdjRpt} kcal/วัน</span></div>
          <div style="background:${rptStatusBg};color:${rptStatusColor};font-weight:600;font-size:14px;padding:10px 12px;border-radius:10px;margin-top:10px;text-align:center">${h(rptStatus)}</div>
          <div class="hint mt" style="font-size:13px;line-height:1.7">
            💡 ${avgEnergyDelta < 0 ? '−' : '+'}${fmt(Math.abs(avgEnergyDelta))} × 30 ÷ ${KCAL_PER_KG_FAT} = ${projKg < 0 ? '' : '+'}${projKg.toFixed(2)} kg คาดการณ์ใน 30 วัน (จากแคลอย่างเดียว)
          </div>
          ${wChange !== null && Math.abs(wChange - projKg) > 0.5 ? `
            <div class="callout info mt">น้ำหนักเปลี่ยนจริง ${wChange > 0 ? '+' : ''}${wChange.toFixed(1)} kg vs คาดจากแคล ${projKg > 0 ? '+' : ''}${projKg.toFixed(1)} kg — ส่วนต่าง = น้ำในร่างกาย / ความแม่นในการบันทึก</div>
          ` : ''}
          <div class="chart-card mt">
            <div class="hint" style="font-size:11.5px;margin-bottom:4px">📈 กิน (เส้นทึบ) vs เผารวม (เส้นประ) · แตะวันที่ต้องการดูค่า</div>
            ${calorieChart}
            ${chartDetailCal(selDay('cal'))}
          </div>
          <div class="chart-card mt">
            <div class="hint" style="font-size:11.5px;margin-bottom:4px">⚖️ ส่วนต่างพลังงาน · <span style="color:#10b981">เขียว = ขาดดุล</span> · <span style="color:#f59e0b">เหลือง = ส่วนเกิน</span></div>
            ${balanceChart}
            ${chartDetailBal(selDay('bal'))}
          </div>
        </div>

        <div class="stat-card">
          <h3>🥩 โปรตีน (${rangeLabel})</h3>
          <div class="stat-row"><span>เฉลี่ย/วัน</span><b>${fmt(agg.avg.protein_g)} ก.</b></div>
          <div class="stat-row"><span>เป้า</span><span>${fmt(protTarget)} ก.</span></div>
          <div class="stat-row"><span>ผ่านเป้า</span><b>${proteinMetDays}/${agg.loggedCount} วัน (${Math.round((proteinMetDays / agg.loggedCount) * 100)}%)</b></div>
          ${proteinGap > 3 ? `<div class="hint mt">💡 เพิ่ม: ไข่ต้ม 1 ฟอง = +6g / อกไก่ 50g = +15g</div>` : ''}
          <div class="chart-card mt">
            <div class="hint" style="font-size:11.5px;margin-bottom:4px">📊 โปรตีนรายวัน · เส้นประ = เป้า ${fmt(protTarget)}g · เขียว = ผ่าน · เหลือง = ไม่ถึง · แตะวันเพื่อดูค่า</div>
            ${proteinChart}
            ${chartDetailProt(selDay('prot'))}
          </div>
        </div>

        <div class="stat-card">
          <h3>🍚 คาร์บ & น้ำตาล (${rangeLabel})</h3>
          <div class="stat-row"><span>คาร์บเฉลี่ย/วัน</span><b>${fmt(agg.avg.carbs_g)} ก.</b></div>
          <div class="stat-row"><span>น้ำตาลเฉลี่ย/วัน</span><b style="color:${agg.avg.sugar_g > SUGAR_DAILY_LIMIT_G ? 'var(--red)' : agg.avg.sugar_g > SUGAR_WHO_RECOMMENDED_G ? 'var(--amber)' : 'var(--green)'}">${fmt(agg.avg.sugar_g, 1)} ก.</b></div>
          <div class="hint mt">💡 WHO แนะนำ &lt;${SUGAR_WHO_RECOMMENDED_G}g/วัน</div>
        </div>

        <div class="stat-card">
          <h3>📝 การบันทึก (${rangeLabel})</h3>
          <div class="stat-row"><span>วันที่บันทึก</span><b>${agg.loggedCount}/${agg.totalDays} วัน (${Math.round((agg.loggedCount / agg.totalDays) * 100)}%)</b></div>
          <div class="stat-row"><span>มื้อเฉลี่ย/วัน</span><b>${agg.avgMeals.toFixed(1)}</b></div>
          ${agg.streak > 0 ? `<div class="stat-row"><span>streak ปัจจุบัน</span><b>${agg.streak} วันติดต่อ</b></div>` : ''}
        </div>
      ` : ''}

      ${recommendations.length ? `
        <div class="stat-card">
          <h3>🎯 คำแนะนำ</h3>
          ${recommendations.map(r => `<div class="stat-row" style="line-height:1.8">${r}</div>`).join('')}
        </div>
      ` : ''}

      <div style="height:30px"></div>
    </div>
    ${bottomNavHtml('reports')}
  `;
}

// v1.10.30 — T-012: renamed view to body-log to include waist circumference.
// Schema: u.waist[] paired with existing u.weights[]; either-or-both saving.
function renderWeightLog() {
  const u = currentUser();
  if (!u) return '';
  const series30 = sortedWeights(u, 30);
  const avgSeries = movingAverage(series30, 7);
  const latest = latestWeight(u);
  const c30 = weightChangeOver(u, 30);
  const slope = weightTrend(u, 14);
  const projections = slope != null ? {
    week: slope * 7,
    month: slope * 30,
    threeMonths: slope * 90
  } : null;

  let healthFlag = '';
  if (slope != null) {
    const weeklyRate = slope * 7;
    if (weeklyRate < -1) healthFlag = '⚠️ ลดเร็วเกินไป — อาจเสียมวลกล้ามเนื้อ<br>แนะนำ: เพิ่มแคล 200-300/วัน';
    else if (weeklyRate < -0.3) healthFlag = '✅ อัตราการลดที่ปลอดภัย (0.3-1 kg/สัปดาห์)';
    else if (u.goal === 'lose' && weeklyRate > 0.1) healthFlag = '⚠️ น้ำหนักไม่ลด — ตรวจสอบว่ากินเกินเป้าหรือไม่';
    else if (u.goal === 'gain' && weeklyRate > 0.05 && weeklyRate < 0.5) healthFlag = '✅ เพิ่มน้ำหนักปลอดภัย';
    else if (weeklyRate > 1) healthFlag = '⚠️ เพิ่มเร็วเกินไป — อาจได้ไขมันเยอะกว่ากล้ามเนื้อ';
  }

  // v1.10.30 — T-012 waist data
  const waistSeries30 = sortedWaist(u, 30);
  const waistAvg = waistSeries30.length >= 2 ? movingAverage(waistSeries30, 7, 'waist_cm') : null;
  const latestW = latestWaist(u);
  const waistC30 = waistChangeOver(u, 30);
  const waistFlag = latestW ? waistHealthFlag(u, latestW.waist_cm) : null;
  const waistColorVar = waistFlag ? (waistFlag.color === 'green' ? 'var(--green)' : waistFlag.color === 'red' ? 'var(--red)' : 'var(--amber)') : '';
  const waistBg = waistFlag ? (waistFlag.color === 'green' ? 'var(--green-soft)' : waistFlag.color === 'red' ? 'var(--red-soft)' : 'var(--amber-soft)') : '';

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1>📊 บันทึกร่างกาย</h1>
      </div>

      <div class="card">
        <div class="field">
          <label for="wt-input">⚖️ น้ำหนักวันนี้ (กก.)</label>
          <input id="wt-input" type="number" inputmode="decimal" class="input" placeholder="${latest ? latest.weight_kg.toFixed(1) : u.weight || '70'}" min="20" max="300" step="0.1">
        </div>
        <div class="field">
          <label for="waist-input">📐 รอบเอว (ซม. — ถ้ามี)</label>
          <input id="waist-input" type="number" inputmode="decimal" class="input" placeholder="${latestW ? latestW.waist_cm.toFixed(1) : '80'}" min="40" max="200" step="0.1">
        </div>
        <button class="btn block" data-act="save-weight" style="min-height:48px">บันทึก</button>
        <div class="hint mt">ชั่ง/วัดตอนเช้าหลังตื่น (ก่อนกินอาหาร) ให้ผลแม่นที่สุด · กรอกแค่อันใดอันหนึ่งก็ได้</div>
      </div>

      <div class="card tight" data-act="nav-bpc" style="cursor:pointer;background:linear-gradient(135deg,#fef3c7,#fde68a);border-left:3px solid #f59e0b;margin-top:10px">
        <div class="row between" style="align-items:center">
          <div>
            <div style="font-weight:600;font-size:14px;color:#92400e">📊 Body Progress Center</div>
            <div class="muted" style="font-size:12px">รูปถ่าย + น้ำหนัก + รอบเอว + แคล + โปรตีน + training รวมที่เดียว</div>
          </div>
          <div style="color:#92400e;font-weight:700;font-size:18px">→</div>
        </div>
      </div>

      ${series30.length >= 2 ? `
        <div class="card">
          <div class="row between" style="margin-bottom:6px">
            <h3 style="margin:0">📊 30 วันล่าสุด</h3>
            <span class="muted" style="font-size:12px">${series30.length} จุด</span>
          </div>
          <div class="chart-card">${svgLineChart(series30, avgSeries)}</div>
          <div class="hint" style="margin-top:6px">
            <span style="color:#fde7c8">━</span> จุดรายวัน
            &nbsp;&nbsp;
            <span style="color:#b35d00">━</span> เฉลี่ย 7 วัน (smoother)
          </div>
        </div>

        <div class="card">
          <div class="stat-row"><span>ล่าสุด</span><b>${latest.weight_kg.toFixed(1)} kg</b></div>
          ${c30 !== null ? `<div class="stat-row"><span>เปลี่ยน 30 วัน</span><b style="color:${c30 < 0 ? 'var(--green)' : c30 > 0 ? 'var(--red)' : ''}">${c30 > 0 ? '+' : ''}${c30.toFixed(1)} kg</b></div>` : ''}
          ${slope != null ? `
            <div class="stat-row"><span>แนวโน้ม ${helpHtml('weight_trend')}</span><b>${slope > 0 ? '⬆️' : slope < 0 ? '⬇️' : '→'} ${slope >= 0 ? '+' : ''}${(slope * 1000).toFixed(0)} ก./วัน</b></div>
            ${projections ? `
              <div class="hint mt" style="font-size:13px;line-height:1.8">
                💡 ในอัตรานี้:<br>
                &nbsp;&nbsp;• 1 สัปดาห์ = ${projections.week >= 0 ? '+' : ''}${projections.week.toFixed(1)} kg<br>
                &nbsp;&nbsp;• 1 เดือน = ${projections.month >= 0 ? '+' : ''}${projections.month.toFixed(1)} kg<br>
                &nbsp;&nbsp;• 3 เดือน = ${projections.threeMonths >= 0 ? '+' : ''}${projections.threeMonths.toFixed(1)} kg
              </div>
            ` : ''}
            ${healthFlag ? `<div class="callout mt">${healthFlag}</div>` : ''}
          ` : ''}
        </div>
      ` : series30.length === 1 ? `
        <div class="card empty"><div class="big">📈</div><div>บันทึกไว้ 1 จุด</div><div class="muted" style="font-size:14px;margin-top:6px">บันทึกเพิ่มอีกอย่างน้อย 1 จุดเพื่อดูแนวโน้ม</div></div>
      ` : `
        <div class="card empty"><div class="big">⚖️</div><div>ยังไม่มีข้อมูลน้ำหนัก</div><div class="muted" style="font-size:14px;margin-top:6px">บันทึกน้ำหนักวันนี้เพื่อเริ่มต้น</div></div>
      `}

      ${waistSeries30.length >= 2 ? `
        <div class="card">
          <div class="row between" style="margin-bottom:6px">
            <h3 style="margin:0">📐 รอบเอว 30 วันล่าสุด</h3>
            <span class="muted" style="font-size:12px">${waistSeries30.length} จุด</span>
          </div>
          <div class="chart-card">${svgLineChart(waistSeries30, waistAvg, 320, 140, { valueKey: 'waist_cm', ariaLabel: 'กราฟรอบเอว', dotColor: '#818cf8', lineColor: '#e0e7ff', avgColor: '#3730a3' })}</div>
          <div class="hint" style="margin-top:6px">
            <span style="color:#e0e7ff">━</span> จุดรายวัน
            &nbsp;&nbsp;
            <span style="color:#3730a3">━</span> เฉลี่ย 7 วัน
          </div>
        </div>

        <div class="card">
          <div class="stat-row"><span>ล่าสุด</span><b>${latestW.waist_cm.toFixed(1)} cm</b></div>
          ${waistC30 !== null ? `<div class="stat-row"><span>เปลี่ยน 30 วัน</span><b style="color:${waistC30 < 0 ? 'var(--green)' : waistC30 > 0 ? 'var(--red)' : ''}">${waistC30 > 0 ? '+' : ''}${waistC30.toFixed(1)} cm</b></div>` : ''}
          ${waistFlag ? `
            <div class="stat-row"><span>waist:height ratio</span><b style="color:${waistColorVar}">${waistFlag.ratio.toFixed(2)}</b></div>
            <div style="background:${waistBg};color:${waistColorVar};font-weight:500;font-size:13px;padding:8px 10px;border-radius:8px;margin-top:8px;line-height:1.5">${waistFlag.text}</div>
          ` : ''}
        </div>
      ` : waistSeries30.length === 1 ? `
        <div class="card empty"><div class="big">📐</div><div>บันทึกรอบเอวไว้ 1 จุด</div><div class="muted" style="font-size:14px;margin-top:6px">บันทึกเพิ่มอีกอย่างน้อย 1 จุดเพื่อดูแนวโน้ม</div></div>
      ` : ''}

      ${sortedWeights(u).length ? `
        <h2>ประวัติน้ำหนัก</h2>
        ${sortedWeights(u).slice().reverse().slice(0, 60).map(w => `
          <div class="card tight">
            <div class="row between">
              <div>
                <div style="font-weight:500">${formatDateTH(w.date)}</div>
                <div class="muted" style="font-size:12px">${w.date === todayKey() ? 'วันนี้' : ''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <b style="font-size:17px">${w.weight_kg.toFixed(1)} kg</b>
                <button class="icon-btn ghost" data-act="delete-weight" data-v="${w.date}" aria-label="ลบ">🗑️</button>
              </div>
            </div>
          </div>
        `).join('')}
      ` : ''}

      ${sortedWaist(u).length ? `
        <h2>ประวัติรอบเอว</h2>
        ${sortedWaist(u).slice().reverse().slice(0, 60).map(w => `
          <div class="card tight">
            <div class="row between">
              <div>
                <div style="font-weight:500">${formatDateTH(w.date)}</div>
                <div class="muted" style="font-size:12px">${w.date === todayKey() ? 'วันนี้' : ''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <b style="font-size:17px">${w.waist_cm.toFixed(1)} cm</b>
                <button class="icon-btn ghost" data-act="delete-waist" data-v="${w.date}" aria-label="ลบ">🗑️</button>

      <div style="height:30px"></div>

// v1.10.33 — T-013b.1: render up to 3 most recent check-in cards (plain, no
// comparison/timeline — full timeline is T-013c). Each card has Edit + Delete.
function renderBpcCheckinCards(checkIns) {
  if (!checkIns || checkIns.length === 0) return '';
  // checkIns is already sorted newest-first by caller; take up to 3
  const recent = checkIns.slice(0, 3);
  return recent.map((c, i) => {
    const isLatest = i === 0;
    const w = c.weight_kg != null ? Number(c.weight_kg).toFixed(1) + ' กก.' : '—';
    const waist = c.waist_cm != null ? Number(c.waist_cm).toFixed(1) + ' ซม.' : '—';
    const photoIds = c.photoIds || {};
    const chips = ['front', 'side', 'back'].map(angle => {
      const has = !!photoIds[angle];
      const label = angle === 'front' ? 'Front' : angle === 'side' ? 'Side' : 'Back';
      return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:${has ? '#dcfce7' : 'var(--bg-2)'};color:${has ? '#166534' : 'var(--muted)'};margin-right:4px">${has ? '✓' : '—'} ${label}</span>`;
    }).join('');
    const note = c.note ? `<div class="hint mt" style="font-size:11.5px;color:var(--ink-2);line-height:1.5">📝 ${h(c.note)}</div>` : '';
    return `
      <div class="card" style="${isLatest ? 'border:1.5px solid #818cf8' : ''}">
        <div class="row" style="align-items:center;gap:8px;margin-bottom:6px">
          <div style="font-weight:600;font-size:${isLatest ? '15px' : '13.5px'}">${isLatest ? '⭐ ล่าสุด · ' : ''}${h(c.date)}</div>
          ${c.updatedAt ? `<span class="muted" style="font-size:10.5px">· แก้ไขแล้ว</span>` : ''}
        </div>
        <div class="row" style="gap:14px;font-size:13px">
          <div><span class="muted">⚖️</span> <b>${w}</b></div>
          <div><span class="muted">📐</span> <b>${waist}</b></div>
        </div>
        <div class="mt" style="font-size:11.5px">${chips}</div>
        ${note}
        <div class="row mt" style="gap:6px">
          <button class="btn block" data-act="nav-bpc-viewer" data-checkin-id="${h(c.id)}" style="flex:1;font-size:13px;min-height:42px">👁️ ดู</button>
          <button class="btn secondary block" data-act="edit-checkin" data-checkin-id="${h(c.id)}" style="flex:1;font-size:13px;min-height:42px">✏️ แก้ไข</button>
          <button class="btn ghost" data-act="delete-checkin" data-checkin-id="${h(c.id)}" style="color:var(--red);font-size:13px;min-height:42px;padding:0 12px">🗑️</button>
        </div>
      </div>
    `;
  }).join('');
}

// v1.10.32 — T-013b: multi-step weekly check-in capture flow.
// Steps: front (req) → side (req) → back (optional) → review (save)
// Draft persists in localStorage per userId. Photos saved to IndexedDB on capture.
function renderCheckinFlow() {
  const u = currentUser();
  if (!u) return '';
  const t = state.tmp;
  const checkin = t.checkin;
  if (!checkin) {
    return `
      <div class="screen">
        <div class="header"><button class="icon-btn" data-act="back">←</button><h1>Check-in</h1></div>
        <div class="card empty">
          <div class="muted">เกิดข้อผิดพลาด · กลับไปเริ่มใหม่</div>
          <button class="btn block mt" data-act="nav-bpc">← กลับ Body Progress</button>
        </div>
      </div>
    `;
  }
  const step = checkin.step || 'front';
  const steps = ['front', 'side', 'back', 'review'];
  const stepIdx = Math.max(0, steps.indexOf(step));
  const dots = steps.map((s, i) =>
    `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${i <= stepIdx ? '#818cf8' : '#e5e7eb'};margin:0 3px"></span>`
  ).join('');

  let body = '';
  if (step === 'front') body = renderCheckinStepPhoto(checkin, 'front', 'รูปหน้า (Front)', 'จำเป็น', 1);
  else if (step === 'side') body = renderCheckinStepPhoto(checkin, 'side', 'รูปข้าง (Side)', 'จำเป็น', 2);
  else if (step === 'back') body = renderCheckinStepBack(checkin);
  else if (step === 'review') body = renderCheckinReview(u, checkin);

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="checkin-cancel">←</button>
        <h1 style="flex:1;font-size:18px">📸 Check-in สัปดาห์นี้</h1>
      </div>
      <div class="row" style="justify-content:center;margin-bottom:10px">${dots}</div>
      ${body}
      <div style="height:30px"></div>
    </div>
  `;
}

// Review/save sub-renderer
// v1.10.33 — T-013b.1: adds editable date field + edit-mode copy.
// In edit mode, the derived 7-day stats are SNAPSHOT (carried from save time) — not recomputed.
function renderCheckinReview(u, checkin) {
  const isEdit = checkin.mode === 'edit';
  // For new mode, compute live; for edit mode, use the snapshot fields already on the draft
  // (those were copied from the saved check-in when edit started — see edit-checkin handler).
  const derived = isEdit
    ? {
        weight_kg: checkin.weight_kg,
        waist_cm: checkin.waist_cm,
        weight_7day_avg: checkin.weight_7day_avg,
        deficit_7day_avg: checkin.deficit_7day_avg,
        protein_pass_rate: checkin.protein_pass_rate,
        training_count: checkin.training_count,
        strength_count: checkin.strength_count,
        cardio_count: checkin.cardio_count
      }
    : compute7DayCheckinStats(u, checkin.date);
  const weight = checkin.weight_kg != null ? checkin.weight_kg : (derived && derived.weight_kg);
  const waist = checkin.waist_cm != null ? checkin.waist_cm : (derived && derived.waist_cm);
  const note = checkin.note || '';
  const dateVal = checkin.date || todayKey();

  const photoBlock = (angle, label) => {
    const pid = checkin.photoIds[angle];
    const url = pid && state.tmp.checkinPhotoUrls ? state.tmp.checkinPhotoUrls[pid] : null;
    return url
      ? `<div style="flex:1;text-align:center"><img src="${url}" alt="${label}" style="width:100%;max-height:120px;object-fit:cover;border-radius:6px"><div class="hint" style="font-size:11px;margin-top:4px">${label}</div></div>`
      : `<div style="flex:1;text-align:center;background:var(--bg-2);border-radius:6px;padding:30px 6px;color:var(--muted);font-size:11px">— ${label} —<br>(ข้าม)</div>`;
  };

  const statRowOrMissing = (label, value, suffix = '') =>
    value != null
      ? `<div class="stat-row"><span>${label}</span><b>${value}${suffix}</b></div>`
      : `<div class="stat-row"><span>${label}</span><span class="muted" style="font-size:12px">ยังไม่มีข้อมูล</span></div>`;

  return `
    <div class="card">
      <div style="font-weight:600;font-size:15px">Step 4/4 · ${isEdit ? 'แก้ไข check-in' : 'ตรวจสอบและบันทึก'}</div>
      ${isEdit ? `<div class="hint mt" style="font-size:12px;line-height:1.5;color:var(--ink-2)">✏️ กำลังแก้ไขรายการที่บันทึกแล้ว · ยกเลิกได้โดยไม่กระทบข้อมูลเดิม</div>` : ''}
    </div>

    <div class="card">
      <div style="font-weight:600;font-size:13.5px;margin-bottom:8px">📸 รูปถ่าย</div>
      <div class="row" style="gap:8px;align-items:flex-start">
        ${photoBlock('front', 'Front')}
        ${photoBlock('side', 'Side')}
        ${photoBlock('back', 'Back')}
      </div>
      <button class="btn ghost block sm mt" data-act="checkin-prev" style="font-size:12px">← แก้ไขรูป (กลับไป Back step)</button>
    </div>

    <div class="card">
      <div style="font-weight:600;font-size:14px;margin-bottom:8px">📊 ข้อมูลร่างกาย (แก้ไขได้)</div>
      <div class="field">
        <label for="checkin-date">📅 วันที่</label>
        <input id="checkin-date" type="date" class="input" value="${h(dateVal)}" max="${todayKey()}">
      </div>
      <div class="field">
        <label for="checkin-weight">⚖️ น้ำหนัก (กก.)</label>
        <input id="checkin-weight" type="number" inputmode="decimal" class="input" placeholder="${derived && derived.weight_kg ? Number(derived.weight_kg).toFixed(1) : '70'}" value="${weight != null ? weight : ''}" min="20" max="300" step="0.1">
      </div>
      <div class="field">
        <label for="checkin-waist">📐 รอบเอว (ซม. — ถ้ามี)</label>
        <input id="checkin-waist" type="number" inputmode="decimal" class="input" placeholder="${derived && derived.waist_cm ? Number(derived.waist_cm).toFixed(1) : '80'}" value="${waist != null ? waist : ''}" min="40" max="200" step="0.1">
      </div>
      <div class="hint" style="font-size:11.5px">ปล่อยว่างได้ถ้าไม่มีข้อมูล</div>
    </div>

    <div class="card">
      <div style="font-weight:600;font-size:14px;margin-bottom:8px">📈 7-day stats ${isEdit ? '(snapshot จากตอนบันทึกครั้งแรก · ไม่คำนวณใหม่)' : '(auto · snapshot)'}</div>
      ${statRowOrMissing('น้ำหนักเฉลี่ย', derived?.weight_7day_avg != null ? Number(derived.weight_7day_avg).toFixed(1) : null, ' kg')}
      ${statRowOrMissing('ส่วนต่างเฉลี่ย', derived?.deficit_7day_avg != null ? (derived.deficit_7day_avg >= 0 ? '+' : '') + Math.round(derived.deficit_7day_avg) : null, ' kcal/วัน')}
      ${statRowOrMissing('โปรตีนผ่านเป้า', derived?.protein_pass_rate != null ? derived.protein_pass_rate + '/7' : null, ' วัน')}
      <div class="stat-row"><span>Training (7 วัน)</span><b>${derived?.training_count || 0} ครั้ง <span class="muted" style="font-weight:400;font-size:12px">(💪 ${derived?.strength_count || 0} · 🏃 ${derived?.cardio_count || 0})</span></b></div>
      <div class="hint mt" style="font-size:11.5px;line-height:1.6">📌 ${isEdit ? 'ค่าเหล่านี้เป็น snapshot ของวันที่บันทึก check-in ครั้งแรก · การแก้ไขจะไม่คำนวณใหม่' : 'ตัวเลขเหล่านี้เป็น snapshot ของสัปดาห์นี้ — จะใช้เปรียบเทียบกับ check-in ต่อๆ ไป'}</div>
    </div>

    <div class="card">
      <div class="field">
        <label for="checkin-note">📝 หมายเหตุ (ไม่บังคับ)</label>
        <textarea id="checkin-note" class="input" rows="3" maxlength="300" placeholder="เช่น: เช้าหลังตื่น · ก่อนกินอาหาร · sleep ดี" style="resize:vertical">${h(note)}</textarea>
      </div>
    </div>

    <div class="callout info" style="font-size:12.5px;background:#e0e7ff;color:#3730a3;border-left:3px solid #818cf8;line-height:1.5">
      🔒 <b>รูปและข้อมูลทั้งหมดอยู่บนเครื่องนี้เท่านั้น · ไม่อัปโหลดที่ไหน</b><br>
      <span style="font-size:11px">Photos and data are stored locally on this device by default.</span>
    </div>

    <button class="btn green block lg mt2" data-act="checkin-save" style="font-size:16px;min-height:54px">
      💾 ${isEdit ? 'บันทึกการแก้ไข' : 'บันทึก check-in'}
    </button>

    <div class="row mt" style="gap:8px">
      <button class="btn secondary" data-act="checkin-prev" style="flex:1">← ย้อนกลับ</button>
      <button class="btn ghost" data-act="checkin-cancel" style="flex:1;color:var(--red)">✗ ${isEdit ? 'ยกเลิกการแก้ไข' : 'ยกเลิก'}</button>
    </div>
  `;
}

// Common: render one check-in card for Timeline rows.
function renderTimelineCard(c, isLatest) {
  const w = c.weight_kg != null ? Number(c.weight_kg).toFixed(1) + ' กก.' : '—';
  const waist = c.waist_cm != null ? Number(c.waist_cm).toFixed(1) + ' ซม.' : '—';
  const photoIds = c.photoIds || {};
  const chips = ['front', 'side', 'back'].map(angle => {
    const has = !!photoIds[angle];
    const label = angle === 'front' ? 'Front' : angle === 'side' ? 'Side' : 'Back';
    return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:${has ? '#dcfce7' : 'var(--bg-2)'};color:${has ? '#166534' : 'var(--muted)'};margin-right:4px">${has ? '✓' : '—'} ${label}</span>`;
  }).join('');
  const fullNote = c.note || '';
  const notePreview = fullNote.length > 80 ? fullNote.slice(0, 80) + '…' : fullNote;
  const noteHtml = notePreview ? `<div class="hint mt" style="font-size:11.5px;color:var(--ink-2);line-height:1.5">📝 ${h(notePreview)}</div>` : '';
  return `
    <div class="card" style="${isLatest ? 'border:1.5px solid #818cf8' : ''}">
      <div class="row" style="align-items:center;gap:8px;margin-bottom:6px">
        <div style="font-weight:600;font-size:${isLatest ? '15px' : '13.5px'}">${isLatest ? '⭐ ล่าสุด · ' : ''}${h(formatDateTH(c.date))}</div>
        ${c.updatedAt ? `<span class="muted" style="font-size:10.5px">· แก้ไขแล้ว</span>` : ''}
      </div>
      <div class="row" style="gap:14px;font-size:13px">
        <div><span class="muted">⚖️</span> <b>${w}</b></div>
        <div><span class="muted">📐</span> <b>${waist}</b></div>
      </div>
      <div class="mt" style="font-size:11.5px">${chips}</div>
      ${noteHtml}
      <div class="row mt" style="gap:6px">
        <button class="btn block" data-act="nav-bpc-viewer" data-checkin-id="${h(c.id)}" style="flex:1;font-size:13px;min-height:42px">👁️ ดู</button>
        <button class="btn secondary block" data-act="edit-checkin" data-checkin-id="${h(c.id)}" style="flex:1;font-size:13px;min-height:42px">✏️ แก้ไข</button>
        <button class="btn ghost" data-act="delete-checkin" data-checkin-id="${h(c.id)}" style="color:var(--red);font-size:13px;min-height:42px;padding:0 12px">🗑️</button>
      </div>
    </div>
  `;
}

// View: Timeline of all check-ins, grouped by month.
function renderBpcTimeline() {
  const u = currentUser();
  if (!u) return '';
  const checkIns = (u.checkIns || []).slice();
  if (checkIns.length === 0) {

// Async helper: refresh object URLs for all photo IDs in current draft
async function refreshCheckinPhotoUrls() {
  const checkin = state.tmp.checkin;
  if (!checkin) return;
  state.tmp.checkinPhotoUrls = state.tmp.checkinPhotoUrls || {};
  let changed = false;
  for (const angle of ['front', 'side', 'back']) {
    const pid = checkin.photoIds[angle];
    if (pid && !state.tmp.checkinPhotoUrls[pid]) {
      try {
        const url = await getPhotoUrl(pid);
        if (url) { state.tmp.checkinPhotoUrls[pid] = url; changed = true; }
      } catch (e) { console.warn('refreshCheckinPhotoUrls failed for', pid, e); }
    }
  }
  if (changed) render();
}

// Async helper: revoke all cached photo URLs (memory cleanup on flow exit)
function revokeCheckinPhotoUrls() {
  if (!state.tmp.checkinPhotoUrls) return;
  for (const url of Object.values(state.tmp.checkinPhotoUrls)) {
    if (url) { try { URL.revokeObjectURL(url); } catch (e) {} }
  }
  state.tmp.checkinPhotoUrls = {};
}

// Async helper: process file input → compress → save blob → update draft → cache URL → render
async function handleCheckinPhotoUpload(angle, file) {
  if (!file || !['front', 'side', 'back'].includes(angle)) return;
  const u = currentUser();
  const checkin = state.tmp.checkin;
  if (!u || !checkin) return;
  let blob;
  try { blob = await compressPhoto(file); }
  catch (e) {
    console.warn('Compression failed', e);
    return toast('อัปโหลดไม่สำเร็จ ลองรูปอื่น', true);
  }
  const newId = uid('photo');
  try { await savePhotoBlob(newId, blob); }
  catch (e) {
    console.warn('Save photo blob failed', e);
    return toast('บันทึกรูปไม่สำเร็จ · ลองอีกครั้ง', true);
  }
  // Replace old photo for this angle (if any) — delete blob + revoke URL.
  // v1.10.33 — T-013b.1: in edit mode, do NOT delete the blob if it's an
  // original (saved check-in still references it; deletion happens at save time
  // only if the photo actually gets replaced).
  const oldId = checkin.photoIds[angle];
  if (oldId && oldId !== newId) {
    const isEdit = checkin.mode === 'edit';
    const isOriginal = isEdit && checkin.originalPhotoIds &&
      Object.values(checkin.originalPhotoIds).includes(oldId);
    if (!isOriginal) {
      try { await deletePhotoBlob(oldId); } catch (e) {}
    }
    const oldUrl = state.tmp.checkinPhotoUrls?.[oldId];
    if (oldUrl) { try { URL.revokeObjectURL(oldUrl); } catch (e) {} delete state.tmp.checkinPhotoUrls[oldId]; }
  }
  checkin.photoIds[angle] = newId;
  setCheckinDraft(u.id, checkin);
  // Cache URL for preview
  state.tmp.checkinPhotoUrls = state.tmp.checkinPhotoUrls || {};
  try { state.tmp.checkinPhotoUrls[newId] = await getPhotoUrl(newId); } catch (e) {}
  render();
}

function renderStreaks() {
  const u = currentUser();
  if (!u) return '';
  ensureStreakState(u);
  const types = ['logging','weight','inTarget','protein'];
  const protT = effectiveProteinTarget(u.id);
  const todayLogs = todayEntries();
  const todayTotals = sumEntries(todayLogs);
  // Today's goal-zone — same source of truth as dashboard ring
  const todayBaseTarget = effectiveCalorieTarget(u.id);
  const todayBurned = activityIncludesExercise(u) ? 0 : sumActivitiesBurn(u.id);
  const todayZone = goalZoneEval({
    eaten: todayTotals.calories,
    baseTarget: todayBaseTarget,
    exerciseBurn: todayBurned,
    goalAdj: effectiveGoalAdjust(u),
    tdee: calcTDEE(u)
  });
  const ss = u.streakState;
  const lateHour = new Date().getHours() >= 20;

  function statusFor(type, status) {
    if (status.doneToday) return { cls: 'ok', text: '✓ ทำได้แล้ววันนี้' };
    if (type === 'logging') {
      if (status.current > 0 && lateHour) return { cls: 'warn', text: `⏰ Streak ${status.current} วัน — ยังไม่ได้บันทึกวันนี้` };
      if (status.current > 0) return { cls: 'warn', text: 'ยังไม่ได้บันทึกวันนี้' };
      return { cls: '', text: 'เริ่มต้นวันนี้ได้!' };
    }
    if (type === 'weight') {
      const latest = latestWeight(u);
      if (!latest) return { cls: '', text: 'ยังไม่มีข้อมูลน้ำหนัก' };
      return { cls: 'warn', text: 'ยังไม่ได้ชั่งวันนี้' };
    }
    if (type === 'inTarget') {
      if (todayLogs.length < 2) return { cls: '', text: 'ต้องบันทึกอย่างน้อย 2 มื้อ' };
      const gd = todayZone.goalDelta;
      if (Math.abs(gd) < 250) return { cls: 'ok', text: `✓ อยู่ในเป้า (${gd === 0 ? '0' : (gd < 0 ? '−' : '+') + fmt(Math.abs(gd))} จากเป้า)` };
      if (gd <= -250) return { cls: 'warn', text: `🟡 ขาดดุลเกินเป้า ${fmt(-gd)} kcal — กินเพิ่มอีกหน่อย` };
      return { cls: 'bad', text: `❌ เกินเป้า ${fmt(gd)} kcal` };
    }
    if (type === 'protein') {
      if (todayLogs.length < 2) return { cls: '', text: 'ต้องบันทึกอย่างน้อย 2 มื้อ' };
      const need = protT * 0.85;
      if (todayTotals.protein_g < need) return { cls: 'bad', text: `❌ ขาด ${fmt(need - todayTotals.protein_g, 1)} ก.` };
      return { cls: 'ok', text: '✓ ครบเป้าโปรตีน' };
    }
    return { cls: '', text: '' };
  }

  const breakNotice = (() => {
    const cur = getStreakStatus(u, 'logging').current;
    const best = getStreakStatus(u, 'logging').best;
    if (cur > 0 || best < 5) return '';
    return `<div class="callout info">💔 Streak reset — best ของคุณ <b>${best} วัน</b> ยังอยู่<br>วันนี้เริ่มใหม่ได้: log มื้อแรก = streak 1 วัน 🎯</div>`;
  })();

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1>🏆 Streaks</h1>
      </div>
      ${breakNotice}
      ${types.map(t => {
        const s = getStreakStatus(u, t);
        const lbl = STREAK_LABELS[t];
        const pct = s.best > 0 ? Math.min(100, (s.current / Math.max(s.best, 7)) * 100) : 0;
        const stat = statusFor(t, s);
        const barCls = t === 'logging' ? 'fire' : (stat.cls === 'ok' ? 'green' : '');
        return `
          <div class="streak-row">
            <div class="head">
              <div class="e">${lbl.emoji}</div>
              <div class="n">${h(lbl.name)}</div>
              <div class="num">${s.current}</div>
              <div class="muted" style="font-size:13px">วัน</div>
            </div>
            <div class="desc">${h(lbl.desc)}</div>
            <div class="bar"><i class="${barCls}" style="width:${pct.toFixed(1)}%"></i></div>
            <div class="meta">
              <span>ปัจจุบัน <b>${s.current}</b> วัน</span>
              <span>Best: <b>${s.best}</b> วัน</span>
            </div>
            <div class="status ${stat.cls}">${stat.text}</div>
          </div>
        `;

/* ========== ROUTER ========== */
function stopScanner() {
  if (state.scanner) {
    try { state.scanner.reset(); } catch {}
    state.scanner = null;
  }
}

function render() {
  if (state.view !== 'scan' && state.scanner) stopScanner();
  const root = document.getElementById('app');
  // Preserve focus across innerHTML replacement so iOS keeps the keyboard open
  const af = document.activeElement;
  let focusInfo = null;
  if (af && af.id && root && root.contains(af) && (af.tagName === 'INPUT' || af.tagName === 'TEXTAREA')) {
    focusInfo = { id: af.id };
    if (typeof af.selectionStart === 'number') {
      focusInfo.start = af.selectionStart;
      focusInfo.end = af.selectionEnd;
    }
  }
  let html = '';
  try {
    switch (state.view) {
      case 'loading': html = `<div class="screen"><div class="spin"></div></div>`; break;
      case 'onboarding': html = renderOnboarding(); break;
      case 'dashboard': html = renderDashboard(); break;
      case 'add': html = renderAddChoose(); break;
      case 'library': html = renderLibrary(); break;
      case 'online': html = renderOnlineSearch(); break;
      case 'manual': html = renderManual(); break;
      case 'meal-detail': html = renderMealDetail(); break;
      case 'history': html = renderHistory(); break;
      case 'history-day': html = renderHistoryDay(); break;
      case 'similar-meals': html = renderSimilarMealsView(); break;
      case 'suggest': html = renderSuggestView(); break;
      case 'meal-plan-setup': html = renderMealPlanSetup(); break;
      case 'meal-plan': html = renderMealPlanResult(); break;
      case 'favorites': html = renderFavorites(); break;
      case 'fav-edit': html = renderFavEdit(); break;
      case 'add-activity': html = renderAddActivity(); break;
      case 'users': html = renderUserSwitcher(); break;
      case 'settings': html = renderSettings(); break;
      case 'profile-edit': html = renderProfileEdit(); break;
      case 'reports': html = renderReports(); break;
      case 'weight-log': html = renderWeightLog(); break;

      case 'streaks': html = renderStreaks(); break;

      case 'special-detail': html = renderSpecialDetail(); break;
      case 'special-add-config': html = renderSpecialAddConfig(); break;
      default: html = `<div class="screen"><h1>?</h1></div>`;
    }
  } catch (err) {
    console.error(err);
    html = `<div class="screen"><div class="card"><h3>เกิดข้อผิดพลาด</h3><pre style="white-space:pre-wrap;font-size:12px">${h(err.message)}</pre><button class="btn" data-act="nav-home">กลับหน้าหลัก</button></div></div>`;
  }
  root.innerHTML = html;
  if (focusInfo) {
    const newEl = document.getElementById(focusInfo.id);
    if (newEl && (newEl.tagName === 'INPUT' || newEl.tagName === 'TEXTAREA')) {
      try {
        newEl.focus({ preventScroll: true });
        if (focusInfo.start != null && newEl.setSelectionRange) {
          newEl.setSelectionRange(focusInfo.start, focusInfo.end != null ? focusInfo.end : focusInfo.start);
        }
      } catch {}
    }
  }
  if (state.view === 'scan' && !state.scanner) {
    setTimeout(() => {
      const v = document.getElementById('scan-video');
      if (v) startBarcodeScan(v);
    }, 120);
  }
}

async function startBarcodeScan(videoEl) {
  if (!window.ZXing) {
    state.tmp.error = 'ไลบรารี scanner ยังโหลดไม่เสร็จ ลองอีกครั้ง';
    render();
    return;
  }
  try {
    const reader = new ZXing.BrowserMultiFormatReader();
    state.scanner = reader;
    let deviceId = null;
    try {
      const devices = await reader.listVideoInputDevices();
      const back = devices.find(d => /back|rear|environment/i.test(d.label || ''));
      deviceId = (back || devices[devices.length - 1] || devices[0])?.deviceId || null;
    } catch {}
    await reader.decodeFromVideoDevice(deviceId, videoEl, (result, errInner) => {
      if (result && state.view === 'scan') {
        try { navigator.vibrate?.(80); } catch {}
        const code = result.getText();
        stopScanner();
        handleBarcodeFound(code);
      }
    });
  } catch (err) {
    state.tmp.error = 'ไม่สามารถเปิดกล้องได้ — อนุญาตสิทธิ์กล้องในเบราว์เซอร์';
    stopScanner();
    render();
  }
}

function handleBarcodeFound(barcode) {
  const inPreloaded = state.brandedProducts.find(p => p.barcode === barcode);
  if (inPreloaded) {
    const meal = normalizeBrandedAsMeal(inPreloaded, 'branded');
    toast('พบสินค้า: ' + meal.name);
    go('meal-detail', { mealId: meal.id, meal, sizePct: 100, quantity: 1, addonCounts: {} });
    return;
  }
  const u = currentUser();
  const inScanned = (u?.scannedProducts || []).find(p => p.barcode === barcode);
  if (inScanned) {
    const meal = normalizeBrandedAsMeal(inScanned, 'scanned');
    toast('พบสินค้าที่เคยสแกน: ' + meal.name);
    go('meal-detail', { mealId: meal.id, meal, sizePct: 100, quantity: 1, addonCounts: {} });
    return;
  }
  toast('อ่านบาร์โค้ดได้ ✓ ครั้งแรก — ถ่ายรูปฉลากต่อ');
  go('scan-not-found', { barcode });
}

function compressImage(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        let w = img.width, hh = img.height;
        if (w > maxWidth) { hh = (maxWidth / w) * hh; w = maxWidth; }
        canvas.width = w; canvas.height = hh;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, hh);
        canvas.toBlob(b => {
          URL.revokeObjectURL(url);
          b ? resolve(b) : reject(new Error('Compression failed'));
        }, 'image/jpeg', quality);
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
    img.src = url;
  });
}

function fileToBase64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1] || '');
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

async function processOcr(file, attachedBarcode) {
  state.tmp.loading = true;
  state.tmp.error = '';
  state.tmp.result = null;
  if (state.tmp.preview) { try { URL.revokeObjectURL(state.tmp.preview); } catch {} }
  state.tmp.preview = URL.createObjectURL(file);
  render();
  try {
    const compressed = await compressImage(file, 1200, 0.85);
    const base64 = await fileToBase64(compressed);
    const res = await fetch('/api/extract-nutrition', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: base64, barcode: attachedBarcode || null })
    });
    const data = await res.json();
    state.tmp.loading = false;
    if (!res.ok) {
      state.tmp.error = data.error || 'อ่านข้อมูลไม่สำเร็จ';
    } else {
      state.tmp.result = data;
    }
  } catch (err) {
    state.tmp.loading = false;
    state.tmp.error = 'เชื่อมต่อไม่ได้ ลองใหม่';
  }
  render();
}

function collectOcrEdits() {
  const r = state.tmp.result || {};
  const num = id => { const v = Number(document.getElementById(id)?.value); return isFinite(v) ? v : 0; };
  const getStr = id => String(document.getElementById(id)?.value || '').trim();
  const carbs = Math.max(0, num('ocr-carb'));
  const sugar = Math.min(carbs, Math.max(0, num('ocr-sugar')));
  return {
    productName: getStr('ocr-name') || r.productName || 'สินค้า',
    brand: getStr('ocr-brand') || r.brand || null,
    category: r.category || 'other',
    servingSize: Math.max(1, num('ocr-size')),
    servingUnit: r.servingUnit || 'g',
    calories: Math.max(0, num('ocr-cal')),
    protein_g: Math.max(0, num('ocr-prot')),
    carbs_g: carbs,
    sugar_g: sugar,
    fat_g: Math.max(0, num('ocr-fat')),
    barcode: r.barcode || null
  };
}

function makeScannedProduct(edits, source) {

  'nav-checkin': async () => {

    }

    const checkinPhotoUrls = {};
