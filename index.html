    // If a draft already exists, force resolution first (avoid silent overwrite)
    const pending = getCheckinDraft(u.id);
    if (pending) {
      const isEditSame = pending.mode === 'edit' && pending.editingId === id;
      if (!isEditSame) {
        toast('มี draft ค้างอยู่ · ทำต่อหรือทิ้งก่อน', true);
        return;
      }
    }
    // Build edit draft — snapshot originalPhotoIds so cancel/replace handles cleanup correctly
    const originalPhotoIds = { ...(existing.photoIds || {}) };
    const draft = pending && pending.mode === 'edit' ? pending : {
      mode: 'edit',
      editingId: id,
      step: 'review',
      date: existing.date,
      photoIds: { ...originalPhotoIds },
      originalPhotoIds,
      weight_kg: existing.weight_kg != null ? existing.weight_kg : null,
      waist_cm: existing.waist_cm != null ? existing.waist_cm : null,
      note: existing.note || '',
      // Preserve snapshot fields so review can display them without recomputing
      weight_7day_avg: existing.weight_7day_avg != null ? existing.weight_7day_avg : null,
      deficit_7day_avg: existing.deficit_7day_avg != null ? existing.deficit_7day_avg : null,
      protein_pass_rate: existing.protein_pass_rate != null ? existing.protein_pass_rate : null,
      training_count: existing.training_count || 0,
      strength_count: existing.strength_count || 0,
      cardio_count: existing.cardio_count || 0,
      startedAt: Date.now()
    };
    setCheckinDraft(u.id, draft);
    // Pre-fetch URLs for current photoIds (originals at start)
    const checkinPhotoUrls = {};
    for (const angle of ['front', 'side', 'back']) {
      const pid = draft.photoIds[angle];
      if (pid) {
        try {
          const url = await getPhotoUrl(pid);

  // v1.10.33 — T-013b.1: delete saved check-in (metadata + photo blobs).

  'delete-checkin': async (e, btn) => {
    const u = currentUser();
    if (!u) return;
    const id = btn?.dataset?.checkinId;
    if (!id) return;
    if (!confirm('ลบ check-in นี้?\nรูปทั้งหมดของรายการนี้จะถูกลบจากเครื่อง')) return;
    await deleteCheckIn(u, id);
    persist();
    toast('ลบ check-in แล้ว');
    // T-013c: handle viewer/compare context
    if (state.view === 'bpc-viewer' && state.tmp?.checkInId === id) {
      revokeUrlMap(state.tmp.viewerPhotoUrls);
      state.tmp.viewerPhotoUrls = {};
      const remaining = u.checkIns || [];
      go(remaining.length > 0 ? 'bpc-timeline' : 'bpc');
      return;
    }
    if (state.view === 'bpc-compare' && (state.tmp?.leftId === id || state.tmp?.rightId === id)) {
      revokeUrlMap(state.tmp.comparePhotoUrls);

      const remaining = u.checkIns || [];
      if (remaining.length < 2) { go('bpc'); return; }
      const defaults = pickCompareDefaults(remaining, state.tmp.compareMode || 'start-latest');
      if (!defaults) { go('bpc'); return; }
      state.tmp.leftId = defaults.leftId;
      state.tmp.rightId = defaults.rightId;
      const leftCi = remaining.find(c => c.id === defaults.leftId);
      const rightCi = remaining.find(c => c.id === defaults.rightId);
      state.tmp.comparePhotoUrls = {};
      Object.assign(state.tmp.comparePhotoUrls, await fetchCheckinPhotoUrls(leftCi));
      Object.assign(state.tmp.comparePhotoUrls, await fetchCheckinPhotoUrls(rightCi));
      render();
      return;
    }

  'nav-bpc-compare': async () => {

  // v1.10.33 — T-013b.1: edit-mode only · clear Back photo from current edit draft.
  // The original blob (if any) is preserved until save; cancel still rolls back.
  'checkin-remove-back': async () => {
    const u = currentUser();
    const checkin = state.tmp.checkin;
    if (!u || !checkin) return;
    if (checkin.mode !== 'edit') return;
    if (!checkin.photoIds.back) return;
    const removedId = checkin.photoIds.back;
    const isOriginal = checkin.originalPhotoIds && Object.values(checkin.originalPhotoIds).includes(removedId);
    if (!isOriginal) {
      // It was a transient upload during this edit session — safe to delete blob now
      try { await deletePhotoBlob(removedId); } catch (err) {}
    }
    // Revoke cached URL
    const oldUrl = state.tmp.checkinPhotoUrls?.[removedId];
    if (oldUrl) { try { URL.revokeObjectURL(oldUrl); } catch (err) {} delete state.tmp.checkinPhotoUrls[removedId]; }
    checkin.photoIds.back = null;
    setCheckinDraft(u.id, checkin);
    render();
  },

    const steps = ['front', 'side', 'back', 'review'];
    const idx = steps.indexOf(checkin.step);

  // Final save · validates Front + Side · adds (new) or updates (edit) the check-in.
  // v1.10.33 — T-013b.1: branches on mode. New mode = addCheckIn (T-013b behavior).
  // Edit mode = updateCheckIn + cleanup blobs that were replaced (in originalPhotoIds
  // but not in final photoIds). Snapshot fields (weight_7day_avg etc.) are preserved
  // in edit mode — not recomputed (history should reflect the original window).
  'checkin-save': async () => {
    const u = currentUser();
    const checkin = state.tmp.checkin;
    if (!u || !checkin) return;
    if (!checkin.photoIds.front || !checkin.photoIds.side) {
      return toast('ต้องมีรูป Front + Side ก่อนบันทึก', true);
    }
    const isEdit = checkin.mode === 'edit' && checkin.editingId;
    const finalPhotoIds = {
      front: checkin.photoIds.front,
      side: checkin.photoIds.side
    };
    if (checkin.photoIds.back) finalPhotoIds.back = checkin.photoIds.back;

    if (isEdit) {
      // Build patch — only editable fields. Snapshot fields stay as on the existing entry
      // unless the draft has explicit values (they were copied from existing at edit start).
      const patch = {
        date: checkin.date,
        photoIds: finalPhotoIds,
        weight_kg: checkin.weight_kg,
        waist_cm: checkin.waist_cm,
        note: checkin.note || '',
        // Snapshot fields — preserve (carried from existing into draft at edit start)
        weight_7day_avg: checkin.weight_7day_avg != null ? checkin.weight_7day_avg : null,
        deficit_7day_avg: checkin.deficit_7day_avg != null ? checkin.deficit_7day_avg : null,
        protein_pass_rate: checkin.protein_pass_rate != null ? checkin.protein_pass_rate : null,
        training_count: checkin.training_count || 0,
        strength_count: checkin.strength_count || 0,
        cardio_count: checkin.cardio_count || 0
      };
      const updated = updateCheckIn(u, checkin.editingId, patch);
      if (!updated) {
        toast('ไม่พบ check-in · บันทึกไม่สำเร็จ', true);
        return;
      }
      // Clean up replaced blobs — in originalPhotoIds but not in finalPhotoIds
      const originals = Object.values(checkin.originalPhotoIds || {}).filter(Boolean);
      const finals = new Set(Object.values(finalPhotoIds).filter(Boolean));
      for (const oldPid of originals) {
        if (!finals.has(oldPid)) {
          try { await deletePhotoBlob(oldPid); } catch (err) {}
        }
      }
      clearCheckinDraft(u.id);
      state.tmp.checkin = null;
      revokeCheckinPhotoUrls();
      persist();
      toast('✅ บันทึกการแก้ไขแล้ว');
      go('bpc');
      return;
    }

    // New-mode path (T-013b behavior preserved · snapshot derived at save time)
    const derived = compute7DayCheckinStats(u, checkin.date);
    const final = {
      date: checkin.date,
      photoIds: finalPhotoIds,
      weight_kg: checkin.weight_kg != null ? checkin.weight_kg : (derived ? derived.weight_kg : null),
      weight_7day_avg: derived ? derived.weight_7day_avg : null,
      waist_cm: checkin.waist_cm != null ? checkin.waist_cm : (derived ? derived.waist_cm : null),
      deficit_7day_avg: derived ? derived.deficit_7day_avg : null,
      protein_pass_rate: derived ? derived.protein_pass_rate : null,
      training_count: derived ? derived.training_count : 0,
      strength_count: derived ? derived.strength_count : 0,
      cardio_count: derived ? derived.cardio_count : 0,
      note: checkin.note || ''
    };
    addCheckIn(u, final);
    clearCheckinDraft(u.id);
    state.tmp.checkin = null;
    revokeCheckinPhotoUrls();
    persist();
    toast('✅ บันทึก check-in แล้ว');
    go('bpc');
  },
  // v1.10.30 — T-012
  'delete-waist': (e, btn) => {

    const altId = btn.dataset.id;

    const plan = state.tmp.plan;
    if (!sd || !plan) return;
    const day = plan.days.find(d => d.day === sd.day);

    const meal = day.meals[sd.idx];
    if (!meal) return;
    const alt = findMeal(altId);

    day.totalCal -= meal.cal;
    day.totalProtein -= meal.protein;
    day.totalCarbs -= meal.carbs || 0;
    day.totalFat -= meal.fat || 0;
    day.totalSugar -= meal.sugar || 0;
    // Replace — reset modifications since they're meal-specific
    day.meals[sd.idx] = {
      slot: 'meal',
      mealId: alt.id,
      name: alt.name,
      emoji: alt.emoji || '🍽️',

      protein: alt.protein_g || 0,
      carbs: alt.carbs_g || 0,
      fat: alt.fat_g || 0,

      sizePct: 100,

    };

    day.totalProtein += alt.protein_g || 0;
    day.totalCarbs += alt.carbs_g || 0;
    day.totalFat += alt.fat_g || 0;
    day.totalSugar += alt.sugar_g || 0;
    // Recompute averages
    plan.avgCal = plan.days.reduce((s, d) => s + d.totalCal, 0) / plan.days.length;
    plan.avgProtein = plan.days.reduce((s, d) => s + d.totalProtein, 0) / plan.days.length;

  'goto-plan-meal-edit': (e, btn) => {

    const plan = state.tmp.plan;
    if (!plan) return;

    // Restore addonCounts from stored addons array
    const addonCounts = {};
    (meal.addons || []).forEach(a => {

    });

  // v1.10.19 — save modifications back into the plan slot (no logging)
  'save-plan-meal': () => {
    const pe = state.tmp.planEditing;
    if (!pe) return toast('ไม่พบบริบทแผน', true);
    const meal = state.tmp.meal || findMeal(state.tmp.mealId);
    if (!meal) return toast('ไม่พบเมนู', true);
    const qty = state.tmp.quantity == null ? 1 : state.tmp.quantity;
    if (qty < 1) return toast('ตั้งจำนวนอย่างน้อย 1', true);
    const sizePct = state.tmp.sizePct || 100;
    const counts = state.tmp.addonCounts || {};
    const addons = Object.keys(counts).filter(k => counts[k] > 0).map(id => ({ id, count: counts[id] }));
    const customizations = (state.tmp.customizations || []).slice();
    // Compute totals respecting size/qty/customizations/addons (mirrors renderMealDetail logic)
    const mult = sizePct / 100;
    const factor = mult * qty;
    let baseCal = meal.baseCalories;
    let baseProt = meal.protein_g;
    let baseCarb = meal.carbs_g;
    let baseFat = meal.fat_g;
    let baseSugar = meal.sugar_g || 0;
    if (customizations.length && Array.isArray(meal.customizations)) {
      customizations.forEach(cid => {
        const c = meal.customizations.find(x => x.id === cid);
        if (!c) return;
        baseCal += c.calChange || 0;
        baseProt += c.proteinChange || 0;
        baseCarb += c.carbChange || 0;
        baseFat += c.fatChange || 0;
        baseSugar += c.sugarChange || 0;
      });
    }
    let cal = baseCal * factor;
    let prot = baseProt * factor;
    let carb = baseCarb * factor;
    let fat = baseFat * factor;
    let sugar = baseSugar * factor;
    ADDONS.forEach(a => {
      const c = counts[a.id] || 0;
      cal += a.calories * c;
      prot += a.protein_g * c;
      carb += a.carbs_g * c;
      fat += a.fat_g * c;
      sugar += (a.sugar_g || 0) * c;
    });
    // Locate target slot and update
    const day = pe.plan.days.find(d => d.day === pe.day);
    if (!day) return toast('ไม่พบวันในแผน', true);
    const old = day.meals[pe.idx];
    if (!old) return toast('ไม่พบมื้อในแผน', true);
    day.totalCal -= old.cal;
    day.totalProtein -= old.protein;
    day.totalCarbs -= old.carbs || 0;
    day.totalFat -= old.fat || 0;
    day.totalSugar -= old.sugar || 0;
    day.meals[pe.idx] = {
      slot: 'meal',
      mealId: meal.id,
      name: meal.name,
      emoji: meal.emoji || '🍽️',
      cal, protein: prot, carbs: carb, fat, sugar,
      sizePct, quantity: qty, addons, customizations
    };
    day.totalCal += cal;
    day.totalProtein += prot;
    day.totalCarbs += carb;
    day.totalFat += fat;
    day.totalSugar += sugar;
    // Recompute averages
    pe.plan.avgCal = pe.plan.days.reduce((s, d) => s + d.totalCal, 0) / pe.plan.days.length;
    pe.plan.avgProtein = pe.plan.days.reduce((s, d) => s + d.totalProtein, 0) / pe.plan.days.length;
    toast('💾 บันทึกในแผนแล้ว');
    // Pop back to plan view (state.stack has it from go() that brought us here)
    back();
  },

  'online-search': async () => {
    const input = document.getElementById('online-q');
    const typed = (input?.value || '').trim();
    const q = typed || state.tmp.query || '';
    if (q.length < 2) { toast('พิมพ์ชื่อเมนูก่อน', true); return; }
    state.tmp.query = q;
    state.tmp.error = '';
    state.tmp.result = null;

    if (!state.tmp.bypassCache) {
      const cached = getCachedEstimate(q);
      if (cached) {
        state.tmp.result = { ...cached, fromCache: true };
        render();
        return;
      }
    }
    state.tmp.bypassCache = false;
    state.tmp.loading = true;
    render();
    try {
      const res = await fetch('/api/estimate-meal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mealName: q })
      });
      const data = await res.json();
      state.tmp.loading = false;
      if (!res.ok) {
        state.tmp.error = data.error || 'ค้นหาไม่สำเร็จ';
      } else {
        cacheEstimate(q, data);
        state.tmp.result = { ...data, fromCache: false };
      }
    } catch (err) {
      state.tmp.loading = false;
      state.tmp.error = 'เชื่อมต่อไม่ได้ ลองใหม่';
    }
    render();
  },

  'online-refresh': () => {
    clearCacheEntry(state.tmp.query);
    state.tmp.bypassCache = true;
    state.tmp.result = null;
    actions['online-search']();
  },

  'ai-log-today': () => {

function collectManualDraft() {
  const name = document.getElementById('mf-name')?.value.trim();
  const cal = Number(document.getElementById('mf-cal')?.value);
  const wt = Number(document.getElementById('mf-wt')?.value) || 0;
  const p = Number(document.getElementById('mf-p')?.value) || 0;
  const c = Number(document.getElementById('mf-c')?.value) || 0;
  const f = Number(document.getElementById('mf-f')?.value) || 0;
  const s = Math.min(c, Number(document.getElementById('mf-s')?.value) || 0);
  if (!name) { toast('กรอกชื่อเมนู', true); return null; }
  if (!cal || cal < 0) { toast('กรอกแคลอรี่', true); return null; }
  const emoji = state.tmp.draft?.emoji || '🍽️';
  return { name, emoji, baseCalories: cal, baseWeight_g: wt, protein_g: p, carbs_g: c, fat_g: f, sugar_g: s };
}

  if (!target) return;
  const act = target.dataset.act;
  const fn = actions[act];
  if (fn) {
    e.preventDefault();

});

// v1.10.32 — T-013b: file input change listener for check-in photo capture
// v1.10.33 — T-013b.1: two source variants (camera + gallery) per angle.
// Pattern: checkin-photo-{front|side|back}-{camera|gallery}
document.addEventListener('change', (e) => {
  if (!e.target || !e.target.id) return;
  const m = String(e.target.id).match(/^checkin-photo-(front|side|back)(?:-(camera|gallery))?$/);
  if (m) {
    const angle = m[1];
    const file = e.target.files && e.target.files[0];
    if (file) handleCheckinPhotoUpload(angle, file);
    // Reset input value so picking the same file twice still fires change
    try { e.target.value = ''; } catch (err) {}
  }
  // v1.10.34 — T-013c: compare custom-mode side selectors
  if (e.target.id === 'compare-left-select' || e.target.id === 'compare-right-select') {
    const u = currentUser();
    if (!u) return;
    const all = u.checkIns || [];
    const newId = e.target.value;
    if (!all.find(c => c.id === newId)) return;
    const side = e.target.id === 'compare-left-select' ? 'leftId' : 'rightId';
    // Revoke + re-fetch URLs for the changed side
    revokeUrlMap(state.tmp.comparePhotoUrls);
    state.tmp[side] = newId;
    state.tmp.comparePhotoUrls = {};
    const leftCi = all.find(c => c.id === state.tmp.leftId);
    const rightCi = all.find(c => c.id === state.tmp.rightId);
    Promise.all([
      fetchCheckinPhotoUrls(leftCi),
      fetchCheckinPhotoUrls(rightCi)
    ]).then(([leftUrls, rightUrls]) => {
      Object.assign(state.tmp.comparePhotoUrls, leftUrls, rightUrls);
      render();
    });
  }
});

document.addEventListener('input', (e) => {
  if (e.target.id === 'lib-search') {
    state.tmp.query = e.target.value;
    clearTimeout(render._t);
    render._t = setTimeout(render, 120);
  }
  // v1.10.11 — library numeric filters
  const filterMap = {
    'filter-cal-min': 'calMin',
    'filter-cal-max': 'calMax',
    'filter-prot-min': 'protMin',
    'filter-sugar-max': 'sugarMax'
  };
  if (e.target.id in filterMap) {
    state.tmp[filterMap[e.target.id]] = e.target.value;
    clearTimeout(render._t);
    render._t = setTimeout(render, 200);
  }
  // v1.10.16 — suggester custom tolerance input (cap at 50)
  if (e.target.id === 'suggest-tolerance-input') {
    let v = Number(e.target.value);
    if (!isFinite(v) || v < 5) v = 5;
    if (v > 50) v = 50;
    state.tmp.tolerance = v;
    clearTimeout(render._t);
    render._t = setTimeout(render, 250);
  }
  // v1.10.20 — swap drawer search input (live filter, debounced)
  if (e.target.id === 'swap-search') {
    state.tmp.swapDrawerSearch = e.target.value;
    clearTimeout(render._t);
    render._t = setTimeout(render, 180);
  }
  // v1.10.22 — suggest view search input (live filter, debounced)
  if (e.target.id === 'suggest-search') {
    state.tmp.suggestSearch = e.target.value;
    clearTimeout(render._t);
    render._t = setTimeout(render, 180);
  }
  // v1.10.32 — T-013b: check-in review inputs (live save to draft, no re-render)
  // v1.10.33 — T-013b.1: also handles checkin-date (editable in edit mode mainly)
  if (e.target.id === 'checkin-weight' || e.target.id === 'checkin-waist' ||
      e.target.id === 'checkin-note' || e.target.id === 'checkin-date') {
    const checkin = state.tmp.checkin;
    if (!checkin) return;
    const u = currentUser();
    if (!u) return;
    if (e.target.id === 'checkin-note') {
      checkin.note = e.target.value;
    } else if (e.target.id === 'checkin-date') {
      // Validate non-empty; ignore empty strings (browser date picker can produce them)
      if (e.target.value) checkin.date = e.target.value;
    } else {
      const raw = e.target.value;
      const v = raw === '' ? null : parseFloat(raw);
      const key = e.target.id === 'checkin-weight' ? 'weight_kg' : 'waist_cm';
      checkin[key] = (v != null && !isNaN(v)) ? v : null;
    }
    setCheckinDraft(u.id, checkin);
    // No render — DOM already shows user's input · preserves focus + cursor
  }
  // v1.10.29 — T-011: custom date range inputs (live update, debounced)
  if (e.target.id === 'range-start' || e.target.id === 'range-end') {
    const field = e.target.id === 'range-start' ? 'customStart' : 'customEnd';
    state.tmp[field] = e.target.value;
    state.tmp.chartSelection = null;   // stale on date change
    clearTimeout(render._t);
    render._t = setTimeout(render, 200);
  }
  // v1.10.18 — meal-plan setup live inputs (drives breakdown + projection cards)
  const planFilterMap = {
    'plan-cal':           'calPerDay',
    'plan-protein-min':   'proteinMin',
    'plan-sugar-max':     'sugarMax',
    'plan-fixed-name':    'fixedName',
    'plan-fixed-cal':     'fixedCal',
    'plan-fixed-protein': 'fixedProtein',
    'plan-exclude':       'excludeKeywords'
  };
  if (e.target.id in planFilterMap) {
    if (!state.tmp.planConfig) state.tmp.planConfig = {};
    const key = planFilterMap[e.target.id];
    const raw = e.target.value;
    const numericKeys = ['calPerDay','proteinMin','sugarMax','fixedCal','fixedProtein'];
    state.tmp.planConfig[key] = numericKeys.includes(key)
      ? (raw === '' ? '' : Number(raw))
      : raw;
    clearTimeout(render._t);
    render._t = setTimeout(render, 250);
  }
  if (e.target.id === 'onb-search') {
    state.tmp.onbSearch = e.target.value;
    clearTimeout(render._t);
    render._t = setTimeout(render, 150);
  }
  if (e.target.id === 'fav-edit-search') {
    state.tmp.favEditSearch = e.target.value;
    clearTimeout(render._t);
    render._t = setTimeout(render, 150);
  }
  if (e.target.id === 'onb-goal-slider' || e.target.id === 'edit-goal-slider') {
    state.tmp.goalAdjust = Number(e.target.value);
    if (state.tmp.goalAdjust < -200) state.tmp.goal = 'lose';
    else if (state.tmp.goalAdjust > 200) state.tmp.goal = 'gain';
    else state.tmp.goal = 'maintain';
    clearTimeout(render._t);
    render._t = setTimeout(render, 60);
  }
  if (e.target.id === 'act-duration') {
    state.tmp.actDuration = Number(e.target.value) || 0;
    updateActivityPreview();
  }
  if (e.target.id === 'act-cal-input') {
    state.tmp.actCalInput = Number(e.target.value) || 0;
    updateActivityPreview();
  }
  if (e.target.id === 'act-source-note') {
    state.tmp.actSourceNote = e.target.value;
  }
  if (e.target.id === 'size-slider') {
    state.tmp.sizePct = Number(e.target.value);
    clearTimeout(render._t);
    render._t = setTimeout(render, 50);
  }
});

/* ========== INIT ========== */
async function loadPreloadedMeals() {
  try {
    const res = await fetch('./meals.json');
    const data = await res.json();
    state.preloadedMeals = data.meals || [];
  } catch (err) {
    console.error('ไม่สามารถโหลด meals.json', err);
    state.preloadedMeals = [];
    toast('โหลดเมนูไม่ได้', true);
  }
}

async function loadBrandedProducts() {
  try {
    const res = await fetch('./branded_products.json');
    const data = await res.json();
    state.brandedProducts = data.products || [];
  } catch (err) {
    console.error('ไม่สามารถโหลด branded_products.json', err);
    state.brandedProducts = [];
  }
}

function migrateData() {
  let changed = false;
  state.users.forEach(u => {
    if (!u.weights) { u.weights = []; changed = true; }
    if (!u.waist) { u.waist = []; changed = true; }   // v1.10.30 — T-012
    if (!u.checkIns) { u.checkIns = []; changed = true; }   // v1.10.31 — T-013a Body Progress
    if (!u.displayMode) { u.displayMode = 'normal'; changed = true; }
    if (!u.defaultActivity) { u.defaultActivity = 'none'; changed = true; }
    if (!u.scannedProducts) { u.scannedProducts = []; changed = true; }
    if (u.onboardingComplete === undefined) { u.onboardingComplete = true; changed = true; }
    if (u.photo === undefined) { u.photo = ''; changed = true; }
    if (typeof u.goalAdjust !== 'number') {
      u.goalAdjust = GOAL_ADJUST[u.goal] ?? 0;
      changed = true;
    }
    if (!u.activities) { u.activities = {}; changed = true; }
    // v1.8.2: legacy activity level keys
    if (u.defaultActivity && !ACTIVITY_LABELS[u.defaultActivity]) {
      u.defaultActivity = ACTIVITY_LEGACY_MAP[u.defaultActivity] || 'sedentary';
      changed = true;
    }
    // v1.8.5: deprecate manual mode (BMR-only is unrealistic, NEAT exists)
    // Manual users get bumped to sedentary baseline (BMR × 1.2 = BMR + NEAT)
    if (u.activityMode === 'manual') {
      u.defaultActivity = 'sedentary';
      delete u.activityMode;
      changed = true;
    } else if (u.activityMode) {
      delete u.activityMode;
      changed = true;
    }
    if (!u.streakState) { u.streakState = defaultStreakState(); changed = true; }
    else { ensureStreakState(u); replenishTokensIfNeeded(u); }
  });
  for (const userId in state.logs) {
    for (const date in state.logs[userId]) {
      const entries = state.logs[userId][date];
      entries.forEach(e => {
        if (e.quantity === undefined) { e.quantity = 1; changed = true; }
        if (Array.isArray(e.addons) && e.addons.length > 0 && typeof e.addons[0] === 'string') {
          e.addons = e.addons.map(id => ({ id, count: 1 }));
          changed = true;
        }
        if (!Array.isArray(e.customizations)) { e.customizations = []; changed = true; }
      });
    }
  }
  if (changed) persist();
}

function initFromStorage() {
  const s = loadStored();
  if (s) {
    state.users = s.users || [];
    state.currentUserId = s.currentUserId || (state.users[0]?.id ?? null);
    state.customMeals = s.customMeals || [];
    state.favorites = s.favorites || [];
    state.logs = s.logs || {};
    state.dailyTargets = s.dailyTargets || {};
  }
  migrateData();
}

async function main() {
  initFromStorage();
  await Promise.all([loadPreloadedMeals(), loadBrandedProducts()]);
  state.ready = true;
  if (state.users.length === 0) {
    state.view = 'onboarding';
    state.tmp = { step: 1 };
  } else {
    state.view = 'dashboard';
    state.tmp = {};
  }
  render();

  // v1.10.0 — show migration notice once if user has prior data
  try {
    const seen = localStorage.getItem('pracal_v1_10_notice_seen');
    if (!seen && state.users.length > 0) {
      setTimeout(() => showV110Notice(), 1200);
    }
  } catch {}

  // v1.10.0 — console verification (sanity checks for key meals/drinks)
  if (typeof window !== 'undefined') {
    try { runV110VerificationTests(); } catch (e) { console.warn('[v1.10 verify]', e); }
  }

  // Service worker
  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.register('./service-worker.js');
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });
      if (reg.waiting && navigator.serviceWorker.controller) {
        showUpdateBanner();
      }
    } catch (err) {
      console.warn('SW registration failed', err);
    }
  }
}

function showUpdateBanner() {
  if (document.getElementById('update-banner')) return;
  const el = document.createElement('div');
  el.id = 'update-banner';
  el.innerHTML = `
    <div style="flex:1;line-height:1.4">
      <b>🎉 มีเวอร์ชันใหม่</b>
      <div style="font-size:13px;color:#ddd">แตะเพื่อรีเฟรชแอป</div>
    </div>
    <button class="btn-up" type="button" data-act="update-app">อัปเดต</button>
    <button class="btn-x" type="button" data-act="dismiss-update" aria-label="ปิด">✕</button>
  `;
  document.body.appendChild(el);
}
function hideUpdateBanner() {
  document.getElementById('update-banner')?.remove();
}

    <div style="font-size:14px;color:var(--ink-2)">
      • คำนวณจากปริมาณเสิร์ฟจริง + ส่วนผสมตาม Thai FCD/USDA<br>
      • เพิ่มระบบปรับแต่ง <b>ไม่หนัง/ไม่มัน</b> ให้ตรงกับร้านอาหารไทยมากขึ้น<br>
      • ปรับเครื่องดื่มไทยให้แยก<b>แก้วคาเฟ่</b>กับ<b>แก้วรถเข็น 22oz</b><br>
      <span class="muted" style="font-size:12px">ข้อมูลเก่ายังคงเดิม ไม่ถูกคำนวณใหม่</span>
    </div>
    <button class="btn block mt" type="button" data-act="dismiss-v110-notice" style="margin-top:14px">เข้าใจแล้ว</button>
  `;
  // Backdrop
  const bd = document.createElement('div');
  bd.id = 'v110-backdrop';
  bd.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1499;animation:fadeIn 220ms ease';
  bd.addEventListener('click', dismissV110Notice);

}
function dismissV110Notice() {
  document.getElementById('v110-notice')?.remove();
  document.getElementById('v110-backdrop')?.remove();
  try { localStorage.setItem('pracal_v1_10_notice_seen', '1'); } catch {}
}

// v1.10.0 — Console verification — sanity checks for new portion/calorie defaults
function runV110VerificationTests() {
  const findById = id => state.preloadedMeals.find(m => m.id === id);
  const test = (name, actual, expected, tol = 30) => {
    const ok = Math.abs(actual - expected) <= tol;
    const log = ok ? console.log : console.warn;
    log(`[v1.10] ${ok ? '✓' : '✗'} ${name}: ${actual} (expected ~${expected}, tol ±${tol})`);
    return ok;
  };
  // Compute total cal from base + customization deltas (simulating calcEntryTotals at sizePct=100)
  const sim = (id, cIds = []) => {
    const m = findById(id);
    if (!m) return null;
    let cal = m.baseCalories || 0;
    (cIds || []).forEach(cid => {
      const c = (m.customizations || []).find(x => x.id === cid);
      if (c) cal += c.calChange || 0;
    });
    return cal;
  };
  console.group('[v1.10] Verification tests');
  // Rice
  test('ข้าวกะเพราไก่ base', sim('r01'), 610);
  test('ข้าวมันไก่ base', sim('r04'), 600);
  test('ข้าวมันไก่ + no_skin_default', sim('r04', ['no_skin_default']), 490);
  test('ข้าวมันไก่ + no_skin_more', sim('r04', ['no_skin_more']), 470);
  test('ข้าวขาหมู base', sim('r07'), 660);
  test('ข้าวขาหมู + no_skin_fat_default', sim('r07', ['no_skin_fat_default']), 440);
  test('ข้าวขาหมู + no_skin_fat_only', sim('r07', ['no_skin_fat_only']), 350);
  test('ข้าวขาหมู + lean_meat_replace', sim('r07', ['lean_meat_replace']), 510);
  test('ข้าวหน้าเป็ด base', sim('r16'), 690);
  test('ข้าวหน้าเป็ด + no_skin_default', sim('r16', ['no_skin_default']), 540);
  test('ข้าวหน้าเป็ด + no_skin_only', sim('r16', ['no_skin_only']), 510);
  test('ข้าวหมูกรอบ base', sim('r06'), 970);
  test('ข้าวหมูกรอบ + no_skin_fat_default', sim('r06', ['no_skin_fat_default']), 790);
  test('ข้าวหมูกรอบ + no_skin_fat_more', sim('r06', ['no_skin_fat_more']), 720);
  test('ข้าวหมูสามชั้น base', sim('r23'), 805);
  test('ข้าวหมูสามชั้น + no_skin_fat_default', sim('r23', ['no_skin_fat_default']), 525);
  test('ข้าวหมูสามชั้น + no_skin_fat_more', sim('r23', ['no_skin_fat_more']), 425);
  test('ข้าวหมูแดง base', sim('r05'), 590);
  test('ข้าวหมูแดง + lean_select_default', sim('r05', ['lean_select_default']), 530);
  test('ข้าวไก่ทอด base', sim('r22'), 650);
  test('ข้าวไก่ทอด + less_skin_batter_some', sim('r22', ['less_skin_batter_some']), 550);
  test('ข้าวไก่ทอด + less_skin_batter_more', sim('r22', ['less_skin_batter_more']), 450);
  // Drinks
  test('ชาไทยเย็น (รถเข็น 22oz)', sim('d21'), 400);
  test('ชาไทยเย็น (คาเฟ่)', sim('d26'), 260);
  test('ชาไทย street + less_sweet', sim('d21', ['less_sweet']), 320);
  test('ชาไทย street + very_sweet', sim('d21', ['very_sweet']), 480);
  test('ชาเขียวเย็น (รถเข็น 22oz)', sim('d20'), 390);
  test('ชาดำเย็น (รถเข็น 22oz)', sim('d19'), 220);
  test('กาแฟโบราณ (รถเข็น 22oz)', sim('d27'), 420);
  console.groupEnd();
}
