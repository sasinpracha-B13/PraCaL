<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#d97706">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PraCaL">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23d97706'/><text x='96' y='130' font-size='120' text-anchor='middle' fill='white'>%F0%9F%8D%9A</text></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d97706'/><text x='50' y='72' font-size='64' text-anchor='middle' fill='white'>%F0%9F%8D%9A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<title>PraCaL - นับแคลอาหารไทย</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #fefaf5;
    --bg-2: #fdf3e4;
    --card: #ffffff;
    --ink: #2a1d10;
    --ink-2: #5c4a38;
    --muted: #8a7560;
    --line: #ead9c2;
    --primary: #d97706;
    --primary-dark: #b35d00;
    --primary-soft: #fde7c8;
    --green: #16a34a;
    --green-soft: #dcfce7;
    --red: #dc2626;
    --red-soft: #fee2e2;
    --amber: #f59e0b;
    --amber-soft: #fef3c7;
    --shadow: 0 2px 6px rgba(120, 70, 0, 0.06), 0 1px 2px rgba(120, 70, 0, 0.08);
    --shadow-lg: 0 8px 24px rgba(120, 70, 0, 0.12);
    --radius: 14px;
    --radius-lg: 20px;
    --tap: 56px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Prompt', 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink);
    background: var(--bg);
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
  }
  #app { min-height: 100%; padding-top: var(--safe-top); padding-bottom: calc(72px + var(--safe-bottom)); }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: 0; }
  input, select, textarea { font-family: inherit; font-size: inherit; }
  a { color: var(--primary-dark); }

  /* ===== Layout ===== */
  .screen { max-width: 560px; margin: 0 auto; padding: 0 16px; }
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 4px 12px; position: sticky; top: 0;
    background: linear-gradient(180deg, var(--bg) 70%, rgba(254,250,245,0));
    z-index: 10;
  }
  .header h1 { font-size: 22px; margin: 0; font-weight: 600; flex: 1; }
  .header .sub { color: var(--muted); font-size: 14px; margin-top: -2px; }
  .icon-btn {
    min-width: 44px; min-height: 44px; padding: 0 10px; border-radius: 12px;
    background: transparent; color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 22px;
  }
  .icon-btn:active { background: var(--bg-2); }
  .icon-btn.ghost { font-size: 16px; color: var(--ink-2); }

  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px;
  }
  .card.tight { padding: 12px 14px; }

  .btn {
    min-height: var(--tap); padding: 0 20px; border-radius: 14px;
    font-size: 18px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--primary); color: #fff;
    transition: transform 60ms ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn.block { width: 100%; }
  .btn.secondary { background: #fff; color: var(--ink); border: 1.5px solid var(--line); }
  .btn.ghost { background: transparent; color: var(--ink-2); }
  .btn.danger { background: var(--red); color: #fff; }
  .btn.green { background: var(--green); color: #fff; }
  .btn.sm { min-height: 40px; font-size: 15px; padding: 0 14px; border-radius: 10px; }
  .btn.lg { min-height: 64px; font-size: 20px; }
  .btn:disabled { opacity: 0.5; pointer-events: none; }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-row > .btn { flex: 1; }

  /* Inputs */
  label { display: block; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; font-size: 15px; }
  .field { margin-bottom: 14px; }
  .input, .select, .textarea {
    width: 100%; min-height: 52px; padding: 12px 14px;
    border-radius: 12px; border: 1.5px solid var(--line);
    background: #fff; color: var(--ink); font-size: 17px;
    -webkit-appearance: none;
  }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .textarea { min-height: 90px; resize: vertical; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .seg { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg button {
    flex: 1; min-width: 72px; min-height: 52px; border-radius: 12px;
    border: 1.5px solid var(--line); background: #fff; color: var(--ink);
    font-weight: 500; font-size: 16px;
  }
  .seg button.on { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* Dashboard ring */
  .ring-wrap { display: flex; align-items: center; gap: 18px; }
  .ring { width: 140px; height: 140px; flex-shrink: 0; position: relative; }
  .ring svg { transform: rotate(-90deg); }
  .ring .num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .num b { font-size: 28px; font-weight: 600; line-height: 1; }
  .ring .num small { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .ring-labels { flex: 1; font-size: 15px; color: var(--ink-2); line-height: 1.8; }
  .ring-labels .v { color: var(--ink); font-weight: 600; }

  .bar-wrap { margin-top: 8px; }
  .bar-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 15px; }
  .bar-label .v { font-weight: 600; color: var(--ink); }
  .bar { height: 14px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--green); border-radius: 999px; transition: width 200ms ease; }
  .bar > i.warn { background: var(--amber); }
  .bar > i.over { background: var(--red); }

  /* Meal list */
  .meal-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; background: #fff; border-radius: 12px;
    margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer;
  }
  .meal-item .emo { font-size: 32px; line-height: 1; flex-shrink: 0; width: 44px; text-align: center; }
  .meal-item .body { flex: 1; min-width: 0; }
  .meal-item .name { font-weight: 500; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meal-item .sub { color: var(--muted); font-size: 13px; }
  .meal-item .cal { font-weight: 600; color: var(--primary-dark); font-size: 16px; white-space: nowrap; }

  .log-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 12px; background: #fff; border-radius: 12px;
    margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .log-item .emo { font-size: 28px; width: 36px; text-align: center; }
  .log-item .body { flex: 1; min-width: 0; }
  .log-item .name { font-weight: 500; font-size: 16px; }
  .log-item .sub { color: var(--muted); font-size: 13px; }
  .log-item .cal { font-weight: 600; color: var(--primary-dark); font-size: 17px; margin-right: 8px; }
  .log-item .del { font-size: 20px; color: var(--muted); background: transparent; min-width: 36px; min-height: 36px; border-radius: 8px; }
  .log-item .del:active { background: var(--red-soft); color: var(--red); }

  /* Category tabs */
  .tabs { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 8px; margin: 0 -16px; padding-left: 16px; padding-right: 16px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs button {
    padding: 10px 14px; border-radius: 999px; border: 1.5px solid var(--line);
    background: #fff; color: var(--ink-2); font-size: 15px; white-space: nowrap; font-weight: 500;
  }
  .tabs button.on { background: var(--primary); color: #fff; border-color: var(--primary); }

  .search-box {
    position: relative;
  }
  .search-box input { padding-left: 44px; }
  .search-box .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 18px; pointer-events: none; }

  /* Bottom nav */
  .botnav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    background: #fff; border-top: 1px solid var(--line);
    padding: 8px 0 calc(8px + var(--safe-bottom));
    display: flex; justify-content: space-around; max-width: 560px; margin: 0 auto;
  }
  .botnav button {
    background: transparent; color: var(--muted); padding: 4px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 12px;
    min-width: 60px; min-height: 52px; border-radius: 10px;
  }
  .botnav button .i { font-size: 22px; line-height: 1; }
  .botnav button.on { color: var(--primary); font-weight: 600; }

  .fab {
    position: fixed; right: 16px; bottom: calc(88px + var(--safe-bottom)); z-index: 15;
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--primary); color: #fff; font-size: 32px;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; justify-content: center;
  }
  .fab:active { transform: scale(0.95); }

  /* Confidence chips */
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 13px; font-weight: 500; }
  .chip.high { background: var(--green-soft); color: var(--green); }
  .chip.medium { background: var(--amber-soft); color: #92400e; }
  .chip.low { background: var(--red-soft); color: var(--red); }
  .chip.goal { background: var(--primary-soft); color: var(--primary-dark); }

  /* Callout */
  .callout {
    background: var(--primary-soft); border-radius: 12px; padding: 12px 14px;
    font-size: 15px; color: #703a00; margin-bottom: 12px; line-height: 1.6;
  }
  .callout b { color: #5a2e00; }
  .callout.info { background: #e0f2fe; color: #075985; }
  .callout ul { margin: 6px 0 0; padding-left: 20px; }
  .callout li { margin-bottom: 2px; }

  /* Addon list */
  .addon {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1.5px solid var(--line); border-radius: 12px; background: #fff;
    margin-bottom: 8px; cursor: pointer;
  }
  .addon.on { border-color: var(--primary); background: var(--primary-soft); }
  .addon .emo { font-size: 24px; width: 32px; text-align: center; }
  .addon .n { flex: 1; font-size: 15px; font-weight: 500; }
  .addon .c { color: var(--primary-dark); font-weight: 600; font-size: 14px; }
  .addon .chk { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
  .addon.on .chk { border-color: var(--primary); background: var(--primary); }

  /* Activity list (radio-style options) */
  .activity-list { display: flex; flex-direction: column; gap: 8px; }
  .activity-opt {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; border-radius: 12px;
    border: 1.5px solid var(--line); background: #fff;
    text-align: left; width: 100%; font-family: inherit;
    font-size: 16px; color: var(--ink);
    min-height: 56px;
  }
  .activity-opt.on { border-color: var(--primary); background: var(--primary-soft); }
  .activity-opt .radio { font-size: 20px; color: var(--muted); flex-shrink: 0; line-height: 1.4; width: 20px; text-align: center; }
  .activity-opt.on .radio { color: var(--primary); }
  .activity-opt .body { flex: 1; }
  .activity-opt .n { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .activity-opt .d { color: var(--muted); font-size: 13px; margin-top: 2px; line-height: 1.4; }

  /* Size buttons */
  .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .size-grid button {
    min-height: 64px; border-radius: 12px; border: 1.5px solid var(--line);
    background: #fff; font-size: 16px; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  }
  .size-grid button.on { border-color: var(--primary); background: var(--primary-soft); color: var(--primary-dark); }
  .size-grid button .pct { font-size: 18px; font-weight: 700; }
  .size-grid button .label { font-size: 12px; color: var(--muted); }
  .size-grid button.on .label { color: var(--primary-dark); }

  .slider-wrap { padding: 10px 0; }
  .slider-wrap input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; }
  .slider-wrap input[type=range]::-webkit-slider-runnable-track { height: 8px; background: var(--primary-soft); border-radius: 999px; }
  .slider-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%; background: var(--primary); margin-top: -9px; box-shadow: var(--shadow); }
  .slider-wrap input[type=range]::-moz-range-track { height: 8px; background: var(--primary-soft); border-radius: 999px; }
  .slider-wrap input[type=range]::-moz-range-thumb { width: 26px; height: 26px; border-radius: 50%; background: var(--primary); border: 0; }

  /* Nutrition facts row */
  .facts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; margin-top: 10px; }
  .facts > div { background: var(--bg-2); padding: 8px; border-radius: 10px; }
  .facts .v { font-weight: 700; color: var(--ink); font-size: 16px; }
  .facts .l { color: var(--muted); font-size: 12px; }

  /* Empty state */
  .empty { text-align: center; padding: 32px 20px; color: var(--muted); }
  .empty .big { font-size: 48px; margin-bottom: 8px; }

  /* Toast */
  #toast {
    position: fixed; left: 50%; bottom: calc(96px + var(--safe-bottom)); transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 12px;
    font-size: 15px; z-index: 50; box-shadow: var(--shadow-lg);
    opacity: 0; pointer-events: none; transition: opacity 200ms, transform 200ms;
    max-width: 80%;
  }
  #toast.show { opacity: 1; transform: translate(-50%, -8px); }
  #toast.err { background: var(--red); }

  /* Update banner */
  #update-banner {
    position: fixed; left: 12px; right: 12px; bottom: calc(96px + var(--safe-bottom));
    background: var(--ink); color: #fff; padding: 12px 16px; border-radius: 14px;
    display: flex; align-items: center; gap: 12px; z-index: 40; box-shadow: var(--shadow-lg);
    max-width: 536px; margin: 0 auto;
  }
  #update-banner b { color: #ffd18a; }
  #update-banner button { background: var(--primary); color: #fff; padding: 8px 14px; border-radius: 10px; font-weight: 600; }

  /* Spinner */
  .spin { width: 36px; height: 36px; border: 3px solid var(--primary-soft); border-top-color: var(--primary); border-radius: 50%; animation: spin 800ms linear infinite; margin: 24px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal */
  .modal-back {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 60;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 560px;
    padding: 20px 20px calc(20px + var(--safe-bottom)); max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { margin: 0 0 14px; font-size: 20px; font-weight: 600; }

  /* Misc */
  h2 { font-size: 20px; font-weight: 600; margin: 18px 0 10px; }
  h3 { font-size: 17px; font-weight: 600; margin: 14px 0 8px; }
  .hint { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .center { text-align: center; }
  .mt { margin-top: 12px; }
  .mt2 { margin-top: 20px; }
  .mb { margin-bottom: 12px; }
  .muted { color: var(--muted); }
  .row { display: flex; gap: 10px; align-items: center; }
  .row.between { justify-content: space-between; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; background: var(--primary-soft); color: var(--primary-dark); font-size: 12px; font-weight: 600; }

  @media (max-width: 360px) {
    body { font-size: 16px; }
    .btn { font-size: 17px; }
    .ring { width: 120px; height: 120px; }
    .ring .num b { font-size: 24px; }
    .size-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div id="app">
  <div class="screen"><div class="spin"></div><div class="center muted">กำลังโหลด...</div></div>
</div>
<div id="toast" role="status" aria-live="polite"></div>
<div id="update-banner" hidden></div>
<script>
(() => {
'use strict';

/* ========== CONSTANTS ========== */
const VERSION = 'v1.0.3';
const STORAGE_KEY = 'pracal_v1';

const CATEGORIES = [
  { id: 'all', name: 'ทั้งหมด', emoji: '🍽️' },
  { id: 'rice_dishes', name: 'ข้าว', emoji: '🍚' },
  { id: 'noodles', name: 'เส้น', emoji: '🍜' },
  { id: 'salads', name: 'ตำ/ยำ', emoji: '🥗' },
  { id: 'mains', name: 'กับข้าว', emoji: '🍛' },
  { id: 'drinks', name: 'เครื่องดื่ม', emoji: '🥤' },
  { id: 'snacks', name: 'ขนม', emoji: '🍰' },
  { id: 'fruits', name: 'ผลไม้', emoji: '🍎' },
  { id: 'custom', name: 'ของฉัน', emoji: '⭐' }
];

const ADDONS = [
  { id: 'egg_fried', name: 'ไข่ดาว', emoji: '🍳', calories: 90, protein_g: 6, carbs_g: 0.5, fat_g: 7 },
  { id: 'egg_omelet', name: 'ไข่เจียว', emoji: '🍳', calories: 150, protein_g: 10, carbs_g: 1, fat_g: 12 },
  { id: 'egg_boiled', name: 'ไข่ต้ม', emoji: '🥚', calories: 70, protein_g: 6, carbs_g: 0.5, fat_g: 5 },
  { id: 'rice_extra', name: 'ข้าวเพิ่ม', emoji: '🍚', calories: 250, protein_g: 5, carbs_g: 54, fat_g: 0.5 },
  { id: 'veg_extra', name: 'ผักเพิ่ม', emoji: '🥬', calories: 20, protein_g: 1, carbs_g: 4, fat_g: 0.2 },
  { id: 'nam_pla', name: 'พริกน้ำปลา', emoji: '🌶️', calories: 10, protein_g: 0.5, carbs_g: 1, fat_g: 0 },
  { id: 'nam_jim', name: 'น้ำจิ้ม', emoji: '🥄', calories: 50, protein_g: 0.5, carbs_g: 12, fat_g: 0.5 }
];

const SIZE_PRESETS = [
  { pct: 75, label: 'ครึ่งเดียว' },
  { pct: 100, label: 'ปกติ' },
  { pct: 150, label: 'พิเศษ' },
  { pct: 200, label: '2 เท่า' }
];

const AVATARS = ['🧑', '👩', '👨', '👵', '👴', '🧒', '👧', '👦', '🧔', '👩‍🦳'];

const GOAL_LABELS = { lose: 'ลดน้ำหนัก', maintain: 'คงน้ำหนัก', gain: 'เพิ่มน้ำหนัก' };
const GOAL_EMOJI = { lose: '📉', maintain: '⚖️', gain: '📈' };
const GOAL_ADJUST = { lose: -400, maintain: 0, gain: 400 };

const ACTIVITY_LABELS = {
  none:      { name: 'ไม่ตั้ง',     desc: 'บวกเองทุกวัน',                bonus: 0 },
  light:     { name: 'น้อย',        desc: 'อยู่บ้านเป็นหลัก เดินบ้าง',   bonus: 150 },
  moderate:  { name: 'ปานกลาง',     desc: 'เดินทำงาน/เดินเยอะ',          bonus: 300 },
  high:      { name: 'มาก',         desc: 'ออกกำลังเกือบทุกวัน',         bonus: 500 },
  very_high: { name: 'มากที่สุด',    desc: 'ใช้แรงงาน/ฝึกเวท',            bonus: 700 }
};

const MEAL_CACHE_KEY = 'pracal_meal_cache_v1';
const MEAL_CACHE_MAX_AGE_MS = 30 * 24 * 60 * 60 * 1000;
const MEAL_CACHE_MAX_ENTRIES = 500;

/* ========== STATE ========== */
const state = {
  ready: false,
  view: 'loading',
  stack: [],
  modal: null,
  users: [],
  currentUserId: null,
  customMeals: [],
  preloadedMeals: [],
  favorites: [],
  logs: {},
  dailyTargets: {},
  tmp: {},
  editingEntryId: null
};

/* ========== STORAGE ========== */
function loadStored() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      users: state.users,
      currentUserId: state.currentUserId,
      customMeals: state.customMeals,
      favorites: state.favorites,
      logs: state.logs,
      dailyTargets: state.dailyTargets
    }));
  } catch (e) {
    toast('ไม่สามารถบันทึกข้อมูลได้', true);
  }
}

/* ========== UTILS ========== */
function uid(prefix = 'id') { return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function todayKey() {
  const d = new Date();
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yy}-${mm}-${dd}`;
}
function formatDateTH(key) {
  if (!key) return '';
  const [y, m, d] = key.split('-').map(Number);
  const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
  return `${d} ${months[m - 1]} ${y + 543}`;
}
function fmt(n, digits = 0) {
  if (typeof n !== 'number' || !isFinite(n)) return '0';
  if (digits === 0) return Math.round(n).toLocaleString('en-US');
  return n.toFixed(digits);
}
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
const h = (s) => escapeHtml(s);

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('err', !!isError);
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ========== MEAL CACHE ========== */
function normalizeCacheKey(name) {
  return String(name || '').trim().toLowerCase().replace(/\s+/g, ' ');
}
function readCache() {
  try { return JSON.parse(localStorage.getItem(MEAL_CACHE_KEY) || '{}'); }
  catch { return {}; }
}
function writeCache(cache) {
  try { localStorage.setItem(MEAL_CACHE_KEY, JSON.stringify(cache)); } catch {}
}
function getCachedEstimate(name) {
  const cache = readCache();
  const k = normalizeCacheKey(name);
  const entry = cache[k];
  if (!entry) return null;
  if (Date.now() - entry.timestamp > MEAL_CACHE_MAX_AGE_MS) {
    delete cache[k];
    writeCache(cache);
    return null;
  }
  return entry.data;
}
function cacheEstimate(name, data) {
  const cache = readCache();
  const k = normalizeCacheKey(name);
  cache[k] = { data, timestamp: Date.now() };
  const keys = Object.keys(cache);
  if (keys.length > MEAL_CACHE_MAX_ENTRIES) {
    const sorted = keys.sort((a, b) => cache[a].timestamp - cache[b].timestamp);
    sorted.slice(0, 50).forEach(key => delete cache[key]);
  }
  writeCache(cache);
}
function clearCacheEntry(name) {
  const cache = readCache();
  delete cache[normalizeCacheKey(name)];
  writeCache(cache);
}

/* ========== CALCULATIONS ========== */
function calcBMR(p) {
  const w = Number(p.weight) || 0;
  const hcm = Number(p.height) || 0;
  const a = Number(p.age) || 0;
  if (p.gender === 'male') return 10 * w + 6.25 * hcm - 5 * a + 5;
  return 10 * w + 6.25 * hcm - 5 * a - 161;
}
function proteinTarget(p) {
  const w = Number(p.weight) || 0;
  const mult = p.goal === 'lose' ? 1.6 : p.goal === 'gain' ? 1.8 : 1.2;
  return Math.round(w * mult);
}
function activityBonus(p) {
  return ACTIVITY_LABELS[p.defaultActivity || 'none']?.bonus || 0;
}
function goalAdjust(p) {
  return GOAL_ADJUST[p.goal] ?? 0;
}
function defaultCalorieTarget(p) {
  return Math.round(calcBMR(p)) + activityBonus(p) + goalAdjust(p);
}
function targetBreakdown(p) {
  const bmr = Math.round(calcBMR(p));
  const act = activityBonus(p);
  const g = goalAdjust(p);
  return { bmr, activity: act, goal: g, total: bmr + act + g };
}
function breakdownText(u) {
  const override = state.dailyTargets[u.id]?.calories;
  if (override) return `💡 เป้าวันนี้: ${fmt(override)} kcal (ตั้งเอง)`;
  const br = targetBreakdown(u);
  const parts = [`BMR (${fmt(br.bmr)})`];
  const actKey = u.defaultActivity || 'none';
  if (br.activity) parts.push(`กิจกรรม${ACTIVITY_LABELS[actKey].name} (+${br.activity})`);
  if (br.goal !== 0) parts.push(`เป้าหมาย${GOAL_LABELS[u.goal]} (${br.goal > 0 ? '+' : ''}${br.goal})`);
  return `💡 คำนวณจาก: ${parts.join(' + ')}`;
}
function effectiveCalorieTarget(userId) {
  const u = state.users.find(x => x.id === userId);
  if (!u) return 2000;
  const override = state.dailyTargets[userId];
  if (override && override.calories) return override.calories;
  return defaultCalorieTarget(u);
}
function currentUser() { return state.users.find(u => u.id === state.currentUserId); }

/* ========== MEAL DATA ========== */
function allMeals() { return [...state.preloadedMeals, ...state.customMeals]; }
function findMeal(id) { return allMeals().find(m => m.id === id) || null; }

function calcEntryTotals(entry) {
  const m = entry.snapshot || findMeal(entry.mealId);
  if (!m) return { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, weight_g: 0 };
  const mult = (entry.sizePct || 100) / 100;
  let calories = (m.baseCalories || 0) * mult;
  let protein = (m.protein_g || 0) * mult;
  let carbs = (m.carbs_g || 0) * mult;
  let fat = (m.fat_g || 0) * mult;
  let weight = (m.baseWeight_g || 0) * mult;
  (entry.addons || []).forEach(id => {
    const a = ADDONS.find(x => x.id === id);
    if (a) {
      calories += a.calories;
      protein += a.protein_g;
      carbs += a.carbs_g;
      fat += a.fat_g;
    }
  });
  return { calories, protein_g: protein, carbs_g: carbs, fat_g: fat, weight_g: weight };
}

function todayEntries(userId = state.currentUserId) {
  const key = todayKey();
  return ((state.logs[userId] || {})[key] || []).slice();
}

function sumEntries(entries) {
  return entries.reduce((acc, e) => {
    const t = calcEntryTotals(e);
    acc.calories += t.calories;
    acc.protein_g += t.protein_g;
    acc.carbs_g += t.carbs_g;
    acc.fat_g += t.fat_g;
    return acc;
  }, { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0 });
}

/* ========== LOGGING ========== */
function addLogEntry(entry, dateKey = todayKey()) {
  if (!state.logs[state.currentUserId]) state.logs[state.currentUserId] = {};
  if (!state.logs[state.currentUserId][dateKey]) state.logs[state.currentUserId][dateKey] = [];
  entry.id = entry.id || uid('e');
  entry.dateKey = dateKey;
  entry.loggedAt = Date.now();
  state.logs[state.currentUserId][dateKey].push(entry);
  persist();
}
function deleteLogEntry(entryId, dateKey = todayKey()) {
  const arr = (state.logs[state.currentUserId] || {})[dateKey];
  if (!arr) return;
  const idx = arr.findIndex(e => e.id === entryId);
  if (idx >= 0) { arr.splice(idx, 1); persist(); }
}
function updateLogEntry(entryId, patch, dateKey = todayKey()) {
  const arr = (state.logs[state.currentUserId] || {})[dateKey];
  if (!arr) return;
  const e = arr.find(x => x.id === entryId);
  if (e) { Object.assign(e, patch); persist(); }
}

/* ========== NAV ========== */
function go(view, data) {
  if (state.view !== 'loading') state.stack.push({ view: state.view, tmp: { ...state.tmp } });
  state.view = view;
  state.tmp = data || {};
  state.modal = null;
  render();
  window.scrollTo(0, 0);
}
function replace(view, data) {
  state.view = view;
  state.tmp = data || {};
  state.modal = null;
  render();
  window.scrollTo(0, 0);
}
function back() {
  const prev = state.stack.pop();
  if (prev) { state.view = prev.view; state.tmp = prev.tmp || {}; }
  else { state.view = 'dashboard'; state.tmp = {}; }
  state.modal = null;
  render();
}
function goHome() {
  state.stack = [];
  state.view = 'dashboard';
  state.tmp = {};
  state.modal = null;
  render();
}

  const favs = state.favorites
    .map(id => findMeal(id))
    .filter(m => m && !loggedIds.has(m.id));
  return favs.slice(0, 3);
}

  return `
    <div class="card">
      <h3 style="margin-top:0">🍚 ${h(r.name)}</h3>
      <div class="row between"><span class="muted">แคลอรี่</span><b>${fmt(r.calories)} kcal</b></div>

      <div class="row between"><span class="muted">คาร์บ</span><b>${fmt(r.carbs_g, 1)} ก.</b></div>

function renderMealDetail() {
  const t = state.tmp;
  const meal = t.meal || findMeal(t.mealId);
  if (!meal) {
    return `<div class="screen"><div class="header"><button class="icon-btn" data-act="back">←</button><h1>ไม่พบเมนู</h1></div></div>`;
  }
  const sizePct = t.sizePct || 100;
  const addons = t.addons || [];
  const mult = sizePct / 100;
  const cal = meal.baseCalories * mult + addons.reduce((s, id) => s + (ADDONS.find(a => a.id === id)?.calories || 0), 0);
  const prot = meal.protein_g * mult + addons.reduce((s, id) => s + (ADDONS.find(a => a.id === id)?.protein_g || 0), 0);
  const carb = meal.carbs_g * mult + addons.reduce((s, id) => s + (ADDONS.find(a => a.id === id)?.carbs_g || 0), 0);
  const fat = meal.fat_g * mult + addons.reduce((s, id) => s + (ADDONS.find(a => a.id === id)?.fat_g || 0), 0);
  const wt = meal.baseWeight_g * mult;
  const isFav = state.favorites.includes(meal.id);
  const editing = !!t.editingEntryId;
  const isCustom = state.customMeals.some(m => m.id === meal.id);
  const presetOn = SIZE_PRESETS.find(p => p.pct === sizePct);

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1 style="flex:1">${meal.emoji || '🍽️'} ${h(meal.name)}</h1>
        <button class="icon-btn" data-act="toggle-fav" data-id="${meal.id}" aria-label="เมนูประจำ" title="เมนูประจำ">${isFav ? '⭐' : '☆'}</button>
      </div>

      <div class="card">
        <div class="row between">
          <div class="muted">แคลอรี่</div>
          <div style="font-size:24px;font-weight:700;color:var(--primary-dark)">${fmt(cal)} kcal</div>
        </div>
        <div class="facts">
          <div><div class="v">${fmt(prot, 1)} ก.</div><div class="l">โปรตีน</div></div>
          <div><div class="v">${fmt(carb, 1)} ก.</div><div class="l">คาร์บ</div></div>
          <div><div class="v">${fmt(fat, 1)} ก.</div><div class="l">ไขมัน</div></div>
        </div>
        <div class="hint mt">น้ำหนักโดยประมาณ ${fmt(wt)} ก.</div>
      </div>

      <h2>ขนาด</h2>
      <div class="size-grid">
        ${SIZE_PRESETS.map(p => `
          <button type="button" class="${p.pct === sizePct && presetOn ? 'on' : ''}" data-act="set-size" data-v="${p.pct}">
            <span class="pct">${p.pct}%</span>
            <span class="label">${h(p.label)}</span>
          </button>
        `).join('')}
      </div>
      <div class="card tight mt">
        <div class="row between"><span class="muted">ปรับขนาดเอง</span><b>${sizePct}%</b></div>
        <div class="slider-wrap">
          <input type="range" id="size-slider" min="25" max="300" step="5" value="${sizePct}">
        </div>
      </div>

      <h2>เพิ่มเติม (ไม่จำเป็น)</h2>
      ${ADDONS.map(a => `
        <div class="addon ${addons.includes(a.id) ? 'on' : ''}" data-act="toggle-addon" data-v="${a.id}">
          <div class="emo">${a.emoji}</div>
          <div class="n">${h(a.name)}</div>
          <div class="c">+${fmt(a.calories)}</div>
          <div class="chk">${addons.includes(a.id) ? '✓' : ''}</div>
        </div>
      `).join('')}

      <div class="btn-row mt2">
        ${editing
          ? `<button class="btn block lg" data-act="update-log">✅ บันทึกการแก้ไข</button>`
          : `<button class="btn block lg" data-act="save-log">✅ บันทึกในวันนี้</button>`
        }
      </div>
      ${isCustom ? `
        <div class="btn-row mt">
          <button class="btn secondary sm" data-act="edit-custom-meal" data-id="${meal.id}">✏️ แก้ไขเมนู</button>
          <button class="btn ghost sm" data-act="delete-custom-meal" data-id="${meal.id}" style="color:var(--red)">🗑️ ลบเมนู</button>
        </div>
      ` : ''}
      <div style="height:30px"></div>
    </div>
  `;
}

/* ========== ROUTER ========== */
function render() {
  const root = document.getElementById('app');
  let html = '';
  try {
    switch (state.view) {
      case 'loading': html = `<div class="screen"><div class="spin"></div></div>`; break;
      case 'onboarding': html = renderOnboarding(); break;
      case 'dashboard': html = renderDashboard(); break;
      case 'add': html = renderAddChoose(); break;
      case 'library': html = renderLibrary(); break;
      case 'online': html = renderOnlineSearch(); break;
      case 'manual': html = renderManual(); break;
      case 'meal-detail': html = renderMealDetail(); break;
      case 'history': html = renderHistory(); break;
      case 'history-day': html = renderHistoryDay(); break;
      case 'favorites': html = renderFavorites(); break;
      case 'users': html = renderUserSwitcher(); break;
      case 'settings': html = renderSettings(); break;
      case 'profile-edit': html = renderProfileEdit(); break;
      default: html = `<div class="screen"><h1>?</h1></div>`;
    }
  } catch (err) {
    console.error(err);
    html = `<div class="screen"><div class="card"><h3>เกิดข้อผิดพลาด</h3><pre style="white-space:pre-wrap;font-size:12px">${h(err.message)}</pre><button class="btn" data-act="nav-home">กลับหน้าหลัก</button></div></div>`;
  }
  root.innerHTML = html;
}

  'online-search': async () => {
    const input = document.getElementById('online-q');
    const typed = (input?.value || '').trim();
    const q = typed || state.tmp.query || '';
    if (q.length < 2) { toast('พิมพ์ชื่อเมนูก่อน', true); return; }
    state.tmp.query = q;
    state.tmp.error = '';
    state.tmp.result = null;

    if (!state.tmp.bypassCache) {
      const cached = getCachedEstimate(q);
      if (cached) {
        state.tmp.result = { ...cached, fromCache: true };
        render();
        return;
      }
    }
    state.tmp.bypassCache = false;
    state.tmp.loading = true;
    render();
    try {
      const res = await fetch('/api/estimate-meal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mealName: q })
      });
      const data = await res.json();
      state.tmp.loading = false;
      if (!res.ok) {
        state.tmp.error = data.error || 'ค้นหาไม่สำเร็จ';
      } else {
        cacheEstimate(q, data);
        state.tmp.result = { ...data, fromCache: false };
      }
    } catch (err) {
      state.tmp.loading = false;
      state.tmp.error = 'เชื่อมต่อไม่ได้ ลองใหม่';
    }
    render();
  },

    clearCacheEntry(state.tmp.query);
    state.tmp.bypassCache = true;
    state.tmp.result = null;
    actions['online-search']();
  },

  // onboarding
  'onb-next': () => { state.tmp.step = 2; render(); },
  'onb-back': () => {

  },
  'set-gender': (e, btn) => { state.tmp.gender = btn.dataset.v; render(); },
  'set-goal': (e, btn) => { state.tmp.goal = btn.dataset.v; render(); },
  'set-activity': (e, btn) => { state.tmp.defaultActivity = btn.dataset.v; render(); },

    const height = Number(document.getElementById('pf-height')?.value);
    const weight = Number(document.getElementById('pf-weight')?.value);

    if (!age || age < 5 || age > 120) return toast('อายุไม่ถูกต้อง', true);
    if (!height || height < 80 || height > 230) return toast('ส่วนสูงไม่ถูกต้อง', true);
    if (!weight || weight < 20 || weight > 250) return toast('น้ำหนักไม่ถูกต้อง', true);

    const u = {
      id: uid('u'),
      name, gender: state.tmp.gender, goal: state.tmp.goal,
      age, height, weight, avatar: state.tmp.avatar || '🧑',
      defaultActivity: state.tmp.defaultActivity || 'none',

    persist();
    toast('เปลี่ยนผู้ใช้แล้ว');
    goHome();
  },
  'add-user': () => {
    if (state.users.length >= 3) return toast('สูงสุด 3 ผู้ใช้', true);
    go('profile-edit', { isNew: true, user: {}, gender: '', goal: '', avatar: '🧑' });
  },
  'edit-profile': () => go('profile-edit', { isNew: false, user: currentUser() }),
  'edit-avatar': (e, btn) => { state.tmp.avatar = btn.dataset.v; render(); },
  'edit-gender': (e, btn) => { state.tmp.gender = btn.dataset.v; render(); },
  'edit-goal': (e, btn) => { state.tmp.goal = btn.dataset.v; render(); },
  'edit-activity': (e, btn) => { state.tmp.defaultActivity = btn.dataset.v; render(); },

  'save-profile': () => {
    const name = document.getElementById('ef-name')?.value.trim();
    const age = Number(document.getElementById('ef-age')?.value);
    const height = Number(document.getElementById('ef-h')?.value);
    const weight = Number(document.getElementById('ef-w')?.value);
    const isNew = !!state.tmp.isNew;
    const u = isNew ? {} : (state.tmp.user || currentUser());
    const gender = state.tmp.gender ?? u.gender;
    const goal = state.tmp.goal ?? u.goal;
    const avatar = state.tmp.avatar ?? u.avatar ?? '🧑';
    const defaultActivity = state.tmp.defaultActivity ?? u.defaultActivity ?? 'none';
    if (!name) return toast('กรอกชื่อ', true);
    if (!gender) return toast('เลือกเพศ', true);
    if (!goal) return toast('เลือกเป้าหมาย', true);
    if (!age || age < 5 || age > 120) return toast('อายุไม่ถูกต้อง', true);
    if (!height || height < 80 || height > 230) return toast('ส่วนสูงไม่ถูกต้อง', true);
    if (!weight || weight < 20 || weight > 250) return toast('น้ำหนักไม่ถูกต้อง', true);
    if (isNew) {
      const nu = { id: uid('u'), name, gender, goal, age, height, weight, avatar, defaultActivity, createdAt: Date.now() };
      state.users.push(nu);
      state.currentUserId = nu.id;
    } else {
      Object.assign(u, { name, gender, goal, age, height, weight, avatar, defaultActivity });

    persist();
    toast('บันทึกแล้ว ✅');
    back();
  },

  'delete-user': () => {
    if (state.users.length <= 1) return toast('ต้องมีอย่างน้อย 1 ผู้ใช้', true);
    const u = state.tmp.user;
    if (!u || !confirm(`ลบ "${u.name}" และประวัติทั้งหมด?`)) return;
    const idx = state.users.findIndex(x => x.id === u.id);
    if (idx >= 0) state.users.splice(idx, 1);
    delete state.logs[u.id];
    delete state.dailyTargets[u.id];
    if (state.currentUserId === u.id) state.currentUserId = state.users[0].id;
    persist();
    toast('ลบแล้ว');
    goHome();
  },

  'set-target-preset': (e, btn) => {
    const v = btn.dataset.v;
    const u = currentUser();
    if (v === 'default') delete state.dailyTargets[u.id];
    else {
      state.dailyTargets[u.id] = { calories: Number(v) };
    }
    persist();
    toast('บันทึกเป้าแล้ว');
    render();
  },
  'save-custom-target': () => {
    const input = document.getElementById('custom-target');
    const u = currentUser();
    const v = Number(input?.value);
    if (!v) { delete state.dailyTargets[u.id]; }
    else if (v < 800 || v > 5000) { return toast('ค่าควรอยู่ระหว่าง 800-5000', true); }
    else state.dailyTargets[u.id] = { calories: v };
    persist();
    toast('บันทึกเป้าแล้ว');
    render();
  },

  'export-data': () => {
    const blob = new Blob([JSON.stringify({
      version: VERSION, exportedAt: new Date().toISOString(),
      users: state.users, currentUserId: state.currentUserId,
      customMeals: state.customMeals, favorites: state.favorites,
      logs: state.logs, dailyTargets: state.dailyTargets
    }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pracal-backup-${todayKey()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('ดาวน์โหลดแล้ว');
  },

  'clear-today': () => {
    if (!confirm('ลบรายการอาหารของวันนี้ทั้งหมด?')) return;
    const k = todayKey();
    if (state.logs[state.currentUserId]) delete state.logs[state.currentUserId][k];
    persist();
    toast('ล้างแล้ว');
    goHome();
  },

  'view-history-day': (e, el) => go('history-day', { date: el.dataset.v }),

  'update-app': () => {
    if (navigator.serviceWorker?.controller) {
      navigator.serviceWorker.getRegistration().then(reg => {
        if (reg?.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      });
    }
    setTimeout(() => location.reload(), 200);
  },
  'dismiss-update': () => {
    document.getElementById('update-banner').hidden = true;
  }
};

function collectManualDraft() {
  const name = document.getElementById('mf-name')?.value.trim();
  const cal = Number(document.getElementById('mf-cal')?.value);
  const wt = Number(document.getElementById('mf-wt')?.value) || 0;
  const p = Number(document.getElementById('mf-p')?.value) || 0;
  const c = Number(document.getElementById('mf-c')?.value) || 0;
  const f = Number(document.getElementById('mf-f')?.value) || 0;
  if (!name) { toast('กรอกชื่อเมนู', true); return null; }
  if (!cal || cal < 0) { toast('กรอกแคลอรี่', true); return null; }
  const emoji = state.tmp.draft?.emoji || '🍽️';
  return { name, emoji, baseCalories: cal, baseWeight_g: wt, protein_g: p, carbs_g: c, fat_g: f };
}

/* ========== EVENT DELEGATION ========== */
document.addEventListener('click', (e) => {
  const target = e.target.closest('[data-act]');
  if (!target) return;
  const act = target.dataset.act;
  const fn = actions[act];
  if (fn) {
    e.preventDefault();
    fn(e, target);
  }
});

document.addEventListener('input', (e) => {
  if (e.target.id === 'lib-search') {
    state.tmp.query = e.target.value;
    clearTimeout(render._t);
    render._t = setTimeout(render, 120);
  }
  if (e.target.id === 'size-slider') {
    state.tmp.sizePct = Number(e.target.value);
    clearTimeout(render._t);
    render._t = setTimeout(render, 50);
  }
});

/* ========== INIT ========== */
async function loadPreloadedMeals() {
  try {
    const res = await fetch('./meals.json');
    const data = await res.json();
    state.preloadedMeals = data.meals || [];
  } catch (err) {
    console.error('ไม่สามารถโหลด meals.json', err);
    state.preloadedMeals = [];
    toast('โหลดเมนูไม่ได้', true);
  }
}

function initFromStorage() {
  const s = loadStored();
  if (s) {
    state.users = s.users || [];
    state.currentUserId = s.currentUserId || (state.users[0]?.id ?? null);
    state.customMeals = s.customMeals || [];
    state.favorites = s.favorites || [];
    state.logs = s.logs || {};
    state.dailyTargets = s.dailyTargets || {};
  }
}

async function main() {
  initFromStorage();
  await loadPreloadedMeals();
  state.ready = true;
  if (state.users.length === 0) {
    state.view = 'onboarding';
    state.tmp = { step: 1 };
  } else {
    state.view = 'dashboard';
    state.tmp = {};
  }
  render();

  // Service worker
  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.register('./service-worker.js');
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });
    } catch (err) {
      console.warn('SW registration failed', err);
    }
  }
}

function showUpdateBanner() {
  const el = document.getElementById('update-banner');
  el.innerHTML = `
    <div style="flex:1"><b>🎉 มีเวอร์ชันใหม่</b><br><span style="font-size:13px;color:#ddd">แตะ "อัปเดต" เพื่อรีเฟรชแอป</span></div>
    <button data-act="update-app">อัปเดต</button>
    <button data-act="dismiss-update" style="background:transparent;color:#ddd;padding:6px">✕</button>
  `;
  el.hidden = false;
}

// Browser back button
window.addEventListener('popstate', () => {
  if (state.stack.length > 0) back();
});

main();

})();
</script>
</body>
</html>
