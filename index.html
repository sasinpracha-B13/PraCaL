<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#d97706">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PraCaL">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23d97706'/><text x='96' y='130' font-size='120' text-anchor='middle' fill='white'>%F0%9F%8D%9A</text></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d97706'/><text x='50' y='72' font-size='64' text-anchor='middle' fill='white'>%F0%9F%8D%9A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<title>PraCaL - นับแคลอาหารไทย</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #fefaf5;
    --bg-2: #fdf3e4;
    --card: #ffffff;
    --ink: #2a1d10;
    --ink-2: #5c4a38;
    --muted: #8a7560;
    --line: #ead9c2;
    --primary: #d97706;
    --primary-dark: #b35d00;
    --primary-soft: #fde7c8;
    --green: #16a34a;
    --green-soft: #dcfce7;
    --red: #dc2626;
    --red-soft: #fee2e2;
    --amber: #f59e0b;
    --amber-soft: #fef3c7;
    --shadow: 0 2px 6px rgba(120, 70, 0, 0.06), 0 1px 2px rgba(120, 70, 0, 0.08);
    --shadow-lg: 0 8px 24px rgba(120, 70, 0, 0.12);
    --radius: 14px;
    --radius-lg: 20px;
    --tap: 56px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Prompt', 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink);
    background: var(--bg);
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
  }
  #app { min-height: 100%; padding-top: var(--safe-top); padding-bottom: calc(72px + var(--safe-bottom)); }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: 0; }
  input, select, textarea { font-family: inherit; font-size: inherit; }
  a { color: var(--primary-dark); }

  /* ===== Layout ===== */
  .screen { max-width: 560px; margin: 0 auto; padding: 0 16px; }
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 4px 12px; position: sticky; top: 0;
    background: linear-gradient(180deg, var(--bg) 70%, rgba(254,250,245,0));
    z-index: 10;
  }
  .header h1 { font-size: 22px; margin: 0; font-weight: 600; flex: 1; }
  .header .sub { color: var(--muted); font-size: 14px; margin-top: -2px; }
  .icon-btn {
    min-width: 44px; min-height: 44px; padding: 0 10px; border-radius: 12px;
    background: transparent; color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 22px;
  }
  .icon-btn:active { background: var(--bg-2); }
  .icon-btn.ghost { font-size: 16px; color: var(--ink-2); }

  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px;
  }
  .card.tight { padding: 12px 14px; }

  .btn {
    min-height: var(--tap); padding: 0 20px; border-radius: 14px;
    font-size: 18px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--primary); color: #fff;
    transition: transform 60ms ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn.block { width: 100%; }
  .btn.secondary { background: #fff; color: var(--ink); border: 1.5px solid var(--line); }
  .btn.ghost { background: transparent; color: var(--ink-2); }
  .btn.danger { background: var(--red); color: #fff; }
  .btn.green { background: var(--green); color: #fff; }
  .btn.sm { min-height: 40px; font-size: 15px; padding: 0 14px; border-radius: 10px; }
  .btn.lg { min-height: 64px; font-size: 20px; }
  .btn:disabled { opacity: 0.5; pointer-events: none; }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-row > .btn { flex: 1; }

  /* Inputs */
  label { display: block; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; font-size: 15px; }
  .field { margin-bottom: 14px; }
  .input, .select, .textarea {
    width: 100%; min-height: 52px; padding: 12px 14px;
    border-radius: 12px; border: 1.5px solid var(--line);
    background: #fff; color: var(--ink); font-size: 17px;
    -webkit-appearance: none;
  }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .textarea { min-height: 90px; resize: vertical; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .seg { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg button {
    flex: 1; min-width: 72px; min-height: 52px; border-radius: 12px;
    border: 1.5px solid var(--line); background: #fff; color: var(--ink);
    font-weight: 500; font-size: 16px;
  }
  .seg button.on { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* Dashboard ring */
  .ring-wrap { display: flex; align-items: center; gap: 18px; }
  .ring { width: 140px; height: 140px; flex-shrink: 0; position: relative; }
  .ring svg { transform: rotate(-90deg); }
  .ring .num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .num b { font-size: 28px; font-weight: 600; line-height: 1; }
  .ring .num small { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .ring-labels { flex: 1; font-size: 15px; color: var(--ink-2); line-height: 1.8; }
  .ring-labels .v { color: var(--ink); font-weight: 600; }

  .bar-wrap { margin-top: 8px; }
  .bar-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 15px; }
  .bar-label .v { font-weight: 600; color: var(--ink); }
  .bar { height: 14px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--green); border-radius: 999px; transition: width 200ms ease; }
  .bar > i.warn { background: var(--amber); }
  .bar > i.over { background: var(--red); }

  /* Meal list */
  .meal-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; background: #fff; border-radius: 12px;
    margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer;
  }
  .meal-item .emo { font-size: 32px; line-height: 1; flex-shrink: 0; width: 44px; text-align: center; }
  .meal-item .body { flex: 1; min-width: 0; }
  .meal-item .name { font-weight: 500; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meal-item .sub { color: var(--muted); font-size: 13px; }
  .meal-item .cal { font-weight: 600; color: var(--primary-dark); font-size: 16px; white-space: nowrap; }

  .log-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 12px; background: #fff; border-radius: 12px;
    margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .log-item .emo { font-size: 28px; width: 36px; text-align: center; }
  .log-item .body { flex: 1; min-width: 0; }
  .log-item .name { font-weight: 500; font-size: 16px; }
  .log-item .sub { color: var(--muted); font-size: 13px; }
  .log-item .cal { font-weight: 600; color: var(--primary-dark); font-size: 17px; margin-right: 8px; }
  .log-item .del { font-size: 20px; color: var(--muted); background: transparent; min-width: 36px; min-height: 36px; border-radius: 8px; }
  .log-item .del:active { background: var(--red-soft); color: var(--red); }

  /* Category tabs */
  .tabs { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 8px; margin: 0 -16px; padding-left: 16px; padding-right: 16px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs button {
    padding: 10px 14px; border-radius: 999px; border: 1.5px solid var(--line);
    background: #fff; color: var(--ink-2); font-size: 15px; white-space: nowrap; font-weight: 500;
  }
  .tabs button.on { background: var(--primary); color: #fff; border-color: var(--primary); }

  .search-box {
    position: relative;
  }
  .search-box input { padding-left: 44px; }
  .search-box .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 18px; pointer-events: none; }

  /* Bottom nav */
  .botnav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    background: #fff; border-top: 1px solid var(--line);
    padding: 8px 0 calc(8px + var(--safe-bottom));
    display: flex; justify-content: space-around; max-width: 560px; margin: 0 auto;
  }
  .botnav button {
    background: transparent; color: var(--muted); padding: 4px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 12px;
    min-width: 60px; min-height: 52px; border-radius: 10px;
  }
  .botnav button .i { font-size: 22px; line-height: 1; }
  .botnav button.on { color: var(--primary); font-weight: 600; }

  .fab {
    position: fixed; right: 16px; bottom: calc(88px + var(--safe-bottom)); z-index: 15;
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--primary); color: #fff; font-size: 32px;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; justify-content: center;
  }
  .fab:active { transform: scale(0.95); }

  /* Confidence chips */
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 13px; font-weight: 500; }
  .chip.high { background: var(--green-soft); color: var(--green); }
  .chip.medium { background: var(--amber-soft); color: #92400e; }
  .chip.low { background: var(--red-soft); color: var(--red); }
  .chip.goal { background: var(--primary-soft); color: var(--primary-dark); }

  /* Callout */
  .callout {
    background: var(--primary-soft); border-radius: 12px; padding: 12px 14px;
    font-size: 15px; color: #703a00; margin-bottom: 12px; line-height: 1.6;
  }
  .callout b { color: #5a2e00; }
  .callout.info { background: #e0f2fe; color: #075985; }
  .callout ul { margin: 6px 0 0; padding-left: 20px; }
  .callout li { margin-bottom: 2px; }

  /* Addon list */
  .addon {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1.5px solid var(--line); border-radius: 12px; background: #fff;
    margin-bottom: 8px; cursor: pointer;
  }
  .addon.on { border-color: var(--primary); background: var(--primary-soft); }
  .addon .emo { font-size: 24px; width: 32px; text-align: center; }
  .addon .n { flex: 1; font-size: 15px; font-weight: 500; }
  .addon .c { color: var(--primary-dark); font-weight: 600; font-size: 14px; }
  .addon .chk { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
  .addon.on .chk { border-color: var(--primary); background: var(--primary); }

  /* Activity list (radio-style options) */
  .activity-list { display: flex; flex-direction: column; gap: 8px; }
  .activity-opt {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; border-radius: 12px;
    border: 1.5px solid var(--line); background: #fff;
    text-align: left; width: 100%; font-family: inherit;
    font-size: 16px; color: var(--ink);
    min-height: 56px;
  }
  .activity-opt.on { border-color: var(--primary); background: var(--primary-soft); }
  .activity-opt .radio { font-size: 20px; color: var(--muted); flex-shrink: 0; line-height: 1.4; width: 20px; text-align: center; }
  .activity-opt.on .radio { color: var(--primary); }
  .activity-opt .body { flex: 1; }
  .activity-opt .n { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .activity-opt .d { color: var(--muted); font-size: 13px; margin-top: 2px; line-height: 1.4; }

  /* Size buttons */
  .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .size-grid button {
    min-height: 64px; border-radius: 12px; border: 1.5px solid var(--line);
    background: #fff; font-size: 16px; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  }
  .size-grid button.on { border-color: var(--primary); background: var(--primary-soft); color: var(--primary-dark); }
  .size-grid button .pct { font-size: 18px; font-weight: 700; }
  .size-grid button .label { font-size: 12px; color: var(--muted); }
  .size-grid button.on .label { color: var(--primary-dark); }

  .slider-wrap { padding: 10px 0; }
  .slider-wrap input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; }
  .slider-wrap input[type=range]::-webkit-slider-runnable-track { height: 8px; background: var(--primary-soft); border-radius: 999px; }
  .slider-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%; background: var(--primary); margin-top: -9px; box-shadow: var(--shadow); }
  .slider-wrap input[type=range]::-moz-range-track { height: 8px; background: var(--primary-soft); border-radius: 999px; }
  .slider-wrap input[type=range]::-moz-range-thumb { width: 26px; height: 26px; border-radius: 50%; background: var(--primary); border: 0; }

  /* Nutrition facts row */
  .facts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; margin-top: 10px; }
  .facts > div { background: var(--bg-2); padding: 8px; border-radius: 10px; }
  .facts .v { font-weight: 700; color: var(--ink); font-size: 16px; }
  .facts .l { color: var(--muted); font-size: 12px; }

  /* Empty state */
  .empty { text-align: center; padding: 32px 20px; color: var(--muted); }
  .empty .big { font-size: 48px; margin-bottom: 8px; }

  /* Toast */
  #toast {
    position: fixed; left: 50%; bottom: calc(96px + var(--safe-bottom)); transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 12px;
    font-size: 15px; z-index: 50; box-shadow: var(--shadow-lg);
    opacity: 0; pointer-events: none; transition: opacity 200ms, transform 200ms;
    max-width: 80%;
  }
  #toast.show { opacity: 1; transform: translate(-50%, -8px); }
  #toast.err { background: var(--red); }

  /* Update banner */
  #update-banner {
    position: fixed; left: 12px; right: 12px; bottom: calc(96px + var(--safe-bottom));
    background: var(--ink); color: #fff; padding: 12px 16px; border-radius: 14px;
    display: flex; align-items: center; gap: 12px; z-index: 40; box-shadow: var(--shadow-lg);
    max-width: 536px; margin: 0 auto;
  }
  #update-banner b { color: #ffd18a; }
  #update-banner button { background: var(--primary); color: #fff; padding: 8px 14px; border-radius: 10px; font-weight: 600; }

  /* Spinner */
  .spin { width: 36px; height: 36px; border: 3px solid var(--primary-soft); border-top-color: var(--primary); border-radius: 50%; animation: spin 800ms linear infinite; margin: 24px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal */
  .modal-back {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 60;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 560px;
    padding: 20px 20px calc(20px + var(--safe-bottom)); max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { margin: 0 0 14px; font-size: 20px; font-weight: 600; }

  /* Misc */
  h2 { font-size: 20px; font-weight: 600; margin: 18px 0 10px; }
  h3 { font-size: 17px; font-weight: 600; margin: 14px 0 8px; }
  .hint { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .center { text-align: center; }
  .mt { margin-top: 12px; }
  .mt2 { margin-top: 20px; }
  .mb { margin-bottom: 12px; }
  .muted { color: var(--muted); }
  .row { display: flex; gap: 10px; align-items: center; }
  .row.between { justify-content: space-between; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; background: var(--primary-soft); color: var(--primary-dark); font-size: 12px; font-weight: 600; }

  /* Quantity stepper */
  .qty-stepper {
    display: inline-flex; align-items: center; gap: 0;
    border: 1.5px solid var(--line); border-radius: 10px; overflow: hidden;
    background: #fff;
  }
  .qty-stepper button {
    width: 40px; height: 40px; background: transparent; color: var(--ink);
    font-size: 22px; line-height: 1; font-weight: 600;
  }
  .qty-stepper button:active { background: var(--bg-2); }
  .qty-stepper button:disabled { color: var(--line); pointer-events: none; }
  .qty-stepper .v { min-width: 32px; text-align: center; font-weight: 700; font-size: 17px; color: var(--ink); user-select: none; }

  /* Addon row with quantity */
  .addon-q {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1.5px solid var(--line); border-radius: 12px; background: #fff;
    margin-bottom: 8px;
  }
  .addon-q.on { border-color: var(--primary); background: var(--primary-soft); }
  .addon-q .emo { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
  .addon-q .n { flex: 1; font-size: 15px; font-weight: 500; min-width: 0; }
  .addon-q .n small { display: block; color: var(--muted); font-size: 12px; font-weight: 400; }
  .addon-q .c { color: var(--primary-dark); font-weight: 600; font-size: 13px; margin-right: 4px; white-space: nowrap; }

  /* Help icon */
  .help {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 50%; font-size: 12px;
    background: var(--bg-2); color: var(--muted); margin-left: 4px;
    cursor: pointer; font-weight: 700; vertical-align: middle;
  }
  .help:active { background: var(--primary-soft); color: var(--primary-dark); }

  /* Weekly strip */
  .week-strip { display: flex; gap: 6px; padding: 8px 0; justify-content: space-between; }
  .week-bar {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    min-width: 0;
  }
  .week-bar .day { font-size: 11px; color: var(--muted); }
  .week-bar .col { width: 100%; height: 60px; background: var(--bg-2); border-radius: 6px; position: relative; overflow: hidden; }
  .week-bar .col i { position: absolute; bottom: 0; left: 0; right: 0; background: var(--primary); border-radius: 6px 6px 0 0; transition: height 200ms; }
  .week-bar .col i.ok { background: var(--green); }
  .week-bar .col i.warn { background: var(--amber); }
  .week-bar .col i.over { background: var(--red); }
  .week-bar .col i.low { background: var(--red); opacity: 0.6; }
  .week-bar .num { font-size: 11px; color: var(--ink-2); font-weight: 600; }
  .week-bar.today .day { color: var(--primary); font-weight: 700; }

  /* Sparkline / chart */
  .chart-card { background: #fff; border-radius: 12px; padding: 12px 10px; }
  .chart-card svg { width: 100%; height: auto; display: block; }

  /* Report section */
  .stat-card {
    background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .stat-card h3 { margin: 0 0 10px; font-size: 16px; display: flex; align-items: center; gap: 6px; }
  .stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; font-size: 15px; }
  .stat-row.bold { font-weight: 600; font-size: 17px; color: var(--primary-dark); border-top: 1px solid var(--line); padding-top: 8px; margin-top: 4px; }

  .mode-opt {
    display: block; width: 100%; text-align: left; padding: 14px;
    border: 1.5px solid var(--line); border-radius: 12px; background: #fff;
    margin-bottom: 8px; font-family: inherit;
  }
  .mode-opt.on { border-color: var(--primary); background: var(--primary-soft); }
  .mode-opt .mn { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  .mode-opt .md { color: var(--muted); font-size: 13px; margin-top: 4px; line-height: 1.5; }

  @media (max-width: 360px) {
    body { font-size: 16px; }
    .btn { font-size: 17px; }
    .ring { width: 120px; height: 120px; }
    .ring .num b { font-size: 24px; }
    .size-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div id="app">
  <div class="screen"><div class="spin"></div><div class="center muted">กำลังโหลด...</div></div>
</div>
<div id="toast" role="status" aria-live="polite"></div>
<div id="update-banner" hidden></div>
<script>
(() => {
'use strict';

/* ========== CONSTANTS ========== */
const VERSION = 'v1.1.0';

/* ========== STORAGE ========== */
function loadStored() {
  try {

    return JSON.parse(raw);
  } catch { return null; }
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      users: state.users,
      currentUserId: state.currentUserId,
      customMeals: state.customMeals,
      favorites: state.favorites,

/* ========== UTILS ========== */
function uid(prefix = 'id') { return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function todayKey() {
  const d = new Date();
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yy}-${mm}-${dd}`;
}
function formatDateTH(key) {
  if (!key) return '';
  const [y, m, d] = key.split('-').map(Number);
  const months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
  return `${d} ${months[m - 1]} ${y + 543}`;
}
function fmt(n, digits = 0) {
  if (typeof n !== 'number' || !isFinite(n)) return '0';
  if (digits === 0) return Math.round(n).toLocaleString('en-US');
  return n.toFixed(digits);
}
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* ========== MEAL CACHE ========== */
function normalizeCacheKey(name) {
  return String(name || '').trim().toLowerCase().replace(/\s+/g, ' ');
}
function readCache() {
  try { return JSON.parse(localStorage.getItem(MEAL_CACHE_KEY) || '{}'); }
  catch { return {}; }
}
function writeCache(cache) {
  try { localStorage.setItem(MEAL_CACHE_KEY, JSON.stringify(cache)); } catch {}
}
function getCachedEstimate(name) {
  const cache = readCache();
  const k = normalizeCacheKey(name);
  const entry = cache[k];
  if (!entry) return null;
  if (Date.now() - entry.timestamp > MEAL_CACHE_MAX_AGE_MS) {
    delete cache[k];
    writeCache(cache);
    return null;
  }
  return entry.data;
}
function cacheEstimate(name, data) {
  const cache = readCache();
  const k = normalizeCacheKey(name);
  cache[k] = { data, timestamp: Date.now() };
  const keys = Object.keys(cache);
  if (keys.length > MEAL_CACHE_MAX_ENTRIES) {
    const sorted = keys.sort((a, b) => cache[a].timestamp - cache[b].timestamp);
    sorted.slice(0, 50).forEach(key => delete cache[key]);
  }
  writeCache(cache);
}
function clearCacheEntry(name) {
  const cache = readCache();
  delete cache[normalizeCacheKey(name)];
  writeCache(cache);
}

/* ========== CALCULATIONS ========== */
function calcBMR(p) {
  const w = Number(p.weight) || 0;
  const hcm = Number(p.height) || 0;
  const a = Number(p.age) || 0;
  if (p.gender === 'male') return 10 * w + 6.25 * hcm - 5 * a + 5;
  return 10 * w + 6.25 * hcm - 5 * a - 161;
}
function proteinTarget(p) {
  const w = Number(p.weight) || 0;
  const mult = p.goal === 'lose' ? 1.6 : p.goal === 'gain' ? 1.8 : 1.2;
  return Math.round(w * mult);
}
function activityBonus(p) {
  return ACTIVITY_LABELS[p.defaultActivity || 'none']?.bonus || 0;
}
function goalAdjust(p) {
  return GOAL_ADJUST[p.goal] ?? 0;
}
function defaultCalorieTarget(p) {
  return Math.round(calcBMR(p)) + activityBonus(p) + goalAdjust(p);
}
function targetBreakdown(p) {
  const bmr = Math.round(calcBMR(p));
  const act = activityBonus(p);
  const g = goalAdjust(p);
  return { bmr, activity: act, goal: g, total: bmr + act + g };
}
function breakdownText(u) {
  const override = state.dailyTargets[u.id]?.calories;
  if (override) return `💡 เป้าวันนี้: ${fmt(override)} kcal (ตั้งเอง)`;
  const br = targetBreakdown(u);
  const parts = [`BMR (${fmt(br.bmr)})`];
  const actKey = u.defaultActivity || 'none';
  if (br.activity) parts.push(`กิจกรรม${ACTIVITY_LABELS[actKey].name} (+${br.activity})`);
  if (br.goal !== 0) parts.push(`เป้าหมาย${GOAL_LABELS[u.goal]} (${br.goal > 0 ? '+' : ''}${br.goal})`);
  return `💡 คำนวณจาก: ${parts.join(' + ')}`;
}
function effectiveCalorieTarget(userId) {
  const u = state.users.find(x => x.id === userId);
  if (!u) return 2000;
  const override = state.dailyTargets[userId];
  if (override && override.calories) return override.calories;
  return defaultCalorieTarget(u);
}
function currentUser() { return state.users.find(u => u.id === state.currentUserId); }

/* ========== MEAL DATA ========== */
function allMeals() { return [...state.preloadedMeals, ...state.customMeals]; }
function findMeal(id) { return allMeals().find(m => m.id === id) || null; }

function calcEntryTotals(entry) {
  const m = entry.snapshot || findMeal(entry.mealId);
  if (!m) return { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, sugar_g: 0, weight_g: 0 };
  const mult = (entry.sizePct || 100) / 100;
  const qty = entry.quantity || 1;
  const factor = mult * qty;
  let calories = (m.baseCalories || 0) * factor;
  let protein = (m.protein_g || 0) * factor;
  let carbs = (m.carbs_g || 0) * factor;
  let fat = (m.fat_g || 0) * factor;
  let sugar = (m.sugar_g || 0) * factor;
  let weight = (m.baseWeight_g || 0) * factor;
  (entry.addons || []).forEach(addon => {
    const id = typeof addon === 'string' ? addon : addon.id;
    const count = typeof addon === 'string' ? 1 : (addon.count || 0);
    if (!count) return;
    const a = ADDONS.find(x => x.id === id);
    if (a) {
      calories += a.calories * count;
      protein += a.protein_g * count;
      carbs += a.carbs_g * count;
      fat += a.fat_g * count;
      sugar += (a.sugar_g || 0) * count;
    }
  });
  return { calories, protein_g: protein, carbs_g: carbs, fat_g: fat, sugar_g: sugar, weight_g: weight };
}

function todayEntries(userId = state.currentUserId) {
  const key = todayKey();
  return ((state.logs[userId] || {})[key] || []).slice();
}

function sumEntries(entries) {
  return entries.reduce((acc, e) => {
    const t = calcEntryTotals(e);
    acc.calories += t.calories;
    acc.protein_g += t.protein_g;
    acc.carbs_g += t.carbs_g;
    acc.fat_g += t.fat_g;
    acc.sugar_g += t.sugar_g;
    return acc;
  }, { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, sugar_g: 0 });
}

/* ========== DAY ARITHMETIC ========== */
function dateToKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function keyToDate(k) {
  const [y, m, d] = k.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function addDays(d, n) {
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  return x;
}
function daysBetween(a, b) {
  const ms = keyToDate(b) - keyToDate(a);
  return Math.round(ms / 86400000);
}
function lastNDaysKeys(n, endKey) {
  const end = endKey ? keyToDate(endKey) : new Date();
  const keys = [];
  for (let i = n - 1; i >= 0; i--) keys.push(dateToKey(addDays(end, -i)));
  return keys;
}

/* ========== WEIGHT & TREND ========== */
function weightOnDate(user, key) {
  if (!user?.weights) return null;
  const w = user.weights.find(x => x.date === key);
  return w ? w.weight_kg : null;
}
function setWeight(user, key, kg) {
  user.weights = user.weights || [];
  const existing = user.weights.find(x => x.date === key);
  if (existing) existing.weight_kg = kg;
  else user.weights.push({ date: key, weight_kg: kg });
  user.weights.sort((a, b) => a.date.localeCompare(b.date));
}
function removeWeight(user, key) {
  if (!user.weights) return;
  user.weights = user.weights.filter(x => x.date !== key);
}
function sortedWeights(user, days = null) {
  const all = (user?.weights || []).slice().sort((a, b) => a.date.localeCompare(b.date));
  if (days == null) return all;
  const cutoff = dateToKey(addDays(new Date(), -days + 1));
  return all.filter(w => w.date >= cutoff);
}
function movingAverage(series, window = 7) {
  const sorted = series.slice().sort((a, b) => a.date.localeCompare(b.date));
  return sorted.map((pt, i) => {
    const slice = sorted.slice(Math.max(0, i - window + 1), i + 1);
    const avg = slice.reduce((s, x) => s + x.weight_kg, 0) / slice.length;
    return { date: pt.date, weight_kg: avg };
  });
}
function linearRegression(series) {
  if (series.length < 2) return { slope: 0, intercept: series[0]?.weight_kg || 0 };
  const base = keyToDate(series[0].date);
  const pts = series.map(p => ({ x: daysBetween(series[0].date, p.date), y: p.weight_kg }));
  const n = pts.length;
  const sx = pts.reduce((s, p) => s + p.x, 0);
  const sy = pts.reduce((s, p) => s + p.y, 0);
  const sxy = pts.reduce((s, p) => s + p.x * p.y, 0);
  const sxx = pts.reduce((s, p) => s + p.x * p.x, 0);
  const denom = n * sxx - sx * sx;
  const slope = denom === 0 ? 0 : (n * sxy - sx * sy) / denom;
  const intercept = (sy - slope * sx) / n;
  return { slope, intercept, baseDate: series[0].date };
}
function weightTrend(user, days = 14) {
  const recent = sortedWeights(user, days);
  if (recent.length < 2) return null;
  const { slope } = linearRegression(recent);
  return slope;
}
function weightChangeOver(user, days) {
  const recent = sortedWeights(user, days);
  if (recent.length < 2) return null;
  return recent[recent.length - 1].weight_kg - recent[0].weight_kg;
}
function latestWeight(user) {
  const all = sortedWeights(user);
  return all.length ? all[all.length - 1] : null;
}

/* ========== AGGREGATION ========== */
function dayTotals(userId, dateKey) {
  const entries = ((state.logs[userId] || {})[dateKey] || []);
  return { entries, totals: sumEntries(entries) };
}
function weekAggregate(userId, endKey) {
  const keys = lastNDaysKeys(7, endKey);
  const days = keys.map(k => {
    const { entries, totals } = dayTotals(userId, k);
    return { key: k, entries, totals, logged: entries.length > 0 };
  });
  const loggedDays = days.filter(d => d.logged);
  const avg = loggedDays.length === 0
    ? { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, sugar_g: 0 }
    : {
        calories: loggedDays.reduce((s, d) => s + d.totals.calories, 0) / loggedDays.length,
        protein_g: loggedDays.reduce((s, d) => s + d.totals.protein_g, 0) / loggedDays.length,
        carbs_g: loggedDays.reduce((s, d) => s + d.totals.carbs_g, 0) / loggedDays.length,
        fat_g: loggedDays.reduce((s, d) => s + d.totals.fat_g, 0) / loggedDays.length,
        sugar_g: loggedDays.reduce((s, d) => s + d.totals.sugar_g, 0) / loggedDays.length
      };
  return { days, avg, loggedCount: loggedDays.length };
}
function monthKeys(year, monthIdx) {
  const first = new Date(year, monthIdx, 1);
  const last = new Date(year, monthIdx + 1, 0);
  const keys = [];
  for (let d = 1; d <= last.getDate(); d++) keys.push(dateToKey(new Date(year, monthIdx, d)));
  return keys;
}
function monthAggregate(userId, year, monthIdx) {
  const keys = monthKeys(year, monthIdx);
  const days = keys.map(k => {
    const { entries, totals } = dayTotals(userId, k);
    return { key: k, entries, totals, logged: entries.length > 0 };
  });
  const loggedDays = days.filter(d => d.logged);
  const avg = loggedDays.length === 0
    ? { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, sugar_g: 0 }
    : {
        calories: loggedDays.reduce((s, d) => s + d.totals.calories, 0) / loggedDays.length,
        protein_g: loggedDays.reduce((s, d) => s + d.totals.protein_g, 0) / loggedDays.length,
        carbs_g: loggedDays.reduce((s, d) => s + d.totals.carbs_g, 0) / loggedDays.length,
        fat_g: loggedDays.reduce((s, d) => s + d.totals.fat_g, 0) / loggedDays.length,
        sugar_g: loggedDays.reduce((s, d) => s + d.totals.sugar_g, 0) / loggedDays.length
      };
  const totalMeals = loggedDays.reduce((s, d) => s + d.entries.length, 0);
  const avgMeals = loggedDays.length ? totalMeals / loggedDays.length : 0;
  let streak = 0;
  for (let i = days.length - 1; i >= 0; i--) {
    if (days[i].logged) streak++;
    else if (i < days.length - 1) break;
  }
  return { days, avg, loggedCount: loggedDays.length, totalDays: days.length, avgMeals, streak };
}

/* ========== SVG CHART (weight line) ========== */
function svgLineChart(series, avgSeries, w = 320, h = 140) {
  if (!series.length) {
    return `<svg viewBox="0 0 ${w} ${h}"><text x="${w/2}" y="${h/2}" text-anchor="middle" fill="#aaa" font-size="12">ไม่มีข้อมูล</text></svg>`;
  }
  const padL = 32, padR = 8, padT = 10, padB = 22;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const all = series.concat(avgSeries || []);
  const values = all.map(p => p.weight_kg);
  let minV = Math.min(...values);
  let maxV = Math.max(...values);
  if (minV === maxV) { minV -= 1; maxV += 1; }
  else { minV = Math.floor(minV - 0.5); maxV = Math.ceil(maxV + 0.5); }
  const firstDate = keyToDate(series[0].date);
  const lastDate = keyToDate(series[series.length - 1].date);
  const spanDays = Math.max(1, daysBetween(series[0].date, series[series.length - 1].date));
  const xFor = (pt) => padL + (daysBetween(series[0].date, pt.date) / spanDays) * innerW;
  const yFor = (v) => padT + (1 - (v - minV) / (maxV - minV)) * innerH;

  const path = (arr) => arr.map((p, i) => `${i === 0 ? 'M' : 'L'}${xFor(p).toFixed(1)},${yFor(p.weight_kg).toFixed(1)}`).join(' ');
  const gridY = [minV, (minV + maxV) / 2, maxV];
  const grid = gridY.map(v => `<line x1="${padL}" y1="${yFor(v)}" x2="${w - padR}" y2="${yFor(v)}" stroke="#eee" stroke-width="1"/><text x="${padL - 4}" y="${yFor(v) + 4}" text-anchor="end" fill="#999" font-size="10">${v.toFixed(1)}</text>`).join('');
  const dots = series.map(p => `<circle cx="${xFor(p).toFixed(1)}" cy="${yFor(p.weight_kg).toFixed(1)}" r="2.8" fill="#d97706"/>`).join('');
  const avgPath = (avgSeries && avgSeries.length > 1)
    ? `<path d="${path(avgSeries)}" fill="none" stroke="#b35d00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`
    : '';
  const dataPath = `<path d="${path(series)}" fill="none" stroke="#fde7c8" stroke-width="1.5" stroke-linecap="round"/>`;
  const startLbl = `${firstDate.getDate()}/${firstDate.getMonth() + 1}`;
  const endLbl = `${lastDate.getDate()}/${lastDate.getMonth() + 1}`;
  return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="กราฟน้ำหนัก">
    ${grid}
    ${dataPath}
    ${avgPath}
    ${dots}
    <text x="${padL}" y="${h - 6}" fill="#999" font-size="10">${startLbl}</text>
    <text x="${w - padR}" y="${h - 6}" text-anchor="end" fill="#999" font-size="10">${endLbl}</text>

/* ========== CSV EXPORT ========== */
function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return `"${s.replace(/"/g, '""')}"`;
  return s;
}
function buildCSV(userId, startKey, endKey) {
  const user = state.users.find(u => u.id === userId);
  const rows = [['วันที่','ชื่ออาหาร','จำนวน','ขนาด (%)','แคลอรี่','โปรตีน(g)','คาร์บ(g)','น้ำตาล(g)','ไขมัน(g)','น้ำหนัก(kg)']];
  const byDate = state.logs[userId] || {};
  const allDates = Object.keys(byDate).filter(d => d >= startKey && d <= endKey).sort();
  allDates.forEach(d => {
    const entries = byDate[d] || [];
    entries.forEach(e => {
      const m = e.snapshot || findMeal(e.mealId);
      const t = calcEntryTotals(e);
      const baseName = m ? m.name : '(ไม่พบเมนู)';
      const qty = e.quantity || 1;
      rows.push([d, baseName, qty, e.sizePct || 100,
        Math.round(t.calories), t.protein_g.toFixed(1), t.carbs_g.toFixed(1),
        t.sugar_g.toFixed(1), t.fat_g.toFixed(1), '']);
      (e.addons || []).forEach(a => {
        const id = typeof a === 'string' ? a : a.id;
        const count = typeof a === 'string' ? 1 : (a.count || 0);
        if (!count) return;
        const addon = ADDONS.find(x => x.id === id);
        if (!addon) return;
        rows.push([d, `  + ${addon.name}`, count, '-',
          Math.round(addon.calories * count), (addon.protein_g * count).toFixed(1),
          (addon.carbs_g * count).toFixed(1), ((addon.sugar_g || 0) * count).toFixed(1),
          (addon.fat_g * count).toFixed(1), '']);
      });
    });
    const daySum = sumEntries(entries);
    const wk = weightOnDate(user, d);
    rows.push([d, 'สรุปวัน', '-', '-',
      Math.round(daySum.calories), daySum.protein_g.toFixed(1),
      daySum.carbs_g.toFixed(1), daySum.sugar_g.toFixed(1), daySum.fat_g.toFixed(1),
      wk != null ? wk.toFixed(1) : '']);
  });
  (user?.weights || []).forEach(w => {
    if (w.date >= startKey && w.date <= endKey && !allDates.includes(w.date)) {
      rows.push([w.date, '(ชั่งน้ำหนัก)', '-', '-', '-', '-', '-', '-', '-', w.weight_kg.toFixed(1)]);
    }
  });
  const body = rows.map(r => r.map(csvEscape).join(',')).join('\n');
  return '\uFEFF' + body;
}
function downloadCSV(days) {
  const u = currentUser();
  if (!u) return;
  const end = todayKey();
  const start = days ? dateToKey(addDays(new Date(), -(days - 1))) : '0000-01-01';
  const csv = buildCSV(u.id, start, end);
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const safeName = (u.name || 'user').replace(/[^\w\u0E00-\u0E7F-]/g, '_');
  const a = document.createElement('a');
  a.href = url;
  const prefix = days ? `${start}_to_${end}` : `all_to_${end}`;
  a.download = `pracal_${safeName}_${prefix}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('ดาวน์โหลดแล้ว ✅');
}

/* ========== LOGGING ========== */
function addLogEntry(entry, dateKey = todayKey()) {
  if (!state.logs[state.currentUserId]) state.logs[state.currentUserId] = {};
  if (!state.logs[state.currentUserId][dateKey]) state.logs[state.currentUserId][dateKey] = [];
  entry.id = entry.id || uid('e');
  entry.dateKey = dateKey;
  entry.loggedAt = Date.now();
  state.logs[state.currentUserId][dateKey].push(entry);
  persist();
}
function deleteLogEntry(entryId, dateKey = todayKey()) {
  const arr = (state.logs[state.currentUserId] || {})[dateKey];
  if (!arr) return;
  const idx = arr.findIndex(e => e.id === entryId);
  if (idx >= 0) { arr.splice(idx, 1); persist(); }
}
function updateLogEntry(entryId, patch, dateKey = todayKey()) {
  const arr = (state.logs[state.currentUserId] || {})[dateKey];
  if (!arr) return;
  const e = arr.find(x => x.id === entryId);
  if (e) { Object.assign(e, patch); persist(); }
}

/* ========== NAV ========== */
function go(view, data) {
  if (state.view !== 'loading') state.stack.push({ view: state.view, tmp: { ...state.tmp } });
  state.view = view;
  state.tmp = data || {};
  state.modal = null;
  render();
  window.scrollTo(0, 0);
}
function replace(view, data) {
  state.view = view;
  state.tmp = data || {};
  state.modal = null;
  render();
  window.scrollTo(0, 0);
}
function back() {
  const prev = state.stack.pop();
  if (prev) { state.view = prev.view; state.tmp = prev.tmp || {}; }
  else { state.view = 'dashboard'; state.tmp = {}; }
  state.modal = null;
  render();
}
function goHome() {
  state.stack = [];
  state.view = 'dashboard';
  state.tmp = {};
  state.modal = null;
  render();
}

const DOW = ['อา','จ','อ','พ','พฤ','ศ','ส'];

function weeklyStripHtml(user, calTarget) {
  const agg = weekAggregate(user.id);
  const today = todayKey();
  const bars = agg.days.map(d => {
    const pct = d.logged && calTarget ? (d.totals.calories / calTarget) * 100 : 0;
    const cls = !d.logged ? '' : pct > 110 ? 'over' : pct < 75 ? 'low' : pct < 90 ? 'warn' : 'ok';
    const h = Math.min(100, Math.max(d.logged ? 4 : 0, pct));
    const date = keyToDate(d.key);
    const dow = DOW[date.getDay()];
    const isToday = d.key === today;
    return `
      <div class="week-bar ${isToday ? 'today' : ''}" data-act="view-history-day" data-v="${d.key}">
        <div class="day">${dow}</div>
        <div class="col"><i class="${cls}" style="height:${h.toFixed(1)}%"></i></div>
        <div class="num">${d.logged ? fmt(d.totals.calories / 100, 0) + '' : '·'}</div>
      </div>
    `;
  }).join('');
  const gap = calTarget - agg.avg.calories;
  const projKg = agg.loggedCount > 0 ? (gap * 30) / KCAL_PER_KG_FAT : 0;
  let contextMsg = '';
  if (agg.loggedCount === 0) {
    contextMsg = 'ยังไม่มีข้อมูลสัปดาห์นี้';
  } else if (gap > 700) {
    contextMsg = '⚠️ ขาดดุลหนัก (>700 kcal/วัน) อาจเสียกล้ามเนื้อ';
  } else if (gap > 300) {
    contextMsg = `ลดน้ำหนักปลอดภัย · คาด ~${Math.abs(projKg).toFixed(1)} kg ใน 30 วัน`;
  } else if (gap > 100) {
    contextMsg = `ขาดดุลเล็กน้อย · คาด ~${Math.abs(projKg).toFixed(1)} kg ใน 30 วัน`;
  } else if (gap > -100) {
    contextMsg = 'รักษาน้ำหนัก ✓';
  } else if (gap > -400) {
    contextMsg = `เกินเป้าเล็กน้อย · คาด +${Math.abs(projKg).toFixed(1)} kg ใน 30 วัน`;
  } else {
    contextMsg = `⚠️ กินเกินเยอะ · คาด +${Math.abs(projKg).toFixed(1)} kg ใน 30 วัน`;
  }
  return `
    <div class="card">
      <div class="row between" style="margin-bottom:4px">
        <h3 style="margin:0;font-size:16px">📅 7 วันล่าสุด</h3>
        <span class="muted" style="font-size:12px">บันทึก ${agg.loggedCount}/7</span>
      </div>
      <div class="week-strip">${bars}</div>
      <div style="font-size:13px;line-height:1.7">
        <div class="row between"><span class="muted">เฉลี่ย</span><b>${fmt(agg.avg.calories)} / ${fmt(calTarget)} kcal</b></div>
        <div class="hint" style="font-size:13px;color:var(--ink-2);margin-top:4px">💡 ${contextMsg}</div>
      </div>
    </div>
  `;
}

function normalizeAddons(arr) {

}

function renderMealDetail() {
  const t = state.tmp;
  const meal = t.meal || findMeal(t.mealId);
  if (!meal) {
    return `<div class="screen"><div class="header"><button class="icon-btn" data-act="back">←</button><h1>ไม่พบเมนู</h1></div></div>`;
  }
  const sizePct = t.sizePct || 100;
  const quantity = t.quantity == null ? 1 : t.quantity;
  const addonCounts = t.addonCounts || {};
  const mult = sizePct / 100;
  const factor = mult * quantity;
  let cal = meal.baseCalories * factor;
  let prot = meal.protein_g * factor;
  let carb = meal.carbs_g * factor;
  let fat = meal.fat_g * factor;
  let sugar = (meal.sugar_g || 0) * factor;
  ADDONS.forEach(a => {
    const c = addonCounts[a.id] || 0;
    cal += a.calories * c;
    prot += a.protein_g * c;
    carb += a.carbs_g * c;
    fat += a.fat_g * c;
    sugar += (a.sugar_g || 0) * c;
  });
  const wt = meal.baseWeight_g * factor;
  const isFav = state.favorites.includes(meal.id);
  const editing = !!t.editingEntryId;
  const isCustom = state.customMeals.some(m => m.id === meal.id);
  const presetOn = SIZE_PRESETS.find(p => p.pct === sizePct);

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1 style="flex:1">${meal.emoji || '🍽️'} ${h(meal.name)}</h1>
        <button class="icon-btn" data-act="toggle-fav" data-id="${meal.id}" aria-label="เมนูประจำ" title="เมนูประจำ">${isFav ? '⭐' : '☆'}</button>
      </div>

      <div class="card">
        <div class="row between">
          <div class="muted">รวม ${quantity > 1 ? `× ${quantity}` : ''}</div>
          <div style="font-size:24px;font-weight:700;color:var(--primary-dark)">${fmt(cal)} kcal</div>
        </div>
        <div class="facts">
          <div><div class="v">${fmt(prot, 1)} ก.</div><div class="l">โปรตีน</div></div>
          <div><div class="v">${fmt(carb, 1)} ก.</div><div class="l">คาร์บ</div></div>
          <div><div class="v">${fmt(fat, 1)} ก.</div><div class="l">ไขมัน</div></div>
        </div>
        <div class="hint mt">น้ำหนักโดยประมาณ ${fmt(wt)} ก. · น้ำตาล ${fmt(sugar, 1)} ก.${sugar > 20 ? ` ≈ ${Math.round(sugar / 4)} ช้อนชา` : ''}</div>
      </div>

      <h2>ขนาดแต่ละจาน</h2>
      <div class="size-grid">
        ${SIZE_PRESETS.map(p => `
          <button type="button" class="${p.pct === sizePct && presetOn ? 'on' : ''}" data-act="set-size" data-v="${p.pct}">
            <span class="pct">${p.pct}%</span>
            <span class="label">${h(p.label)}</span>
          </button>
        `).join('')}
      </div>
      <div class="card tight mt">
        <div class="row between"><span class="muted">ปรับขนาดเอง</span><b>${sizePct}%</b></div>
        <div class="slider-wrap">
          <input type="range" id="size-slider" min="25" max="300" step="5" value="${sizePct}">
        </div>
      </div>

      <h2>จำนวน (กี่จาน/ชาม)</h2>
      <div class="card tight">
        <div class="row between">
          <div>
            <div style="font-weight:600">${h(meal.name)}</div>
            <div class="muted" style="font-size:13px">× ${fmt(meal.baseCalories * mult)} kcal/จาน = ${fmt(cal - ADDONS.reduce((s, a) => s + a.calories * (addonCounts[a.id] || 0), 0))} kcal</div>
          </div>
          ${qtyStepperHtml('main', quantity, 0, 5)}
        </div>
      </div>

      <h2>เพิ่มเติม (ไม่จำเป็น)</h2>
      ${ADDONS.map(a => {
        const c = addonCounts[a.id] || 0;
        const addCal = a.calories * c;
        return `
          <div class="addon-q ${c > 0 ? 'on' : ''}">
            <div class="emo">${a.emoji}</div>
            <div class="n">${h(a.name)}<small>${c > 0 ? `${c} × ${fmt(a.calories)} = ${fmt(addCal)} kcal` : `+${fmt(a.calories)} kcal/ชิ้น`}</small></div>
            ${qtyStepperHtml('addon_' + a.id, c, 0, 5)}
          </div>
        `;
      }).join('')}

      <div class="btn-row mt2">
        ${editing
          ? `<button class="btn block lg" data-act="update-log">✅ บันทึกการแก้ไข</button>`
          : `<button class="btn block lg" ${quantity < 1 ? 'disabled' : ''} data-act="save-log">✅ บันทึกในวันนี้</button>`
        }
      </div>
      ${isCustom ? `
        <div class="btn-row mt">
          <button class="btn secondary sm" data-act="edit-custom-meal" data-id="${meal.id}">✏️ แก้ไขเมนู</button>
          <button class="btn ghost sm" data-act="delete-custom-meal" data-id="${meal.id}" style="color:var(--red)">🗑️ ลบเมนู</button>
        </div>
      ` : ''}
      <div style="height:30px"></div>
    </div>
  `;
}

      <button type="button" data-act="qty-dec" data-v="${key}" ${value <= min ? 'disabled' : ''} aria-label="ลด">−</button>
      <span class="v">${value}</span>
      <button type="button" data-act="qty-inc" data-v="${key}" ${value >= max ? 'disabled' : ''} aria-label="เพิ่ม">+</button>

        return `

  const u = currentUser();
  if (!u) return '';
  const t = state.tmp;
  const now = new Date();
  const year = t.year != null ? t.year : now.getFullYear();
  const monthIdx = t.monthIdx != null ? t.monthIdx : now.getMonth();
  const agg = monthAggregate(u.id, year, monthIdx);
  const calTarget = effectiveCalorieTarget(u.id);
  const protTarget = proteinTarget(u);
  const monthNames = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const monthLabel = `${monthNames[monthIdx]} ${year + 543}`;

  const mStart = monthKeys(year, monthIdx)[0];
  const mEnd = monthKeys(year, monthIdx).slice(-1)[0];
  const monthWeights = (u.weights || []).filter(w => w.date >= mStart && w.date <= mEnd).sort((a, b) => a.date.localeCompare(b.date));
  const wStart = monthWeights[0];
  const wEnd = monthWeights[monthWeights.length - 1];
  const wChange = (wStart && wEnd) ? (wEnd.weight_kg - wStart.weight_kg) : null;

  const kcalGap = calTarget - agg.avg.calories;
  const projKg = agg.loggedCount > 0 ? (kcalGap * 30) / KCAL_PER_KG_FAT : 0;

  const proteinMetDays = agg.days.filter(d => d.logged && d.totals.protein_g >= protTarget).length;
  const proteinGap = protTarget - agg.avg.protein_g;

  const nextDate = new Date(year, monthIdx + 1, 1);
  const prevDate = new Date(year, monthIdx - 1, 1);
  const hasNext = nextDate <= new Date();

  const isEmpty = agg.loggedCount === 0 && monthWeights.length === 0;

  const recommendations = [];
  if (u.goal === 'lose' && wChange !== null && wChange < 0) recommendations.push('✓ รักษาอัตราการลด');
  if (u.goal === 'lose' && wChange !== null && wChange >= 0 && agg.loggedCount >= 7) recommendations.push('⚠️ น้ำหนักไม่ลด ลองลดแคลเฉลี่ย 200/วัน');
  if (proteinGap > 5) recommendations.push(`✓ เพิ่มโปรตีนอีก ${fmt(proteinGap)} ก./วัน`);
  if (agg.avg.sugar_g > SUGAR_DAILY_LIMIT_G) recommendations.push('⚠️ ลดน้ำตาลลงครึ่งหนึ่ง');
  if (agg.loggedCount / agg.totalDays < 0.6 && agg.loggedCount > 0) recommendations.push('💡 บันทึกให้สม่ำเสมอขึ้น');
  if (agg.streak >= 7) recommendations.push(`🏆 บันทึกต่อเนื่อง ${agg.streak} วัน!`);

  return `
    <div class="screen">
      <div class="header">
        <h1 style="flex:1">📊 รายงาน</h1>
        <button class="icon-btn ghost" data-act="nav-weight" title="น้ำหนัก">⚖️</button>
        <button class="icon-btn ghost" data-act="nav-history" title="ประวัติรายวัน">📅</button>
      </div>

      <div class="row between" style="margin-bottom:10px">
        <button class="icon-btn" data-act="month-prev">← ${monthNames[prevDate.getMonth()].slice(0,3)}</button>
        <div style="font-weight:600;font-size:17px">${monthLabel}</div>
        <button class="icon-btn ${hasNext ? '' : 'ghost'}" ${hasNext ? '' : 'disabled'} data-act="month-next">${monthNames[nextDate.getMonth()].slice(0,3)} →</button>
      </div>

      ${isEmpty ? `
        <div class="card empty"><div class="big">📊</div><div>ยังไม่มีข้อมูลเดือนนี้</div><div class="muted" style="font-size:14px;margin-top:4px">เริ่มบันทึกเพื่อดูรายงาน</div></div>
      ` : ''}

      ${monthWeights.length >= 1 ? `
        <div class="stat-card">
          <h3>⚖️ น้ำหนัก</h3>
          <div class="stat-row"><span>เริ่มเดือน</span><b>${wStart.weight_kg.toFixed(1)} kg</b></div>
          <div class="stat-row"><span>ล่าสุด</span><b>${wEnd.weight_kg.toFixed(1)} kg</b></div>
          ${wChange !== null && monthWeights.length > 1 ? `
            <div class="stat-row bold"><span>เปลี่ยนแปลง</span><b style="color:${wChange < 0 ? 'var(--green)' : wChange > 0 ? 'var(--red)' : ''}">${wChange > 0 ? '+' : ''}${wChange.toFixed(1)} kg ${wChange < 0 ? '⬇️' : wChange > 0 ? '⬆️' : ''}</b></div>
            <div class="chart-card mt">${svgLineChart(monthWeights, movingAverage(monthWeights, 7))}</div>
          ` : ''}
        </div>
      ` : ''}

      ${agg.loggedCount > 0 ? `
        <div class="stat-card">
          <h3>🔥 แคลอรี่ ${helpHtml('deficit')}</h3>
          <div class="stat-row"><span>เฉลี่ย/วัน</span><b>${fmt(agg.avg.calories)} kcal</b></div>
          <div class="stat-row"><span>เป้าหมาย</span><span>${fmt(calTarget)} kcal</span></div>
          <div class="stat-row"><span>${kcalGap >= 0 ? 'ขาดดุล' : 'เกิน'}</span><b style="color:${kcalGap >= 0 ? 'var(--green)' : 'var(--red)'}">${kcalGap >= 0 ? '-' : '+'}${fmt(Math.abs(kcalGap))} kcal/วัน</b></div>
          <div class="hint mt" style="font-size:13px;line-height:1.7">
            💡 ${fmt(Math.abs(kcalGap))} × 30 ÷ ${KCAL_PER_KG_FAT} = ~${Math.abs(projKg).toFixed(2)} kg ที่ควรเปลี่ยนจากแคลอย่างเดียว
          </div>
          ${wChange !== null && Math.abs(wChange) > Math.abs(projKg) + 0.5 ? `
            <div class="callout info mt">น้ำหนักเปลี่ยนจริง ${wChange > 0 ? '+' : ''}${wChange.toFixed(1)} kg — ส่วนต่างจากที่คำนวณจากแคล = การออกกำลัง + น้ำในร่างกาย</div>
          ` : ''}
        </div>

        <div class="stat-card">
          <h3>🥩 โปรตีน</h3>
          <div class="stat-row"><span>เฉลี่ย/วัน</span><b>${fmt(agg.avg.protein_g)} ก.</b></div>
          <div class="stat-row"><span>เป้า</span><span>${fmt(protTarget)} ก.</span></div>
          <div class="stat-row"><span>ผ่านเป้า</span><b>${proteinMetDays}/${agg.loggedCount} วัน (${Math.round((proteinMetDays / agg.loggedCount) * 100)}%)</b></div>
          ${proteinGap > 3 ? `<div class="hint mt">💡 เพิ่ม: ไข่ต้ม 1 ฟอง = +6g / อกไก่ 50g = +15g</div>` : ''}
        </div>

        <div class="stat-card">
          <h3>🍚 คาร์บ & น้ำตาล</h3>
          <div class="stat-row"><span>คาร์บเฉลี่ย/วัน</span><b>${fmt(agg.avg.carbs_g)} ก.</b></div>
          <div class="stat-row"><span>น้ำตาลเฉลี่ย/วัน</span><b style="color:${agg.avg.sugar_g > SUGAR_DAILY_LIMIT_G ? 'var(--red)' : agg.avg.sugar_g > SUGAR_WHO_RECOMMENDED_G ? 'var(--amber)' : 'var(--green)'}">${fmt(agg.avg.sugar_g, 1)} ก.</b></div>
          <div class="hint mt">💡 WHO แนะนำ &lt;${SUGAR_WHO_RECOMMENDED_G}g/วัน</div>
        </div>

        <div class="stat-card">
          <h3>📝 การบันทึก</h3>
          <div class="stat-row"><span>วันที่บันทึก</span><b>${agg.loggedCount}/${agg.totalDays} วัน (${Math.round((agg.loggedCount / agg.totalDays) * 100)}%)</b></div>
          <div class="stat-row"><span>มื้อเฉลี่ย/วัน</span><b>${agg.avgMeals.toFixed(1)}</b></div>
          ${agg.streak > 0 ? `<div class="stat-row"><span>streak ปัจจุบัน</span><b>${agg.streak} วันติดต่อ</b></div>` : ''}
        </div>
      ` : ''}

      ${recommendations.length ? `
        <div class="stat-card">
          <h3>🎯 คำแนะนำ</h3>
          ${recommendations.map(r => `<div class="stat-row" style="line-height:1.8">${r}</div>`).join('')}
        </div>
      ` : ''}

      <div style="height:30px"></div>
    </div>
    ${bottomNavHtml('reports')}
  `;
}

function renderWeightLog() {
  const u = currentUser();
  if (!u) return '';
  const series30 = sortedWeights(u, 30);
  const avgSeries = movingAverage(series30, 7);
  const latest = latestWeight(u);
  const c30 = weightChangeOver(u, 30);
  const slope = weightTrend(u, 14);
  const projections = slope != null ? {
    week: slope * 7,
    month: slope * 30,
    threeMonths: slope * 90
  } : null;

  let healthFlag = '';
  if (slope != null) {
    const weeklyRate = slope * 7;
    if (weeklyRate < -1) healthFlag = '⚠️ ลดเร็วเกินไป — อาจเสียมวลกล้ามเนื้อ<br>แนะนำ: เพิ่มแคล 200-300/วัน';
    else if (weeklyRate < -0.3) healthFlag = '✅ อัตราการลดที่ปลอดภัย (0.3-1 kg/สัปดาห์)';
    else if (u.goal === 'lose' && weeklyRate > 0.1) healthFlag = '⚠️ น้ำหนักไม่ลด — ตรวจสอบว่ากินเกินเป้าหรือไม่';
    else if (u.goal === 'gain' && weeklyRate > 0.05 && weeklyRate < 0.5) healthFlag = '✅ เพิ่มน้ำหนักปลอดภัย';
    else if (weeklyRate > 1) healthFlag = '⚠️ เพิ่มเร็วเกินไป — อาจได้ไขมันเยอะกว่ากล้ามเนื้อ';
  }

  return `
    <div class="screen">
      <div class="header">
        <button class="icon-btn" data-act="back">←</button>
        <h1>⚖️ บันทึกน้ำหนัก</h1>
      </div>

      <div class="card">
        <div class="row" style="gap:10px;align-items:flex-end">
          <div style="flex:1">
            <label for="wt-input">น้ำหนักวันนี้ (กก.)</label>
            <input id="wt-input" type="number" inputmode="decimal" class="input" placeholder="${latest ? latest.weight_kg.toFixed(1) : u.weight || '70'}" min="20" max="300" step="0.1">
          </div>
          <button class="btn" data-act="save-weight" style="min-height:52px">บันทึก</button>
        </div>
        <div class="hint">ชั่งตอนเช้าหลังตื่น (ก่อนกินอาหาร) ให้ผลแม่นที่สุด</div>
      </div>

      ${series30.length >= 2 ? `
        <div class="card">
          <div class="row between" style="margin-bottom:6px">
            <h3 style="margin:0">📊 30 วันล่าสุด</h3>
            <span class="muted" style="font-size:12px">${series30.length} จุด</span>
          </div>
          <div class="chart-card">${svgLineChart(series30, avgSeries)}</div>
          <div class="hint" style="margin-top:6px">
            <span style="color:#fde7c8">━</span> จุดรายวัน
            &nbsp;&nbsp;
            <span style="color:#b35d00">━</span> เฉลี่ย 7 วัน (smoother)
          </div>
        </div>

        <div class="card">
          <div class="stat-row"><span>ล่าสุด</span><b>${latest.weight_kg.toFixed(1)} kg</b></div>
          ${c30 !== null ? `<div class="stat-row"><span>เปลี่ยน 30 วัน</span><b style="color:${c30 < 0 ? 'var(--green)' : c30 > 0 ? 'var(--red)' : ''}">${c30 > 0 ? '+' : ''}${c30.toFixed(1)} kg</b></div>` : ''}
          ${slope != null ? `
            <div class="stat-row"><span>แนวโน้ม ${helpHtml('weight_trend')}</span><b>${slope > 0 ? '⬆️' : slope < 0 ? '⬇️' : '→'} ${slope >= 0 ? '+' : ''}${(slope * 1000).toFixed(0)} ก./วัน</b></div>
            ${projections ? `
              <div class="hint mt" style="font-size:13px;line-height:1.8">
                💡 ในอัตรานี้:<br>
                &nbsp;&nbsp;• 1 สัปดาห์ = ${projections.week >= 0 ? '+' : ''}${projections.week.toFixed(1)} kg<br>
                &nbsp;&nbsp;• 1 เดือน = ${projections.month >= 0 ? '+' : ''}${projections.month.toFixed(1)} kg<br>
                &nbsp;&nbsp;• 3 เดือน = ${projections.threeMonths >= 0 ? '+' : ''}${projections.threeMonths.toFixed(1)} kg
              </div>
            ` : ''}
            ${healthFlag ? `<div class="callout mt">${healthFlag}</div>` : ''}
          ` : ''}
        </div>
      ` : series30.length === 1 ? `
        <div class="card empty"><div class="big">📈</div><div>บันทึกไว้ 1 จุด</div><div class="muted" style="font-size:14px;margin-top:6px">บันทึกเพิ่มอีกอย่างน้อย 1 จุดเพื่อดูแนวโน้ม</div></div>
      ` : `
        <div class="card empty"><div class="big">⚖️</div><div>ยังไม่มีข้อมูลน้ำหนัก</div><div class="muted" style="font-size:14px;margin-top:6px">บันทึกน้ำหนักวันนี้เพื่อเริ่มต้น</div></div>
      `}

      ${sortedWeights(u).length ? `
        <h2>ประวัติทั้งหมด</h2>
        ${sortedWeights(u).slice().reverse().slice(0, 60).map(w => `
          <div class="card tight">
            <div class="row between">
              <div>
                <div style="font-weight:500">${formatDateTH(w.date)}</div>
                <div class="muted" style="font-size:12px">${w.date === todayKey() ? 'วันนี้' : ''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <b style="font-size:17px">${w.weight_kg.toFixed(1)} kg</b>
                <button class="icon-btn ghost" data-act="delete-weight" data-v="${w.date}" aria-label="ลบ">🗑️</button>
              </div>
            </div>
          </div>
        `).join('')}
      ` : ''}

      <div style="height:30px"></div>
    </div>
  `;
}

/* ========== ROUTER ========== */
function render() {
  const root = document.getElementById('app');
  let html = '';
  try {
    switch (state.view) {
      case 'loading': html = `<div class="screen"><div class="spin"></div></div>`; break;
      case 'onboarding': html = renderOnboarding(); break;
      case 'dashboard': html = renderDashboard(); break;
      case 'add': html = renderAddChoose(); break;
      case 'library': html = renderLibrary(); break;
      case 'online': html = renderOnlineSearch(); break;
      case 'manual': html = renderManual(); break;
      case 'meal-detail': html = renderMealDetail(); break;
      case 'history': html = renderHistory(); break;
      case 'history-day': html = renderHistoryDay(); break;
      case 'favorites': html = renderFavorites(); break;
      case 'users': html = renderUserSwitcher(); break;
      case 'settings': html = renderSettings(); break;
      case 'profile-edit': html = renderProfileEdit(); break;
      case 'reports': html = renderReports(); break;
      case 'weight-log': html = renderWeightLog(); break;
      default: html = `<div class="screen"><h1>?</h1></div>`;
    }
  } catch (err) {
    console.error(err);
    html = `<div class="screen"><div class="card"><h3>เกิดข้อผิดพลาด</h3><pre style="white-space:pre-wrap;font-size:12px">${h(err.message)}</pre><button class="btn" data-act="nav-home">กลับหน้าหลัก</button></div></div>`;
  }
  root.innerHTML = html;
}

  },

  'qty-inc': (e, btn) => {
    const key = btn.dataset.v;
    if (key === 'main') {
      state.tmp.quantity = Math.min(5, (state.tmp.quantity == null ? 1 : state.tmp.quantity) + 1);
    } else if (key.startsWith('addon_')) {
      const id = key.slice(6);
      state.tmp.addonCounts = state.tmp.addonCounts || {};
      state.tmp.addonCounts[id] = Math.min(5, (state.tmp.addonCounts[id] || 0) + 1);
    }
    render();
  },
  'qty-dec': (e, btn) => {
    const key = btn.dataset.v;
    if (key === 'main') {
      state.tmp.quantity = Math.max(0, (state.tmp.quantity == null ? 1 : state.tmp.quantity) - 1);
    } else if (key.startsWith('addon_')) {
      const id = key.slice(6);
      state.tmp.addonCounts = state.tmp.addonCounts || {};
      state.tmp.addonCounts[id] = Math.max(0, (state.tmp.addonCounts[id] || 0) - 1);
    }
    render();
  },

  'save-log': () => {
    const meal = state.tmp.meal || findMeal(state.tmp.mealId);
    if (!meal) return toast('ไม่พบเมนู', true);
    const qty = state.tmp.quantity == null ? 1 : state.tmp.quantity;
    if (qty < 1) return toast('ตั้งจำนวนอย่างน้อย 1', true);
    const counts = state.tmp.addonCounts || {};
    const addons = Object.keys(counts).filter(k => counts[k] > 0).map(id => ({ id, count: counts[id] }));
    addLogEntry({
      mealId: meal.id,
      sizePct: state.tmp.sizePct || 100,
      quantity: qty,
      addons,
      snapshot: state.tmp.meal ? { ...meal } : null
    });
    toast('บันทึกแล้ว ✅');
    goHome();
  },

  'update-log': () => {
    const meal = findMeal(state.tmp.mealId);
    if (!meal && !state.tmp.meal) return toast('ไม่พบเมนู', true);
    const qty = state.tmp.quantity == null ? 1 : state.tmp.quantity;
    if (qty < 1) return toast('ตั้งจำนวนอย่างน้อย 1', true);
    const counts = state.tmp.addonCounts || {};
    const addons = Object.keys(counts).filter(k => counts[k] > 0).map(id => ({ id, count: counts[id] }));
    updateLogEntry(state.tmp.editingEntryId, {
      sizePct: state.tmp.sizePct || 100,
      quantity: qty,
      addons
    });
    toast('อัปเดตแล้ว ✅');
    goHome();
  },

  'edit-entry': (e, el) => {
    const id = el.dataset.id;
    const entries = todayEntries();
    const entry = entries.find(x => x.id === id);
    if (!entry) return;
    const counts = {};
    (entry.addons || []).forEach(a => {
      const aid = typeof a === 'string' ? a : a.id;
      const c = typeof a === 'string' ? 1 : (a.count || 0);
      if (c > 0) counts[aid] = c;
    });
    go('meal-detail', {
      mealId: entry.mealId,
      meal: entry.snapshot || null,
      sizePct: entry.sizePct,
      quantity: entry.quantity || 1,
      addonCounts: counts,
      editingEntryId: id
    });
  },

  'delete-entry': (e, el) => {
    e.stopPropagation();
    const id = el.dataset.id;
    if (!confirm('ลบรายการนี้?')) return;
    deleteLogEntry(id);
    render();
    toast('ลบแล้ว');
  },

  'online-search': async () => {
    const input = document.getElementById('online-q');
    const typed = (input?.value || '').trim();
    const q = typed || state.tmp.query || '';
    if (q.length < 2) { toast('พิมพ์ชื่อเมนูก่อน', true); return; }
    state.tmp.query = q;
    state.tmp.error = '';
    state.tmp.result = null;

    if (!state.tmp.bypassCache) {
      const cached = getCachedEstimate(q);
      if (cached) {
        state.tmp.result = { ...cached, fromCache: true };
        render();
        return;
      }
    }
    state.tmp.bypassCache = false;
    state.tmp.loading = true;
    render();
    try {
      const res = await fetch('/api/estimate-meal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mealName: q })
      });
      const data = await res.json();
      state.tmp.loading = false;
      if (!res.ok) {
        state.tmp.error = data.error || 'ค้นหาไม่สำเร็จ';
      } else {
        cacheEstimate(q, data);
        state.tmp.result = { ...data, fromCache: false };
      }
    } catch (err) {
      state.tmp.loading = false;
      state.tmp.error = 'เชื่อมต่อไม่ได้ ลองใหม่';
    }
    render();
  },

  'online-refresh': () => {
    clearCacheEntry(state.tmp.query);
    state.tmp.bypassCache = true;
    state.tmp.result = null;
    actions['online-search']();
  },

    } else {
      Object.assign(u, { name, gender, goal, age, height, weight, avatar, defaultActivity });
    }
    persist();
    toast('บันทึกแล้ว ✅');
    back();
  },

  'delete-user': () => {
    if (state.users.length <= 1) return toast('ต้องมีอย่างน้อย 1 ผู้ใช้', true);
    const u = state.tmp.user;
    if (!u || !confirm(`ลบ "${u.name}" และประวัติทั้งหมด?`)) return;
    const idx = state.users.findIndex(x => x.id === u.id);
    if (idx >= 0) state.users.splice(idx, 1);
    delete state.logs[u.id];
    delete state.dailyTargets[u.id];
    if (state.currentUserId === u.id) state.currentUserId = state.users[0].id;
    persist();
    toast('ลบแล้ว');
    goHome();
  },

  'set-target-preset': (e, btn) => {
    const v = btn.dataset.v;
    const u = currentUser();
    if (v === 'default') delete state.dailyTargets[u.id];
    else {
      state.dailyTargets[u.id] = { calories: Number(v) };
    }
    persist();
    toast('บันทึกเป้าแล้ว');
    render();
  },
  'save-custom-target': () => {
    const input = document.getElementById('custom-target');
    const u = currentUser();
    const v = Number(input?.value);
    if (!v) { delete state.dailyTargets[u.id]; }
    else if (v < 800 || v > 5000) { return toast('ค่าควรอยู่ระหว่าง 800-5000', true); }
    else state.dailyTargets[u.id] = { calories: v };
    persist();
    toast('บันทึกเป้าแล้ว');
    render();
  },

  'export-data': () => {
    const blob = new Blob([JSON.stringify({
      version: VERSION, exportedAt: new Date().toISOString(),
      users: state.users, currentUserId: state.currentUserId,
      customMeals: state.customMeals, favorites: state.favorites,
      logs: state.logs, dailyTargets: state.dailyTargets
    }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pracal-backup-${todayKey()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('ดาวน์โหลดแล้ว');
  },

  'clear-today': () => {
    if (!confirm('ลบรายการอาหารของวันนี้ทั้งหมด?')) return;
    const k = todayKey();
    if (state.logs[state.currentUserId]) delete state.logs[state.currentUserId][k];
    persist();
    toast('ล้างแล้ว');
    goHome();
  },

  'view-history-day': (e, el) => go('history-day', { date: el.dataset.v }),

  'update-app': () => {
    if (navigator.serviceWorker?.controller) {
      navigator.serviceWorker.getRegistration().then(reg => {
        if (reg?.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      });
    }
    setTimeout(() => location.reload(), 200);
  },
  'dismiss-update': () => {
    document.getElementById('update-banner').hidden = true;
  }
};

function collectManualDraft() {
  const name = document.getElementById('mf-name')?.value.trim();
  const cal = Number(document.getElementById('mf-cal')?.value);
  const wt = Number(document.getElementById('mf-wt')?.value) || 0;
  const p = Number(document.getElementById('mf-p')?.value) || 0;
  const c = Number(document.getElementById('mf-c')?.value) || 0;
  const f = Number(document.getElementById('mf-f')?.value) || 0;
  const s = Math.min(c, Number(document.getElementById('mf-s')?.value) || 0);
  if (!name) { toast('กรอกชื่อเมนู', true); return null; }
  if (!cal || cal < 0) { toast('กรอกแคลอรี่', true); return null; }
  const emoji = state.tmp.draft?.emoji || '🍽️';
  return { name, emoji, baseCalories: cal, baseWeight_g: wt, protein_g: p, carbs_g: c, fat_g: f, sugar_g: s };
}

/* ========== EVENT DELEGATION ========== */
document.addEventListener('click', (e) => {
  const target = e.target.closest('[data-act]');
  if (!target) return;
  const act = target.dataset.act;
  const fn = actions[act];
  if (fn) {
    e.preventDefault();
    fn(e, target);
  }
});

document.addEventListener('input', (e) => {
  if (e.target.id === 'lib-search') {
    state.tmp.query = e.target.value;
    clearTimeout(render._t);
    render._t = setTimeout(render, 120);
  }
  if (e.target.id === 'size-slider') {
    state.tmp.sizePct = Number(e.target.value);
    clearTimeout(render._t);
    render._t = setTimeout(render, 50);
  }
});

/* ========== INIT ========== */
async function loadPreloadedMeals() {
  try {
    const res = await fetch('./meals.json');
    const data = await res.json();
    state.preloadedMeals = data.meals || [];
  } catch (err) {
    console.error('ไม่สามารถโหลด meals.json', err);
    state.preloadedMeals = [];
    toast('โหลดเมนูไม่ได้', true);
  }
}

function migrateData() {
  let changed = false;
  state.users.forEach(u => {
    if (!u.weights) { u.weights = []; changed = true; }
    if (!u.displayMode) { u.displayMode = 'normal'; changed = true; }
    if (!u.defaultActivity) { u.defaultActivity = 'none'; changed = true; }
  });
  for (const userId in state.logs) {
    for (const date in state.logs[userId]) {
      const entries = state.logs[userId][date];
      entries.forEach(e => {
        if (e.quantity === undefined) { e.quantity = 1; changed = true; }
        if (Array.isArray(e.addons) && e.addons.length > 0 && typeof e.addons[0] === 'string') {
          e.addons = e.addons.map(id => ({ id, count: 1 }));
          changed = true;
        }
      });
    }
  }
  if (changed) persist();
}

function initFromStorage() {
  const s = loadStored();
  if (s) {
    state.users = s.users || [];
    state.currentUserId = s.currentUserId || (state.users[0]?.id ?? null);
    state.customMeals = s.customMeals || [];
    state.favorites = s.favorites || [];
    state.logs = s.logs || {};
    state.dailyTargets = s.dailyTargets || {};
  }
  migrateData();
}

async function main() {
  initFromStorage();
  await loadPreloadedMeals();
  state.ready = true;
  if (state.users.length === 0) {
    state.view = 'onboarding';
    state.tmp = { step: 1 };
  } else {
    state.view = 'dashboard';
    state.tmp = {};
  }
  render();

  // Service worker
  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.register('./service-worker.js');
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });
    } catch (err) {
      console.warn('SW registration failed', err);
    }
  }
}

function showUpdateBanner() {
  const el = document.getElementById('update-banner');
  el.innerHTML = `
    <div style="flex:1"><b>🎉 มีเวอร์ชันใหม่</b><br><span style="font-size:13px;color:#ddd">แตะ "อัปเดต" เพื่อรีเฟรชแอป</span></div>
    <button data-act="update-app">อัปเดต</button>
    <button data-act="dismiss-update" style="background:transparent;color:#ddd;padding:6px">✕</button>
  `;
  el.hidden = false;
}

// Browser back button
window.addEventListener('popstate', () => {
  if (state.stack.length > 0) back();
});

main();

})();
</script>
