<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#d97706">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PraCaL">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23d97706'/><text x='96' y='130' font-size='120' text-anchor='middle' fill='white'>%F0%9F%8D%9A</text></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d97706'/><text x='50' y='72' font-size='64' text-anchor='middle' fill='white'>%F0%9F%8D%9A</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js" defer></script>
<title>PraCaL - นับแคลอาหารไทย</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #fefaf5;
    --bg-2: #fdf3e4;
    --card: #ffffff;
    --ink: #2a1d10;
    --ink-2: #5c4a38;
    --muted: #8a7560;
    --line: #ead9c2;
    --primary: #d97706;
    --primary-dark: #b35d00;
    --primary-soft: #fde7c8;
    --green: #16a34a;
    --green-soft: #dcfce7;
    --red: #dc2626;
    --red-soft: #fee2e2;
    --amber: #f59e0b;
    --amber-soft: #fef3c7;
    --shadow: 0 2px 6px rgba(120, 70, 0, 0.06), 0 1px 2px rgba(120, 70, 0, 0.08);
    --shadow-lg: 0 8px 24px rgba(120, 70, 0, 0.12);
    --radius: 14px;
    --radius-lg: 20px;
    --tap: 56px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Prompt', 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink);
    background: var(--bg);
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
  }
  #app { min-height: 100%; padding-top: var(--safe-top); padding-bottom: calc(72px + var(--safe-bottom)); }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: 0; }
  input, select, textarea { font-family: inherit; font-size: inherit; }
  a { color: var(--primary-dark); }

  /* ===== Layout ===== */
  .screen { max-width: 560px; margin: 0 auto; padding: 0 16px; }
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 4px 12px; position: sticky; top: 0;
    background: linear-gradient(180deg, var(--bg) 70%, rgba(254,250,245,0));
    z-index: 10;
  }
  .header h1 { font-size: 22px; margin: 0; font-weight: 600; flex: 1; }
  .header .sub { color: var(--muted); font-size: 14px; margin-top: -2px; }
  .icon-btn {
    min-width: 44px; min-height: 44px; padding: 0 10px; border-radius: 12px;
    background: transparent; color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 22px;
  }
  .icon-btn:active { background: var(--bg-2); }
  .icon-btn.ghost { font-size: 16px; color: var(--ink-2); }

  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 16px; margin-bottom: 12px;
  }
  .card.tight { padding: 12px 14px; }

  .btn {
    min-height: var(--tap); padding: 0 20px; border-radius: 14px;
    font-size: 18px; font-weight: 600;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--primary); color: #fff;
    transition: transform 60ms ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn.block { width: 100%; }
  .btn.secondary { background: #fff; color: var(--ink); border: 1.5px solid var(--line); }
  .btn.ghost { background: transparent; color: var(--ink-2); }
  .btn.danger { background: var(--red); color: #fff; }
  .btn.green { background: var(--green); color: #fff; }
  .btn.sm { min-height: 40px; font-size: 15px; padding: 0 14px; border-radius: 10px; }
  .btn.lg { min-height: 64px; font-size: 20px; }
  .btn:disabled { opacity: 0.5; pointer-events: none; }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-row > .btn { flex: 1; }

  /* Inputs */
  label { display: block; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; font-size: 15px; }
  .field { margin-bottom: 14px; }
  .input, .select, .textarea {
    width: 100%; min-height: 52px; padding: 12px 14px;
    border-radius: 12px; border: 1.5px solid var(--line);
    background: #fff; color: var(--ink); font-size: 17px;
    -webkit-appearance: none;
  }
  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .textarea { min-height: 90px; resize: vertical; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .seg { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg button {
    flex: 1; min-width: 72px; min-height: 52px; border-radius: 12px;
    border: 1.5px solid var(--line); background: #fff; color: var(--ink);
    font-weight: 500; font-size: 16px;
  }
  .seg button.on { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* Dashboard ring */
  .ring-wrap { display: flex; align-items: center; gap: 18px; }
  .ring { width: 140px; height: 140px; flex-shrink: 0; position: relative; }
  .ring svg { transform: rotate(-90deg); }
  .ring .num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .num b { font-size: 28px; font-weight: 600; line-height: 1; }
  .ring .num small { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .ring-labels { flex: 1; font-size: 15px; color: var(--ink-2); line-height: 1.8; }
  .ring-labels .v { color: var(--ink); font-weight: 600; }
  /* v1.10.3 — backdate banner shown when logging to a past day */
  .backdate-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; margin-bottom: 10px;
    background: #fef3c7;
    border: 1.5px solid #f59e0b;
    border-radius: 12px;
    font-size: 14px;
    color: #92400e;
  }
  .backdate-banner b { color: #78350f; }
  /* v1.10.1 — special-detail cart chip on library */
  .special-cart-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; margin-bottom: 10px;
    background: var(--primary-soft);
    border: 1.5px solid var(--primary);
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    transition: transform 80ms ease;
  }
  .special-cart-chip:active { transform: scale(0.98); }
  .special-cart-chip.empty {
    background: var(--bg-2); border-color: var(--line);
    cursor: default;
  }
  .special-cart-chip.empty:active { transform: none; }
  /* Goal-zone reward feedback */
  .ring.pulse svg circle:nth-child(2) { animation: ringPulse 2.4s ease-in-out infinite; }
  .ring.pulse .num b { animation: numBreathe 2.4s ease-in-out infinite; }
  @keyframes ringPulse {
    0%, 100% { filter: drop-shadow(0 0 0 transparent); opacity: 1; }
    50%      { filter: drop-shadow(0 0 6px var(--green)); opacity: 0.92; }
  }
  @keyframes numBreathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  .zone-card { transition: background 220ms ease; }

  .bar-wrap { margin-top: 8px; }
  .bar-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 15px; }
  .bar-label .v { font-weight: 600; color: var(--ink); }
  .bar { height: 14px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: var(--green); border-radius: 999px; transition: width 200ms ease; }
  .bar > i.warn { background: var(--amber); }
  .bar > i.over { background: var(--red); }

  /* Meal list */
  .meal-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; background: #fff; border-radius: 12px;
    margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer;
  }
  .meal-item .emo { font-size: 32px; line-height: 1; flex-shrink: 0; width: 44px; text-align: center; }
  .meal-item .body { flex: 1; min-width: 0; }
  .meal-item .name { font-weight: 500; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meal-item .sub { color: var(--muted); font-size: 13px; }
  .meal-item .cal { font-weight: 600; color: var(--primary-dark); font-size: 16px; white-space: nowrap; }

  .log-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 12px; background: #fff; border-radius: 12px;
    margin-bottom: 8px; box-shadow: var(--shadow);
  }
  .log-item .emo { font-size: 28px; width: 36px; text-align: center; }
  .log-item .body { flex: 1; min-width: 0; }
  .log-item .name { font-weight: 500; font-size: 16px; }
  .log-item .sub { color: var(--muted); font-size: 13px; }
  .log-item .cal { font-weight: 600; color: var(--primary-dark); font-size: 17px; margin-right: 8px; }
  .log-item .del { font-size: 20px; color: var(--muted); background: transparent; min-width: 36px; min-height: 36px; border-radius: 8px; }
  .log-item .del:active { background: var(--red-soft); color: var(--red); }

  /* Category tabs */
  .tabs { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 8px; margin: 0 -16px; padding-left: 16px; padding-right: 16px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs button {
    padding: 10px 14px; border-radius: 999px; border: 1.5px solid var(--line);
    background: #fff; color: var(--ink-2); font-size: 15px; white-space: nowrap; font-weight: 500;
  }
  .tabs button.on { background: var(--primary); color: #fff; border-color: var(--primary); }

  .search-box {
    position: relative;
  }
  .search-box input { padding-left: 44px; }
  .search-box .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 18px; pointer-events: none; }

  /* Bottom nav */
  .botnav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    background: #fff; border-top: 1px solid var(--line);
    padding: 8px 0 calc(8px + var(--safe-bottom));
    display: flex; justify-content: space-around; max-width: 560px; margin: 0 auto;
  }
  .botnav button {
    background: transparent; color: var(--muted); padding: 4px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 12px;
    min-width: 60px; min-height: 52px; border-radius: 10px;
  }
  .botnav button .i { font-size: 22px; line-height: 1; }
  .botnav button.on { color: var(--primary); font-weight: 600; }

  .fab {
    position: fixed; right: 16px; bottom: calc(88px + var(--safe-bottom)); z-index: 15;
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--primary); color: #fff; font-size: 32px;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; justify-content: center;
  }
  .fab:active { transform: scale(0.95); }

  /* Confidence chips */
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; font-size: 13px; font-weight: 500; }
  .chip.high { background: var(--green-soft); color: var(--green); }
  .chip.medium { background: var(--amber-soft); color: #92400e; }
  .chip.low { background: var(--red-soft); color: var(--red); }
  .chip.goal { background: var(--primary-soft); color: var(--primary-dark); }

  /* Callout */
  .callout {
    background: var(--primary-soft); border-radius: 12px; padding: 12px 14px;
    font-size: 15px; color: #703a00; margin-bottom: 12px; line-height: 1.6;
  }
  .callout b { color: #5a2e00; }
  .callout.info { background: #e0f2fe; color: #075985; }
  .callout ul { margin: 6px 0 0; padding-left: 20px; }
  .callout li { margin-bottom: 2px; }

  /* Addon list */
  .addon {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border: 1.5px solid var(--line); border-radius: 12px; background: #fff;
    margin-bottom: 8px; cursor: pointer;
  }
  .addon.on { border-color: var(--primary); background: var(--primary-soft); }
  .addon .emo { font-size: 24px; width: 32px; text-align: center; }
  .addon .n { flex: 1; font-size: 15px; font-weight: 500; }
  .addon .c { color: var(--primary-dark); font-weight: 600; font-size: 14px; }
  .addon .chk { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; }
  .addon.on .chk { border-color: var(--primary); background: var(--primary); }

  /* Activity list (radio-style options) */
  .activity-list { display: flex; flex-direction: column; gap: 8px; }
  .activity-opt {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; border-radius: 12px;
    border: 1.5px solid var(--line); background: #fff;
    text-align: left; width: 100%; font-family: inherit;
    font-size: 16px; color: var(--ink);
    min-height: 56px;
  }
  .activity-opt.on { border-color: var(--primary); background: var(--primary-soft); }
  .activity-opt .radio { font-size: 20px; color: var(--muted); flex-shrink: 0; line-height: 1.4; width: 20px; text-align: center; }
  .activity-opt.on .radio { color: var(--primary); }
  .activity-opt .body { flex: 1; }
  .activity-opt .n { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .activity-opt .d { color: var(--muted); font-size: 13px; margin-top: 2px; line-height: 1.4; }

  /* Size buttons */
  .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .size-grid button {
    min-height: 64px; border-radius: 12px; border: 1.5px solid var(--line);
    background: #fff; font-size: 16px; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  }
  .size-grid button.on { border-color: var(--primary); background: var(--primary-soft); color: var(--primary-dark); }
  .size-grid button .pct { font-size: 18px; font-weight: 700; }
  .size-grid button .label { font-size: 12px; color: var(--muted); }
  .size-grid button.on .label { color: var(--primary-dark); }

  .slider-wrap { padding: 10px 0; }
  .slider-wrap input[type=range] { width: 100%; -webkit-appearance: none; background: transparent; }
  .slider-wrap input[type=range]::-webkit-slider-runnable-track { height: 8px; background: var(--primary-soft); border-radius: 999px; }
  .slider-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%; background: var(--primary); margin-top: -9px; box-shadow: var(--shadow); }
  .slider-wrap input[type=range]::-moz-range-track { height: 8px; background: var(--primary-soft); border-radius: 999px; }
  .slider-wrap input[type=range]::-moz-range-thumb { width: 26px; height: 26px; border-radius: 50%; background: var(--primary); border: 0; }

  /* Nutrition facts row */
  .facts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; margin-top: 10px; }
  .facts > div { background: var(--bg-2); padding: 8px; border-radius: 10px; }
  .facts .v { font-weight: 700; color: var(--ink); font-size: 16px; }
  .facts .l { color: var(--muted); font-size: 12px; }

  /* Empty state */
  .empty { text-align: center; padding: 32px 20px; color: var(--muted); }
  .empty .big { font-size: 48px; margin-bottom: 8px; }

  /* Toast */
  #toast {
    position: fixed; left: 50%; bottom: calc(96px + var(--safe-bottom)); transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 12px;
    font-size: 15px; z-index: 50; box-shadow: var(--shadow-lg);
    opacity: 0; pointer-events: none; transition: opacity 200ms, transform 200ms;
    max-width: 80%;
  }
  #toast.show { opacity: 1; transform: translate(-50%, -8px); }
  #toast.err { background: var(--red); }

  /* Barcode scanner view */
  .scan-frame {
    position: relative; border-radius: 16px; overflow: hidden;
    background: #000; aspect-ratio: 4/3; max-height: 60vh;
    margin: 0 auto; width: 100%;
  }
  .scan-frame video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-frame .overlay {
    position: absolute; inset: 18% 12%;
    border: 3px solid rgba(255, 255, 255, 0.85);
    border-radius: 12px; pointer-events: none;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
  }
  .scan-frame .laser {
    position: absolute; left: 12%; right: 12%; top: 50%;
    height: 2px; background: #ff4d4d; box-shadow: 0 0 8px #ff4d4d;
    animation: laserScan 1.8s ease-in-out infinite;
  }
  @keyframes laserScan {
    0%, 100% { top: 22%; }
    50% { top: 78%; }
  }
  .scan-status {
    text-align: center; padding: 10px 14px; border-radius: 12px;
    background: var(--bg-2); color: var(--ink-2);
    font-size: 14px; margin: 10px 0;
  }

  /* OCR preview */
  .ocr-preview {
    width: 100%; max-height: 280px; object-fit: contain;
    border-radius: 12px; background: #000;
  }

  /* Label row for OCR review fields */
  .kv-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .kv-row:last-child { border-bottom: 0; }
  .kv-row .k { font-size: 14px; color: var(--ink-2); }
  .kv-row input { width: 110px; padding: 8px 10px; border: 1.5px solid var(--line); border-radius: 8px; text-align: right; font-size: 15px; font-weight: 600; color: var(--ink); background: #fff; -webkit-appearance: none; }
  .kv-row input:focus { outline: none; border-color: var(--primary); }
  .kv-row input.w-full { width: 100%; text-align: left; }

  /* Streak system */
  .streak-strip {
    display: flex; gap: 6px; padding: 10px 12px; background: #fff;
    border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 10px;
    align-items: center;
  }
  .streak-chip {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 6px 4px; border-radius: 10px; background: var(--bg-2);
    cursor: pointer; min-width: 0;
    transition: opacity 200ms;
  }
  .streak-chip.dim { opacity: 0.45; }
  .streak-chip .e { font-size: 22px; line-height: 1; }
  .streak-chip .n { font-weight: 700; font-size: 17px; color: var(--ink); margin-top: 2px; }
  .streak-chip .l { font-size: 10px; color: var(--muted); }

  .streak-row {
    background: #fff; border-radius: 12px; padding: 14px;
    box-shadow: var(--shadow); margin-bottom: 10px;
  }
  .streak-row .head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .streak-row .head .e { font-size: 28px; }
  .streak-row .head .n { font-weight: 600; font-size: 16px; flex: 1; }
  .streak-row .head .num { font-weight: 700; font-size: 22px; color: var(--primary-dark); }
  .streak-row .desc { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  .streak-row .bar { height: 8px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
  .streak-row .bar i { display: block; height: 100%; background: var(--primary); border-radius: 999px; transition: width 300ms; }
  .streak-row .bar i.fire { background: linear-gradient(90deg, #f59e0b, #ea580c); }
  .streak-row .bar i.green { background: var(--green); }
  .streak-row .meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 13px; color: var(--ink-2); }
  .streak-row .status { padding: 8px 10px; border-radius: 8px; background: var(--bg-2); margin-top: 8px; font-size: 13px; }
  .streak-row .status.ok { background: var(--green-soft); color: var(--green); }
  .streak-row .status.warn { background: var(--amber-soft); color: #92400e; }
  .streak-row .status.bad { background: var(--red-soft); color: var(--red); }

  .milestone-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 24px; animation: fadeIn 200ms ease;
  }
  .milestone-card {
    background: #fff; border-radius: 20px; padding: 32px 24px;
    text-align: center; max-width: 360px; width: 100%;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    animation: bounceIn 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .milestone-card .em { font-size: 64px; line-height: 1; margin-bottom: 8px; }
  .milestone-card .ml-label { font-size: 24px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
  .milestone-card .ml-type { color: var(--primary-dark); font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .milestone-card .ml-days { font-size: 18px; color: var(--ink-2); margin-bottom: 14px; }

function calculateBurn(type, intensity, durationMin, weightKg) {
  const met = MET_VALUES[type]?.[intensity];
  if (!met || !durationMin || !weightKg) return 0;
  const calPerMin = (met * 3.5 * weightKg) / 200;
  return Math.round(calPerMin * durationMin * 0.85);
}

function updateActivityPreview() {
  if (state.view !== 'add-activity') return;
  const u = currentUser();
  const t = state.tmp;
  const type = t.actType || 'running';
  const mode = t.actCalcMode || 'met';
  const intensity = t.actIntensity || 'moderate';
  const duration = Number(t.actDuration) || 0;
  const manualCal = Number(t.actCalInput) || 0;
  const weightKg = u?.weight || 70;
  const calcCal = mode === 'met' ? calculateBurn(type, intensity, duration, weightKg) : Math.max(0, manualCal);
  const calPerMin = duration > 0 ? calcCal / duration : 0;
  const calEl = document.getElementById('act-calc-cal');
  if (calEl) calEl.textContent = `${fmt(calcCal)} kcal`;
  const detailEl = document.getElementById('act-calc-detail');
  if (detailEl && mode === 'met') {
    detailEl.textContent = `MET ${MET_VALUES[type][intensity]} × ${weightKg}kg × ${duration} นาที × 0.85`;
  }
  const btn = document.querySelector('[data-act="save-activity"]');
  if (btn) {
    btn.textContent = `✅ บันทึก ${fmt(calcCal)} kcal`;
    if (calcCal <= 0) btn.setAttribute('disabled', 'disabled');
    else btn.removeAttribute('disabled');
  }
  const warnEl = document.getElementById('act-warn');
  if (warnEl) {
    if (mode === 'manual' && calPerMin > 20) {
      warnEl.textContent = `⚠️ ${calPerMin.toFixed(1)} kcal/นาที สูงผิดปกติ — ตรวจค่าอีกครั้ง`;
      warnEl.style.display = '';
    } else {
      warnEl.style.display = 'none';
    }
  }
}

function uid(prefix = 'id') { return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function formatDateTH(key) {
  if (!key) return '';

  return `${d} ${months[m - 1]} ${y + 543}`;

function fmt(n, digits = 0) {
  if (typeof n !== 'number' || !isFinite(n)) return '0';

}
function escapeHtml(s) {

}

async function compressProfilePhoto(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const size = Math.min(img.width, img.height);
        const sx = (img.width - size) / 2;
        const sy = (img.height - size) / 2;
        const canvas = document.createElement('canvas');
        canvas.width = 200; canvas.height = 200;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, sx, sy, size, size, 0, 0, 200, 200);
        URL.revokeObjectURL(url);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('โหลดรูปไม่ได้')); };
    img.src = url;
  });
}

/* ========== MEAL CACHE ========== */
function normalizeCacheKey(name) {
  return String(name || '').trim().toLowerCase().replace(/\s+/g, ' ');
}
function readCache() {
  try { return JSON.parse(localStorage.getItem(MEAL_CACHE_KEY) || '{}'); }
  catch { return {}; }
}
function writeCache(cache) {
  try { localStorage.setItem(MEAL_CACHE_KEY, JSON.stringify(cache)); } catch {}
}
function getCachedEstimate(name) {
  const cache = readCache();
  const k = normalizeCacheKey(name);
  const entry = cache[k];
  if (!entry) return null;
  if (Date.now() - entry.timestamp > MEAL_CACHE_MAX_AGE_MS) {
    delete cache[k];
    writeCache(cache);
    return null;
  }
  return entry.data;
}
function cacheEstimate(name, data) {
  const cache = readCache();
  const k = normalizeCacheKey(name);
  cache[k] = { data, timestamp: Date.now() };
  const keys = Object.keys(cache);
  if (keys.length > MEAL_CACHE_MAX_ENTRIES) {
    const sorted = keys.sort((a, b) => cache[a].timestamp - cache[b].timestamp);
    sorted.slice(0, 50).forEach(key => delete cache[key]);
  }
  writeCache(cache);
}
function clearCacheEntry(name) {
  const cache = readCache();
  delete cache[normalizeCacheKey(name)];
  writeCache(cache);
}

/* ========== CALCULATIONS ========== */
function calcBMR(p) {
  const w = Number(p.weight) || 0;
  const hcm = Number(p.height) || 0;
  const a = Number(p.age) || 0;
  if (p.gender === 'male') return 10 * w + 6.25 * hcm - 5 * a + 5;
  return 10 * w + 6.25 * hcm - 5 * a - 161;
}
function effectiveGoalAdjust(p) {
  if (typeof p.goalAdjust === 'number' && isFinite(p.goalAdjust)) return p.goalAdjust;
  return GOAL_ADJUST[p.goal] ?? 0;
}
function goalCategory(p) {
  const adj = effectiveGoalAdjust(p);
  if (adj < -200) return 'lose';
  if (adj > 200) return 'gain';
  return 'maintain';
}
function proteinTarget(p) {
  const w = Number(p.weight) || 0;
  const age = Number(p.age) || 30;
  if (age >= 60) {
    return Math.round(w * 1.3); // 1.2-1.5g/kg sweet spot for elderly
  }
  const cat = goalCategory(p);
  const mult = cat === 'lose' ? 1.6 : cat === 'gain' ? 1.8 : 1.2;
  return Math.round(w * mult);
}
function activityMultiplier(p) {
  const key = normalizeActivityLevel(p?.defaultActivity);

function defaultCalorieTarget(p) {

}

// Pure function — given today's numbers + goal, returns ring visualization data

// Returns: { zone, ringPct, ringColor, headline, sub, pulse, effective, energyDelta, goalDelta, totalBurn }

    } else {

// v1.10.14 — Multi-day meal plan generator. Greedy slot-fitting:
// for each day, allocate the daily calorie budget across the meal slots
// (after subtracting any fixed slots like a protein drink), then pick the
// best-scoring meal for each slot in turn — penalizing meals used recently
// (within 3 days) and biasing toward favorites + protein when the user
// hasn't hit their daily protein target yet. Excludes meals matching any
// excludeKeywords (default: alcohol). Returns plan + per-day totals.
function generateMealPlan(config) {
  const cfg = {
    days: config.days || 7,
    calPerDay: config.calPerDay || 1600,
    proteinMin: config.proteinMin || 100,
    sugarMax: config.sugarMax || Infinity,
    mealsPerDay: config.mealsPerDay || 2,
    fixedName: config.fixedName || '',
    fixedCal: config.fixedCal || 0,
    fixedProtein: config.fixedProtein || 0,
    excludeKeywords: (config.excludeKeywords || 'เบียร์,แอลกอฮอล์,beer,wine')
      .split(',').map(s => s.trim().toLowerCase()).filter(Boolean)
  };

  const days = [];
  const recentUsage = new Map(); // mealId → last day index used

  // Pool of candidate meals: skip alcohols and tiny snacks
  const pool = allMeals().filter(m => {
    const cal = m.baseCalories || 0;
    if (cal < 100) return false;
    const name = (m.name || '').toLowerCase();
    if (cfg.excludeKeywords.some(kw => kw && name.includes(kw))) return false;
    return true;
  });

  for (let d = 1; d <= cfg.days; d++) {
    const day = { day: d, meals: [], totalCal: 0, totalProtein: 0, totalCarbs: 0, totalFat: 0, totalSugar: 0 };

    // Fixed slot first (e.g. Vitaday)
    if (cfg.fixedCal > 0) {
      day.meals.push({
        slot: 'fixed',
        mealId: null,
        name: cfg.fixedName || 'มื้อประจำ',
        emoji: '🥤',
        cal: cfg.fixedCal,
        protein: cfg.fixedProtein,
        carbs: 0, fat: 0, sugar: 0
      });
      day.totalCal += cfg.fixedCal;
      day.totalProtein += cfg.fixedProtein;
    }

    // Allocate remaining budget across N meal slots
    for (let s = 0; s < cfg.mealsPerDay; s++) {
      const slotsLeft = cfg.mealsPerDay - s;
      const calLeft = cfg.calPerDay - day.totalCal;
      const slotTarget = calLeft / slotsLeft;
      const proteinGap = Math.max(0, cfg.proteinMin - day.totalProtein);
      const wantsProtein = (proteinGap / slotsLeft) > 15;

      const candidates = pool
        .filter(m => {
          const cal = m.baseCalories || 0;
          if (cal > slotTarget * 1.5) return false;
          if (cal < slotTarget * 0.4 && slotsLeft === 1) return false; // last slot needs to fill
          if (m.sugar_g > cfg.sugarMax) return false;
          return true;
        })
        .map(m => {
          const cal = m.baseCalories || 0;
          const prot = m.protein_g || 0;
          const calRatio = cal / slotTarget;
          const calScore = Math.max(0, 1 - Math.abs(1 - calRatio));
          const proteinScore = wantsProtein ? Math.min(prot / 25, 1) : 0.5;
          const favBonus = state.favorites.includes(m.id) ? 0.15 : 0;
          const lastUsed = recentUsage.get(m.id);
          const daysSince = lastUsed != null ? (d - lastUsed) : Infinity;
          // Penalty: 0.3 if used yesterday, 0.2 two days ago, 0.1 three days ago, 0 after
          const recentPenalty = daysSince <= 3 ? Math.max(0, 0.4 - daysSince * 0.1) : 0;
          const score = calScore * 0.5 + proteinScore * 0.3 + favBonus - recentPenalty + 0.1;
          return { meal: m, score };
        })
        .sort((a, b) => b.score - a.score)
        .slice(0, 8);

      const picked = candidates[0]?.meal;
      if (!picked) break;

      day.meals.push({
        slot: 'meal',
        mealId: picked.id,
        name: picked.name,
        emoji: picked.emoji || '🍽️',
        cal: picked.baseCalories || 0,
        protein: picked.protein_g || 0,
        carbs: picked.carbs_g || 0,
        fat: picked.fat_g || 0,
        sugar: picked.sugar_g || 0
      });
      day.totalCal += picked.baseCalories || 0;
      day.totalProtein += picked.protein_g || 0;
      day.totalCarbs += picked.carbs_g || 0;
      day.totalFat += picked.fat_g || 0;
      day.totalSugar += picked.sugar_g || 0;
      recentUsage.set(picked.id, d);
    }

    days.push(day);
  }

  // Aggregate stats
  const avgCal = days.reduce((s, d) => s + d.totalCal, 0) / days.length;
  const avgProtein = days.reduce((s, d) => s + d.totalProtein, 0) / days.length;

  return { generatedAt: Date.now(), config: cfg, days, avgCal, avgProtein };
}
// Helper: pick next-best alternative for a plan slot (used by swap action)
function nextAlternativeForSlot(currentMealId, slotTarget, proteinGap, excludeIds) {
  return alternativesForSlot(currentMealId, slotTarget, proteinGap, excludeIds, 1)[0];
}
// v1.10.19 — return ranked list of alternatives for a slot (used by swap drawer)
// v1.10.20 — search text + relaxed budget filter when user is actively searching.
// count=Infinity returns the whole filtered set (no slice).
function alternativesForSlot(currentMealId, slotTarget, proteinGap, excludeIds, count = 8, searchText = '') {
  const exclude = new Set([...excludeIds, currentMealId]);
  const q = (searchText || '').trim().toLowerCase();
  const hasSearch = q.length > 0;
  // When user types a search, they're hunting for a specific meal — relax the
  // budget cap (1.5× → 3×) so big meals (buffet, set, etc.) become reachable.
  const calCap = hasSearch ? slotTarget * 3 : slotTarget * 1.5;
  return allMeals()
    .filter(m => {
      const cal = m.baseCalories || 0;
      if (cal < 100 || cal > calCap) return false;
      if (exclude.has(m.id)) return false;
      const name = (m.name || '').toLowerCase();
      if (['เบียร์','แอลกอฮอล์','beer','wine'].some(kw => name.includes(kw))) return false;
      if (hasSearch && !name.includes(q)) return false;
      return true;
    })
    .map(m => {
      const cal = m.baseCalories || 0;
      const prot = m.protein_g || 0;
      const calScore = Math.max(0, 1 - Math.abs(1 - cal / slotTarget));
      const proteinScore = proteinGap > 15 ? Math.min(prot / 25, 1) : 0.5;
      const favBonus = state.favorites.includes(m.id) ? 0.15 : 0;
      return { meal: m, score: calScore * 0.5 + proteinScore * 0.3 + favBonus + 0.1 };
    })
    .sort((a, b) => b.score - a.score)
    .slice(0, count)
    .map(x => x.meal);
}

// v1.10.18 — Pure compute: project a plan config against user profile.
// Returns BMR/TDEE/target context + projected weight change + health flags.
// Used by renderMealPlanSetup to render live breakdown + projection.
function computePlanProjection(u, cfg) {
  if (!u) return null;
  const bmr = Math.round(calcBMR(u));
  const tdee = calcTDEE(u);
  const profileTarget = effectiveCalorieTarget(u.id);
  const planTarget = Math.max(0, Number(cfg.calPerDay) || 0);
  const days = Math.max(1, Number(cfg.days) || 7);
  const floor = calorieFloor(u);
  const goal = goalCategory(u);
  const wKg = Number(u.weight) || 0;

  // Daily delta vs TDEE: negative = deficit (lose), positive = surplus (gain)
  const dailyDelta = planTarget - tdee;
  const totalDelta = dailyDelta * days;
  const weightChangeKg = totalDelta / 7700;

  // Diff vs profile target (what onboarding/profile suggests)
  const profileDelta = planTarget - profileTarget;

  // Calorie health flag
  let flag = 'ok';
  let flagMsg = '';
  if (planTarget < bmr) {
    flag = 'danger';
    flagMsg = `🔴 ต่ำกว่า BMR (${fmt(bmr)} kcal) — เสี่ยงเสียกล้าม + เผาผลาญพัง`;
  } else if (planTarget < floor) {
    flag = 'danger';
    flagMsg = `🔴 ต่ำกว่ามาตรฐาน WHO (${fmt(floor)} kcal สำหรับ${u.gender === 'female' ? 'ผู้หญิง' : 'ผู้ชาย'})`;
  } else if (planTarget < bmr + 100) {
    flag = 'caution';
    flagMsg = `🟡 ใกล้ BMR (${fmt(bmr)}) — ระวังเสียกล้าม`;
  } else if (planTarget > tdee + 1000) {
    flag = 'danger';
    flagMsg = `🔴 เกิน TDEE +1,000 kcal — เพิ่มเร็วเกินไป`;
  } else if (planTarget > tdee + 500) {
    flag = 'caution';
    flagMsg = `🟡 ส่วนเกินสูง — ระวังไขมันสะสม`;
  } else {
    flag = 'ok';
    flagMsg = `🟢 อยู่ในช่วงปลอดภัย`;
  }

  // Protein adequacy
  const proteinMin = Math.max(0, Number(cfg.proteinMin) || 0);
  const proteinPerKg = wKg > 0 ? proteinMin / wKg : 0;
  const recommendedPerKg = goal === 'lose' ? 1.4 : goal === 'gain' ? 1.8 : 1.0;
  let proteinFlag = 'ok';
  let proteinMsg = '';
  if (proteinPerKg < 0.8) {
    proteinFlag = 'danger';
    proteinMsg = `🔴 โปรตีน ${proteinPerKg.toFixed(1)}g/kg ต่ำกว่า WHO 0.8g/kg`;
  } else if (proteinPerKg < recommendedPerKg) {
    proteinFlag = 'caution';
    proteinMsg = `🟡 แนะนำ ≥${recommendedPerKg.toFixed(1)}g/kg สำหรับเป้า${goal === 'lose' ? 'ลด' : goal === 'gain' ? 'เพิ่ม' : 'คง'}น้ำหนัก`;
  } else {
    proteinFlag = 'ok';
    proteinMsg = `🟢 โปรตีนเพียงพอ (${proteinPerKg.toFixed(1)}g/kg)`;
  }

  return {
    bmr, tdee, profileTarget, planTarget, dailyDelta, totalDelta,
    weightChangeKg, profileDelta, days, floor, goal, wKg,
    flag, flagMsg, proteinFlag, proteinMsg, proteinPerKg, recommendedPerKg
  };
}

// v1.10.13 — Suggest meals that fit the user's remaining budget for today.
// v1.10.16 — split budget across `mealsLeft` upcoming meals (no longer stuffs
// everything into one). Hard tolerance filter (±tolerance cal) replaces
// the old percentage-based ratio. Score: 50% cal fit + 30% protein bias +
// 20% favorites + small base. Excludes meals already logged today.
// v1.10.22 — show ALL matches (count=Infinity by default). Optional search,
// sort mode (score/protein/cal-asc), and favorites-only filter.
function suggestMealsForBudget(remainingCal, mealsLeft, tolerance, proteinGap, recentIds, count = Infinity, opts = {}) {
  if (remainingCal < 100) return [];
  const ml = Math.max(1, mealsLeft);
  const tol = Math.max(5, Math.min(50, tolerance));
  const target = remainingCal / ml;
  const proteinPerMeal = proteinGap / ml;
  const wantsProtein = proteinPerMeal > 20;
  const q = (opts.searchText || '').trim().toLowerCase();
  const hasSearch = q.length > 0;
  const favOnly = !!opts.favOnly;
  const sort = opts.sort || 'score';
  return allMeals()
    .filter(m => {
      const cal = m.baseCalories || 0;
      if (cal < 50) return false;
      if (Math.abs(cal - target) > tol) return false;
      if (recentIds.includes(m.id)) return false;
      if (favOnly && !state.favorites.includes(m.id)) return false;
      if (hasSearch && !(m.name || '').toLowerCase().includes(q)) return false;
      return true;
    })
    .map(m => {
      const cal = m.baseCalories || 0;
      const prot = m.protein_g || 0;
      const calDist = Math.abs(cal - target);
      const calScore = Math.max(0, 1 - calDist / tol);   // 1.0 at exact match → 0 at ±tolerance edge
      const proteinScore = wantsProtein ? Math.min(prot / 30, 1) : 0.5;
      const favBonus = state.favorites.includes(m.id) ? 0.2 : 0;
      const score = calScore * 0.5 + proteinScore * 0.3 + favBonus + 0.1;
      return { meal: m, score };
    })
    .sort((a, b) => {
      if (sort === 'protein') return (b.meal.protein_g || 0) - (a.meal.protein_g || 0);
      if (sort === 'cal-asc') return (a.meal.baseCalories || 0) - (b.meal.baseCalories || 0);
      return b.score - a.score;        // 'score' (default)
    })
    .slice(0, count)
    .map(x => x.meal);
}
// Helper: short reasoning string shown under each suggestion
// v1.10.16 — uses target-per-meal + tolerance instead of total remaining budget
function suggestReasoning(m, targetPerMeal, tolerance, proteinPerMeal) {
  const cal = m.baseCalories || 0;
  const prot = m.protein_g || 0;
  const reasons = [];
  const diff = cal - targetPerMeal;
  const absDiff = Math.abs(diff);
  if (absDiff <= tolerance / 3) reasons.push('🎯 ลงตัวเป๊ะ');
  else if (diff < 0) reasons.push(`💚 น้อยกว่าเป้า ${fmt(absDiff)} cal`);
  else reasons.push(`⚠️ เกินเป้า ${fmt(diff)} cal`);
  if (prot >= 25 && proteinPerMeal > 20) reasons.push('💪 โปรตีนสูง');
  if (state.favorites.includes(m.id)) reasons.push('⭐ เมนูประจำ');
  return reasons.length ? reasons.join(' · ') : 'เลือกตามงบ';
}

// v1.10.12 — Find meals with similar macros to the given target.
// Distance metric: 50% calorie diff + 30% protein diff + 20% fat diff (normalized).
// Lower distance = more similar. Excludes the target itself.
function findSimilarMeals(target, count = 8) {
  if (!target) return [];
  const tCal = target.baseCalories || 0;
  const tProt = target.protein_g || 0;
  const tFat = target.fat_g || 0;
  if (tCal <= 0) return [];
  return allMeals()
    .filter(m => m.id !== target.id && (m.baseCalories || 0) > 0)
    .map(m => {
      const cal = m.baseCalories || 0;
      const prot = m.protein_g || 0;
      const fat = m.fat_g || 0;
      const dCal = Math.abs(cal - tCal) / tCal;
      const dProt = Math.abs(prot - tProt) / Math.max(tProt, 8);
      const dFat = Math.abs(fat - tFat) / Math.max(tFat, 5);
      const distance = dCal * 0.5 + dProt * 0.3 + dFat * 0.2;
      return { meal: m, distance };
    })
    .filter(x => x.distance < 0.8)
    .sort((a, b) => a.distance - b.distance)
    .slice(0, count)
    .map(x => x.meal);
}

function calcEntryTotals(entry) {
  const m = entry.snapshot || findMeal(entry.mealId);
  if (!m) return { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, sugar_g: 0, weight_g: 0 };
  const mult = (entry.sizePct || 100) / 100;
  const qty = entry.quantity || 1;
  const factor = mult * qty;
  let baseCal = m.baseCalories || 0;
  let baseProt = m.protein_g || 0;
  let baseCarb = m.carbs_g || 0;
  let baseFat = m.fat_g || 0;
  let baseSugar = m.sugar_g || 0;
  // Apply customizations to base before scaling
  const custList = entry.customizations || [];
  if (custList.length && Array.isArray(m.customizations)) {
    custList.forEach(cid => {
      const c = m.customizations.find(x => x.id === cid);
      if (!c) return;
      baseCal += c.calChange || 0;
      baseProt += c.proteinChange || 0;
      baseCarb += c.carbChange || 0;
      baseFat += c.fatChange || 0;
      baseSugar += c.sugarChange || 0;
    });
  }
  let calories = baseCal * factor;
  let protein = baseProt * factor;
  let carbs = baseCarb * factor;
  let fat = baseFat * factor;
  let sugar = baseSugar * factor;
  let weight = (m.baseWeight_g || 0) * factor;
  (entry.addons || []).forEach(addon => {
    const id = typeof addon === 'string' ? addon : addon.id;
    const count = typeof addon === 'string' ? 1 : (addon.count || 0);
    if (!count) return;
    const a = ADDONS.find(x => x.id === id);
    if (a) {
      calories += a.calories * count;
      protein += a.protein_g * count;
      carbs += a.carbs_g * count;
      fat += a.fat_g * count;
      sugar += (a.sugar_g || 0) * count;
    }
  });
  return { calories, protein_g: protein, carbs_g: carbs, fat_g: fat, sugar_g: sugar, weight_g: weight };
}

function todayEntries(userId = state.currentUserId) {
  const key = todayKey();
  return ((state.logs[userId] || {})[key] || []).slice();
}

function sumEntries(entries) {
  return entries.reduce((acc, e) => {
    const t = calcEntryTotals(e);
    acc.calories += t.calories;
    acc.protein_g += t.protein_g;
    acc.carbs_g += t.carbs_g;
    acc.fat_g += t.fat_g;
    acc.sugar_g += t.sugar_g;
    return acc;
  }, { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, sugar_g: 0 });
}

/* ========== DAY ARITHMETIC ========== */
function dateToKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function keyToDate(k) {
  const [y, m, d] = k.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function addDays(d, n) {
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  return x;
}
function daysBetween(a, b) {
  const ms = keyToDate(b) - keyToDate(a);
  return Math.round(ms / 86400000);
}
function lastNDaysKeys(n, endKey) {
  const end = endKey ? keyToDate(endKey) : new Date();
  const keys = [];
  for (let i = n - 1; i >= 0; i--) keys.push(dateToKey(addDays(end, -i)));
  return keys;
}
// v1.10.29 — T-011: inclusive date-range key list. Auto-swaps if start > end.
function keysBetween(startKey, endKey) {
  if (!startKey || !endKey) return [];
  let s = keyToDate(startKey);
  let e = keyToDate(endKey);
  if (s > e) { const tmp = s; s = e; e = tmp; }
  const keys = [];
  let d = s;
  while (d <= e) {
    keys.push(dateToKey(d));
    d = addDays(d, 1);
  }
  return keys;
}

/* ========== WEIGHT & TREND ========== */
function weightOnDate(user, key) {
  if (!user?.weights) return null;
  const w = user.weights.find(x => x.date === key);
  return w ? w.weight_kg : null;
}
function setWeight(user, key, kg) {
  user.weights = user.weights || [];
  const existing = user.weights.find(x => x.date === key);
  if (existing) existing.weight_kg = kg;
  else user.weights.push({ date: key, weight_kg: kg });
  user.weights.sort((a, b) => a.date.localeCompare(b.date));
}
function removeWeight(user, key) {
  if (!user.weights) return;
  user.weights = user.weights.filter(x => x.date !== key);
}
function sortedWeights(user, days = null) {
  const all = (user?.weights || []).slice().sort((a, b) => a.date.localeCompare(b.date));
  if (days == null) return all;
  const cutoff = dateToKey(addDays(new Date(), -days + 1));
  return all.filter(w => w.date >= cutoff);
}
// v1.10.30 — T-012: generalized movingAverage with optional valueKey
// (default 'weight_kg' preserves backward compat for all existing callers).
function movingAverage(series, window = 7, valueKey = 'weight_kg') {
  const sorted = series.slice().sort((a, b) => a.date.localeCompare(b.date));
  return sorted.map((pt, i) => {
    const slice = sorted.slice(Math.max(0, i - window + 1), i + 1);
    const avg = slice.reduce((s, x) => s + x[valueKey], 0) / slice.length;
    return { date: pt.date, [valueKey]: avg };
  });
}
// v1.10.30 — T-012: generalized linearRegression with optional valueKey.
function linearRegression(series, valueKey = 'weight_kg') {
  if (series.length < 2) return { slope: 0, intercept: series[0]?.[valueKey] || 0 };
  const pts = series.map(p => ({ x: daysBetween(series[0].date, p.date), y: p[valueKey] }));
  const n = pts.length;
  const sx = pts.reduce((s, p) => s + p.x, 0);
  const sy = pts.reduce((s, p) => s + p.y, 0);
  const sxy = pts.reduce((s, p) => s + p.x * p.y, 0);
  const sxx = pts.reduce((s, p) => s + p.x * p.x, 0);
  const denom = n * sxx - sx * sx;
  const slope = denom === 0 ? 0 : (n * sxy - sx * sy) / denom;
  const intercept = (sy - slope * sx) / n;
  return { slope, intercept, baseDate: series[0].date };
}
function weightTrend(user, days = 14) {
  const recent = sortedWeights(user, days);
  if (recent.length < 2) return null;
  const { slope } = linearRegression(recent);
  return slope;
}
function weightChangeOver(user, days) {
  const recent = sortedWeights(user, days);
  if (recent.length < 2) return null;
  return recent[recent.length - 1].weight_kg - recent[0].weight_kg;
}
function latestWeight(user) {
  const all = sortedWeights(user);
  return all.length ? all[all.length - 1] : null;
}

// v1.10.31 — T-013a: Body Progress IndexedDB layer for photo blobs.
// Photos live in IndexedDB (50+ MB capacity) · metadata in u.checkIns[] in localStorage.
const PHOTO_DB_NAME = 'PraCaLBodyProgress';
const PHOTO_DB_VERSION = 1;
const PHOTO_STORE = 'photos';
let _photoDbPromise = null;
function openPhotoDb() {
  if (_photoDbPromise) return _photoDbPromise;
  _photoDbPromise = new Promise((resolve, reject) => {
    if (!window.indexedDB) return reject(new Error('IndexedDB ไม่รองรับในเบราว์เซอร์นี้'));
    const req = indexedDB.open(PHOTO_DB_NAME, PHOTO_DB_VERSION);
    req.onerror = () => { _photoDbPromise = null; reject(req.error); };
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(PHOTO_STORE)) {
        db.createObjectStore(PHOTO_STORE, { keyPath: 'id' });
      }
    };
  });
  return _photoDbPromise;
}
async function savePhotoBlob(id, blob) {
  const db = await openPhotoDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    const req = tx.objectStore(PHOTO_STORE).put({ id, blob, addedAt: Date.now() });
    req.onsuccess = () => resolve(id);
    req.onerror = () => reject(req.error);
  });
}
async function getPhotoBlob(id) {
  if (!id) return null;
  const db = await openPhotoDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readonly');
    const req = tx.objectStore(PHOTO_STORE).get(id);
    req.onsuccess = () => resolve(req.result?.blob || null);
    req.onerror = () => reject(req.error);
  });
}
async function deletePhotoBlob(id) {
  if (!id) return;
  const db = await openPhotoDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    const req = tx.objectStore(PHOTO_STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}
async function listPhotoBlobIds() {
  const db = await openPhotoDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(PHOTO_STORE, 'readonly');
    const req = tx.objectStore(PHOTO_STORE).getAllKeys();
    req.onsuccess = () => resolve(Array.from(req.result || []));
    req.onerror = () => reject(req.error);
  });
}
async function getPhotoUrl(id) {
  const blob = await getPhotoBlob(id);
  return blob ? URL.createObjectURL(blob) : null;
}
// v1.10.31 — T-013a: Canvas-based image compression. JPEG q=0.75, max 1080px long edge.
// Target ~150 KB per photo. Returns Blob.
async function compressPhoto(file, maxDim = 1080, quality = 0.75) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith('image/')) {
      return reject(new Error('ไฟล์ไม่ใช่รูปภาพ'));
    }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth;
      let h = img.naturalHeight;
      const scale = Math.min(1, maxDim / Math.max(w, h));
      w = Math.round(w * scale);
      h = Math.round(h * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(
        (blob) => blob ? resolve(blob) : reject(new Error('Compression failed')),
        'image/jpeg',
        quality
      );
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('โหลดรูปไม่สำเร็จ'));
    };
    img.src = url;
  });
}

// v1.10.31 — T-013a: Check-in CRUD helpers (metadata; photos handled by IndexedDB above)
function addCheckIn(user, checkIn) {
  user.checkIns = user.checkIns || [];
  checkIn.id = checkIn.id || uid('checkin');
  checkIn.addedAt = checkIn.addedAt || Date.now();
  user.checkIns.push(checkIn);
  user.checkIns.sort((a, b) => a.date.localeCompare(b.date));
  return checkIn;
}
function getCheckIn(user, id) {
  return (user?.checkIns || []).find(c => c.id === id) || null;
}
// v1.10.33 — T-013b.1: in-place update of an existing check-in.
// Preserves id + addedAt + snapshot fields (weight_7day_avg, deficit_7day_avg,
// protein_pass_rate, training_count, strength_count, cardio_count) unless caller
// passes them explicitly. Adds updatedAt timestamp.
function updateCheckIn(user, id, patch) {
  const ci = (user?.checkIns || []).find(c => c.id === id);
  if (!ci) return null;
  // Block immutable fields from being overwritten by patch
  const { id: _id, addedAt: _addedAt, ...editable } = patch || {};
  Object.assign(ci, editable);
  ci.updatedAt = Date.now();
  // Re-sort in case date changed
  (user.checkIns || []).sort((a, b) => a.date.localeCompare(b.date));
  return ci;
}
// Deletes metadata AND associated photo blobs in IndexedDB
async function deleteCheckIn(user, id) {
  const checkIn = getCheckIn(user, id);
  if (!checkIn) return;
  if (checkIn.photoIds) {
    const ids = Object.values(checkIn.photoIds).filter(Boolean);
    for (const pid of ids) {
      try { await deletePhotoBlob(pid); }
      catch (e) { console.warn('Failed to delete photo blob', pid, e); }
    }
  }
  user.checkIns = (user.checkIns || []).filter(c => c.id !== id);
}
// Find photo blobs not referenced by any check-in metadata, delete them.
// Returns count of cleaned-up orphans.
async function cleanupOrphanPhotos(user) {
  const referenced = new Set();
  (user?.checkIns || []).forEach(c => {
    if (c.photoIds) Object.values(c.photoIds).forEach(pid => pid && referenced.add(pid));
  });
  let allIds;
  try { allIds = await listPhotoBlobIds(); }
  catch (e) { console.warn('cleanupOrphanPhotos: IndexedDB list failed', e); return 0; }
  let cleaned = 0;
  for (const id of allIds) {
    if (!referenced.has(id)) {
      try { await deletePhotoBlob(id); cleaned++; }
      catch (e) { console.warn('Failed to clean orphan', id, e); }
    }
  }
  return cleaned;
}

// v1.10.32 — T-013b: derived stats bundle for Body Progress check-in.
// Auto-fills weight / waist / 7-day-avg / deficit / protein pass / training counts.
// Any field may be null if not enough data — UI must handle gracefully.
function compute7DayCheckinStats(user, endDate = todayKey()) {
  if (!user) return null;
  const keys = lastNDaysKeys(7, endDate);
  // Weight
  const recentWeights = (user.weights || []).filter(w => keys.includes(w.date));
  const latestW = latestWeight(user);
  const weight_kg = latestW ? latestW.weight_kg : null;
  const weight_7day_avg = recentWeights.length > 0
    ? recentWeights.reduce((s, w) => s + w.weight_kg, 0) / recentWeights.length
    : null;
  // Waist
  const latestWaistEntry = latestWaist(user);
  const waist_cm = latestWaistEntry ? latestWaistEntry.waist_cm : null;
  // Calorie deficit & protein
  const tdee = calcTDEE(user);
  const incExercise = activityIncludesExercise(user);
  const protTarget = effectiveProteinTarget(user.id);
  let deficitSum = 0;
  let deficitDays = 0;
  let proteinPassDays = 0;
  let proteinDays = 0;
  for (const k of keys) {
    const { entries, totals } = dayTotals(user.id, k);
    if (entries.length > 0) {
      const burn = tdee + (incExercise ? 0 : sumActivitiesBurn(user.id, k));
      deficitSum += totals.calories - burn;
      deficitDays++;
      proteinDays++;
      if (totals.protein_g >= protTarget) proteinPassDays++;
    }
  }
  const deficit_7day_avg = deficitDays > 0 ? deficitSum / deficitDays : null;
  const protein_pass_rate = proteinDays > 0 ? proteinPassDays : null;
  // Training counts (frequency proxy only — no performance claim)
  const cardioTypes = ['running','cycling','swimming','walking','sports','fitness'];
  let training_count = 0, strength_count = 0, cardio_count = 0;
  for (const k of keys) {
    const acts = (user.activities && user.activities[k]) || [];
    for (const a of acts) {
      training_count++;
      if (a.type === 'weights') strength_count++;
      else if (cardioTypes.includes(a.type)) cardio_count++;
    }
  }
  return {
    weight_kg, weight_7day_avg, waist_cm,
    deficit_7day_avg, protein_pass_rate,
    training_count, strength_count, cardio_count
  };
}

// v1.10.32 — T-013b: check-in draft persistence (resume-across-reload support).

// Delete photo blobs referenced by draft + remove draft. Used on "discard" actions.
// v1.10.33 — T-013b.1: mode-aware. In edit mode, only delete blobs that were
// uploaded during this edit session (i.e., current photoIds NOT in originalPhotoIds).
// Original blobs survive because the saved check-in still references them.
async function discardCheckinDraftWithCleanup(user) {
  if (!user) return;
  const draft = getCheckinDraft(user.id);
  if (draft && draft.photoIds) {
    const isEdit = draft.mode === 'edit';
    const originals = isEdit && draft.originalPhotoIds
      ? new Set(Object.values(draft.originalPhotoIds).filter(Boolean))
      : new Set();
    for (const pid of Object.values(draft.photoIds).filter(Boolean)) {
      if (isEdit && originals.has(pid)) continue; // preserve original
      try { await deletePhotoBlob(pid); }
      catch (e) { console.warn('Failed to delete draft photo blob', pid, e); }
    }
  }
  clearCheckinDraft(user.id);
}

// v1.10.34 — T-013c: helpers for Timeline + Viewer + Compare views.
// formatThaiMonthYear('2026-05-15') -> 'พฤษภาคม 2569' (Buddhist year, consistent with formatDateTH)
function formatThaiMonthYear(dateKey) {
  if (!dateKey) return '';
  const [y, m] = dateKey.split('-').map(Number);
  const months = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
                  'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
  return `${months[m - 1]} ${y + 543}`;
}
// Group check-ins by Thai month-year label. Returns [{ label, monthKey, items }, ...]
// sorted newest-month first; items within each group also newest-first.
function groupCheckInsByMonth(checkIns) {
  if (!checkIns || checkIns.length === 0) return [];
  const byMonth = new Map();
  for (const c of checkIns) {
    const monthKey = (c.date || '').slice(0, 7); // 'YYYY-MM'
    if (!byMonth.has(monthKey)) byMonth.set(monthKey, []);
    byMonth.get(monthKey).push(c);
  }
  const groups = Array.from(byMonth.entries()).map(([monthKey, items]) => ({
    monthKey,
    label: formatThaiMonthYear(monthKey + '-01'),
    items: items.slice().sort((a, b) => b.date.localeCompare(a.date))
  }));
  groups.sort((a, b) => b.monthKey.localeCompare(a.monthKey));
  return groups;
}
// Pre-fetch object URLs for all available angles of a check-in. Returns { [pid]: url }.
// Failures yield no entry for that pid (UI then shows "รูปนี้ไม่พบ").
async function fetchCheckinPhotoUrls(checkIn) {
  const urls = {};
  if (!checkIn || !checkIn.photoIds) return urls;
  for (const angle of ['front', 'side', 'back']) {
    const pid = checkIn.photoIds[angle];
    if (pid) {
      try {
        const url = await getPhotoUrl(pid);
        if (url) urls[pid] = url;
      } catch (e) {}
    }
  }
  return urls;
}
// Revoke all object URLs in a map. Idempotent. Mutates the map (clears entries).
function revokeUrlMap(urlMap) {
  if (!urlMap) return;
  for (const k of Object.keys(urlMap)) {
    if (urlMap[k]) {
      try { URL.revokeObjectURL(urlMap[k]); } catch (e) {}
    }
    delete urlMap[k];
  }
}
// Compute simple deltas between two check-ins. Null-safe.
// Returns { days, weight_delta, waist_delta } — any field may be null if missing.
function computeCheckinDelta(left, right) {
  if (!left || !right) return null;
  const days = daysBetween(left.date, right.date);
  const weight_delta = (left.weight_kg != null && right.weight_kg != null)
    ? right.weight_kg - left.weight_kg : null;
  const waist_delta = (left.waist_cm != null && right.waist_cm != null)
    ? right.waist_cm - left.waist_cm : null;
  return { days, weight_delta, waist_delta };
}
// Pick default { leftId, rightId } for a compare mode. Returns null if insufficient.
// Input: checkIns sorted oldest-first (we sort internally to be safe).
function pickCompareDefaults(checkIns, mode) {
  if (!checkIns || checkIns.length < 2) return null;
  const sorted = checkIns.slice().sort((a, b) => a.date.localeCompare(b.date));
  const latest = sorted[sorted.length - 1];
  if (mode === 'start-latest') {
    return { leftId: sorted[0].id, rightId: latest.id };
  }
  if (mode === 'prev-latest') {
    return { leftId: sorted[sorted.length - 2].id, rightId: latest.id };
  }
  // custom: default both to latest; user picks
  return { leftId: latest.id, rightId: latest.id };
}

// v1.10.30 — T-012: waist circumference tracking. Mirrors weight helpers.
// Schema: u.waist = [{ date: 'YYYY-MM-DD', waist_cm: 82 }, ...]
function setWaist(user, key, cm) {
  user.waist = user.waist || [];
  const existing = user.waist.find(x => x.date === key);
  if (existing) existing.waist_cm = cm;
  else user.waist.push({ date: key, waist_cm: cm });
  user.waist.sort((a, b) => a.date.localeCompare(b.date));
}
function removeWaist(user, key) {
  if (!user.waist) return;
  user.waist = user.waist.filter(x => x.date !== key);
}
function sortedWaist(user, days = null) {
  const all = (user?.waist || []).slice().sort((a, b) => a.date.localeCompare(b.date));
  if (days == null) return all;
  const cutoff = dateToKey(addDays(new Date(), -days + 1));
  return all.filter(w => w.date >= cutoff);
}
function latestWaist(user) {
  const all = sortedWaist(user);
  return all.length ? all[all.length - 1] : null;
}
function waistChangeOver(user, days) {
  const recent = sortedWaist(user, days);
  if (recent.length < 2) return null;
  return recent[recent.length - 1].waist_cm - recent[0].waist_cm;
}
function waistTrend(user, days = 14) {
  const recent = sortedWaist(user, days);
  if (recent.length < 2) return null;
  const { slope } = linearRegression(recent, 'waist_cm');
  return slope;
}
// waist:height ratio — body-composition signal (better than weight alone)
function waistHeightRatio(u, waist_cm) {
  const h = Number(u?.height) || 0;
  if (!h || !waist_cm) return null;
  return waist_cm / h;
}
// Returns { color: 'green'|'amber'|'red', text: string, ratio: number } or null
function waistHealthFlag(u, waist_cm) {
  const ratio = waistHeightRatio(u, waist_cm);
  if (ratio == null) return null;
  let color, text;
  if (ratio < 0.4) { color = 'amber'; text = '⚠️ ต่ำกว่า 0.4 — เอวเล็กผิดปกติ ปรึกษาแพทย์'; }
  else if (ratio < 0.5) { color = 'green'; text = '✅ สุขภาพดี (waist:height < 0.5)'; }
  else if (ratio < 0.55) { color = 'amber'; text = '⚠️ ความเสี่ยงเพิ่ม — ดูแลไขมันรอบเอว'; }
  else if (ratio < 0.6) { color = 'red'; text = '⚠️ ความเสี่ยงสูง — visceral fat สะสม'; }
  else { color = 'red'; text = '🔴 ความเสี่ยงสูงมาก — ปรึกษาแพทย์'; }
  // Asian gender-specific cutoff hint (secondary)
  let asianHint = '';
  if (u.gender === 'male' && waist_cm > 90) asianHint = ' · WHO Asian male > 90cm = abdominal obesity';
  else if (u.gender === 'female' && waist_cm > 80) asianHint = ' · WHO Asian female > 80cm = abdominal obesity';
  return { color, text: text + asianHint, ratio };
}

/* ========== STREAKS ========== */
function defaultStreakState() {
  return {
    freezeTokens: { available: 1, max: 1, lastReplenishDate: todayKey() },
    repairs: { monthYear: todayKey().slice(0, 7), used: 0, max: 2 },
    freezes: { logging: [], weight: [], inTarget: [], protein: [] },
    bests: { logging: 0, weight: 0, inTarget: 0, protein: 0 },
    celebrated: []
  };
}

function ensureStreakState(user) {
  if (!user) return null;
  if (!user.streakState) user.streakState = defaultStreakState();
  const ss = user.streakState;
  if (!ss.freezes) ss.freezes = { logging: [], weight: [], inTarget: [], protein: [] };
  ['logging','weight','inTarget','protein'].forEach(k => { if (!ss.freezes[k]) ss.freezes[k] = []; });
  if (!ss.bests) ss.bests = { logging: 0, weight: 0, inTarget: 0, protein: 0 };
  if (!ss.celebrated) ss.celebrated = [];
  if (!ss.freezeTokens) ss.freezeTokens = { available: 1, max: 1, lastReplenishDate: todayKey() };
  if (!ss.repairs) ss.repairs = { monthYear: todayKey().slice(0, 7), used: 0, max: 2 };
  // Reset repair month
  const m = todayKey().slice(0, 7);
  if (ss.repairs.monthYear !== m) ss.repairs = { monthYear: m, used: 0, max: 2 };
  return ss;
}

function replenishTokensIfNeeded(user) {
  const ss = ensureStreakState(user);
  if (!ss) return;
  const today = new Date();
  const day = today.getDay(); // 0=Sun, 1=Mon
  const daysSinceMon = (day + 6) % 7;
  const thisMon = new Date(today);
  thisMon.setHours(0, 0, 0, 0);
  thisMon.setDate(today.getDate() - daysSinceMon);
  const thisMonKey = dateToKey(thisMon);
  if ((ss.freezeTokens.lastReplenishDate || '0000-00-00') < thisMonKey) {
    ss.freezeTokens.available = ss.freezeTokens.max || 1;
    ss.freezeTokens.lastReplenishDate = thisMonKey;
  }
}

function activeDatesForStreak(user, type) {
  const out = new Set();
  const userLogs = state.logs[user.id] || {};
  if (type === 'logging') {
    Object.keys(userLogs).forEach(d => { if ((userLogs[d] || []).length > 0) out.add(d); });
  } else if (type === 'weight') {
    (user.weights || []).forEach(w => out.add(w.date));
  } else if (type === 'inTarget' || type === 'protein') {
    const protT = effectiveProteinTarget(user.id);
    const tdee = calcTDEE(user);
    const incExercise = activityIncludesExercise(user);
    const goalAdj = effectiveGoalAdjust(user);
    Object.keys(userLogs).forEach(d => {
      const entries = userLogs[d] || [];
      if (entries.length < 2) return;
      const t = sumEntries(entries);
      if (type === 'inTarget') {
        // Goal-aware: did the day's energy delta land within ~250 kcal of the user's goal?
        const exerciseBurn = incExercise ? 0 : sumActivitiesBurn(user.id, d);
        const energyDelta = t.calories - (tdee + exerciseBurn);
        const goalDelta = energyDelta - goalAdj;
        if (Math.abs(goalDelta) < 250) out.add(d);
      } else {
        if (protT > 0 && t.protein_g >= protT * 0.85) out.add(d);
      }
    });
  }
  return out;
}

function streakOfSet(activeSet, frozenList, todayKeyStr) {
  const all = new Set([...activeSet, ...(frozenList || [])]);
  const yest = dateToKey(addDays(keyToDate(todayKeyStr), -1));
  let cursor;
  if (all.has(todayKeyStr)) cursor = todayKeyStr;
  else if (all.has(yest)) cursor = yest;
  else return 0;
  let count = 0;
  while (all.has(cursor)) {
    count++;
    cursor = dateToKey(addDays(keyToDate(cursor), -1));
  }
  return count;
}

function bestStreakOfSet(allSet) {
  const dates = [...allSet].sort();
  let best = 0, cur = 0, prev = null;
  for (const d of dates) {
    if (prev && daysBetween(prev, d) === 1) cur++;
    else cur = 1;
    if (cur > best) best = cur;
    prev = d;
  }
  return best;
}

function getStreakStatus(user, type) {
  const ss = ensureStreakState(user);
  const active = activeDatesForStreak(user, type);
  const frozen = ss.freezes[type] || [];
  const allSet = new Set([...active, ...frozen]);
  const today = todayKey();
  const current = streakOfSet(active, frozen, today);
  const computedBest = bestStreakOfSet(allSet);
  const persistedBest = ss.bests[type] || 0;
  const best = Math.max(computedBest, persistedBest, current);
  if (best > persistedBest) ss.bests[type] = best;
  return { current, best, doneToday: active.has(today) };
}

function checkAndCelebrateMilestones(user, prevSnapshot) {
  const ss = ensureStreakState(user);
  let toShow = null;
  ['logging','weight','inTarget','protein'].forEach(type => {
    const cur = getStreakStatus(user, type).current;
    const prev = prevSnapshot[type] || 0;
    if (cur <= prev) return;
    const ms = getMilestoneInfo(cur);
    if (!ms) return;
    const key = `${type}-${cur}`;
    if (ss.celebrated.includes(key)) return;
    ss.celebrated.push(key);
    if (!toShow) toShow = { type, days: cur, label: ms.label, msg: ms.msg };
  });
  if (toShow) showMilestoneModal(toShow);
}

function streaksSnapshot(user) {
  return {
    logging: getStreakStatus(user, 'logging').current,
    weight: getStreakStatus(user, 'weight').current,
    inTarget: getStreakStatus(user, 'inTarget').current,
    protein: getStreakStatus(user, 'protein').current
  };
}

function autoFreezeIfPossible(user) {
  const ss = ensureStreakState(user);
  if (ss.freezeTokens.available < 1) return false;
  const today = todayKey();
  const yest = dateToKey(addDays(new Date(), -1));
  const userLogs = state.logs[user.id] || {};
  const yestHasLog = (userLogs[yest] || []).length > 0;
  if (yestHasLog) return false;
  const dayBefore = dateToKey(addDays(new Date(), -2));
  const dayBeforeHasLog = (userLogs[dayBefore] || []).length > 0;
  const freezes = ss.freezes.logging || [];
  if (!dayBeforeHasLog && !freezes.includes(dayBefore)) return false;
  freezes.push(yest);
  ss.freezes.logging = freezes;
  ss.freezeTokens.available -= 1;
  return true;
}

function showMilestoneModal(info) {
  if (document.getElementById('milestone-overlay')) return;
  const lbl = STREAK_LABELS[info.type];
  const el = document.createElement('div');
  el.id = 'milestone-overlay';
  el.className = 'milestone-overlay';
  el.dataset.act = 'dismiss-milestone';
  el.innerHTML = `
    <div class="milestone-card">
      <div class="em">🎉</div>
      <div class="ml-label">${h(info.label)}</div>
      <div class="ml-type">${lbl.emoji} ${h(lbl.name)} Streak</div>
      <div class="ml-days">${info.days} วันติดต่อกัน</div>
      <div class="ml-msg">"${h(info.msg)}"</div>
      <button class="btn block" data-act="dismiss-milestone">ขอบคุณ! 🙏</button>
    </div>
  `;
  document.body.appendChild(el);
}

/* ========== AGGREGATION ========== */
function dayTotals(userId, dateKey) {
  const entries = ((state.logs[userId] || {})[dateKey] || []);
  return { entries, totals: sumEntries(entries) };
}
function weekAggregate(userId, endKey) {
  const u = state.users.find(x => x.id === userId);
  const tdee = u ? calcTDEE(u) : 2000;
  const incExercise = u ? activityIncludesExercise(u) : false;
  const goalAdj = u ? effectiveGoalAdjust(u) : 0;
  const keys = lastNDaysKeys(7, endKey);
  const days = keys.map(k => {
    const { entries, totals } = dayTotals(userId, k);
    const exerciseBurn = incExercise ? 0 : sumActivitiesBurn(userId, k);
    const totalBurn = tdee + exerciseBurn;
    const energyDelta = totals.calories - totalBurn;     // − = deficit, + = surplus
    const goalDelta = energyDelta - goalAdj;             // 0 = on goal
    return { key: k, entries, totals, logged: entries.length > 0, exerciseBurn, totalBurn, energyDelta, goalDelta };
  });
  const loggedDays = days.filter(d => d.logged);
  const N = loggedDays.length;
  const avg = N === 0
    ? { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, sugar_g: 0, exerciseBurn: 0, energyDelta: 0, goalDelta: 0 }
    : {
        calories: loggedDays.reduce((s, d) => s + d.totals.calories, 0) / N,
        protein_g: loggedDays.reduce((s, d) => s + d.totals.protein_g, 0) / N,
        carbs_g: loggedDays.reduce((s, d) => s + d.totals.carbs_g, 0) / N,
        fat_g: loggedDays.reduce((s, d) => s + d.totals.fat_g, 0) / N,
        sugar_g: loggedDays.reduce((s, d) => s + d.totals.sugar_g, 0) / N,
        exerciseBurn: loggedDays.reduce((s, d) => s + d.exerciseBurn, 0) / N,
        energyDelta: loggedDays.reduce((s, d) => s + d.energyDelta, 0) / N,
        goalDelta: loggedDays.reduce((s, d) => s + d.goalDelta, 0) / N
      };
  return { days, avg, loggedCount: N };
}
function monthKeys(year, monthIdx) {
  const first = new Date(year, monthIdx, 1);
  const last = new Date(year, monthIdx + 1, 0);
  const keys = [];
  for (let d = 1; d <= last.getDate(); d++) keys.push(dateToKey(new Date(year, monthIdx, d)));
  return keys;
}
function monthAggregate(userId, year, monthIdx) {
  const u = state.users.find(x => x.id === userId);
  const tdee = u ? calcTDEE(u) : 2000;
  const incExercise = u ? activityIncludesExercise(u) : false;
  const goalAdj = u ? effectiveGoalAdjust(u) : 0;
  const keys = monthKeys(year, monthIdx);
  const days = keys.map(k => {
    const { entries, totals } = dayTotals(userId, k);
    const exerciseBurn = incExercise ? 0 : sumActivitiesBurn(userId, k);
    const totalBurn = tdee + exerciseBurn;
    const energyDelta = totals.calories - totalBurn;
    const goalDelta = energyDelta - goalAdj;
    return { key: k, entries, totals, logged: entries.length > 0, exerciseBurn, totalBurn, energyDelta, goalDelta };
  });
  const loggedDays = days.filter(d => d.logged);
  const N = loggedDays.length;
  const avg = N === 0
    ? { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, sugar_g: 0, exerciseBurn: 0, energyDelta: 0, goalDelta: 0 }
    : {
        calories: loggedDays.reduce((s, d) => s + d.totals.calories, 0) / N,

        energyDelta: loggedDays.reduce((s, d) => s + d.energyDelta, 0) / N,
        goalDelta: loggedDays.reduce((s, d) => s + d.goalDelta, 0) / N
      };
  const totalMeals = loggedDays.reduce((s, d) => s + d.entries.length, 0);
  const avgMeals = N ? totalMeals / N : 0;
  let streak = 0;
  for (let i = days.length - 1; i >= 0; i--) {
    if (days[i].logged) streak++;

  return { days, avg, loggedCount: N, totalDays: days.length, avgMeals, streak };
